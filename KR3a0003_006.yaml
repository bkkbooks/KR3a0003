body:
  text: 卷六詰墨第十八墨子稱景公問晏子以孔子而不對又問三皆不對公曰以孔子語寡人者衆矣俱以為賢聖也今問於子而不對何也晏子曰嬰聞孔子之荊知白公謀而奉之以石乞勸下亂上教臣弒君非聖賢之行也詰之曰楚昭王之世夫子應聘如荊不用而反周旋乎陳宋齊衛楚昭王卒惠王立十年令尹子西乃召王孫勝以為白公是時魯哀公十五年也夫子自衛反魯居五年矣白公立一年然後乃謀作亂亂作在哀公十六年秋也夫子已卒十旬矣墨子雖欲謗毀聖人虛造妄言奈此年世不相值何墨子曰孔子之齊見景公公悅之封之以尼溪晏子曰不可夫儒倨法而自順立命而怠事崇喪遂哀盛用繁禮其道不可以治國其學不可以導家公曰善詰之曰即如此言晏子為非儒惡禮不欲崇喪遂哀也察傳記晏子之所行未有以異於儒焉又景公問所以為政晏子答以禮云景公曰禮其可以治乎晏子曰禮於政與天地並此則未有以惡於禮也晏桓子卒晏嬰斬衰枕草苴絰帶杖菅菲食粥居于倚廬遂哀三年此又未有以異於儒也若能以口非之而躬行之晏子所弗為墨子曰孔子怒景公之不封己乃樹鴟夷子皮於田常之門詰之曰夫樹人為其信己也記曰孔子適齊惡陳常而終不見常病之亦惡孔子交相惡而又往仕其不然矣記又曰陳常弒其君孔子齊戒沐浴而朝請討之觀其終不樹子皮審矣墨子曰孔子為魯司寇舍公家而奉季孫詰之曰若以季孫為相司寇統焉奉之自法也若附意季孫季孫既離公室則孔子合之季孫既受女樂則孔子去之季孫欲殺囚則孔子赦之非苟順之謂也墨子曰孔子厄於陳蔡之間子路烹豚孔子不問肉之所由來而食之剝人之衣以沽酒孔子不問酒之所由來而飲之詰之曰所謂厄者沽買無處藜羹不粒乏食七日若烹豚飲酒則何言乎厄斯不然矣且子路為人勇於見義縱有豚酒不以義不取之可知也又何問焉墨子曰孔子諸弟子子貢季路輔孔悝以亂衛陽虎亂魯弗肹以中牟畔漆雕開形殘詰之曰如此言衛之亂子貢季路為之耶斯不待言而了矣陽虎欲見孔子孔子不見何弟子之有弗肹以中牟畔召孔子則有之矣為孔子弟子未之聞也且漆雕開形殘非行己之致何傷於德哉墨子曰孔子相魯齊景公患之謂晏子曰鄰有聖人國之憂也今孔子相魯為之若何晏子對曰君其勿憂彼魯君弱主也孔子聖相也不如陰重孔子欲以相齊則心強諫魯君魯君不聽將適齊君勿受則孔子困矣詰之曰案如此辭則景公晏子畏孔子之聖也而上云非聖賢之行上下相反若晏子悖可也不然則不然矣墨子曰孔子見景公公曰先生素不見晏子乎對曰晏子事三君而得順焉是為三心所以不見也公告晏子晏子曰三君皆欲其國安是以嬰得順也聞君子獨立不慚於影今孔子伐樹削迹不自以為辱身窮陳蔡不自以為約始吾望儒貴之今則疑之詰之曰若是乎孔子晏子交相毀也小人有之君子則否孔子曰靈公汙而晏子事之以整莊公怯而晏子事之以勇景公侈而晏子事之以儉晏子君子也梁丘據問晏子曰事三君而不同心而俱順焉仁人固多心乎晏子曰一心可以事百君百心不可以事一君故三君之心非一也而嬰之心非三也孔子聞之曰小子記之晏子以一心事三君君子也如此則孔子譽晏子非所謂毀而不見也景公問晏子曰若人之衆則有孔子賢乎對曰孔子者君子行有節者也晏子又曰盈成匡父之孝子兄之悌弟也其父尚為孔子門人門人且以為貴則其師亦不賤矣是則晏子亦譽孔子可知也夫德之不修己之罪也不幸而屈於人己之命也伐樹削迹絶糧七日何約乎哉若晏子以此而疑儒則晏子亦不足賢矣墨子曰景公登路寢聞哭聲問梁丘據對曰魯孔子之徒也其母死服哀三年哭泣甚哀公曰豈不可哉晏子曰古者聖人非不能也而不為者知其無補於死者而深害生事故也詰之曰墨子欲以親死不服三日哭而已於意安者卒自行之空用晏子為引而同于己適證其非耳且晏子服父以禮則無緣非行禮者也曹明問子魚曰觀子詰墨者之辭事義相反墨者妄矣假使墨者復起對之乎答曰苟得其禮雖百墨吾亦明白焉失其正雖一人猶不能當前也墨子之所引者矯稱晏子晏子之善吾先君吾先君之善晏子其事庸盡乎曹明曰可得聞諸子魚曰昔齊景公問晏子曰吾欲善治可以霸諸侯乎對曰官未具也臣亟以聞而君未肯然也臣聞孔子聖人然猶居處倦惰廉隅不修則原憲季羔侍血氣不休志意不通則仲由卜商侍德不盛行不勤則顏閔冉雍侍今君之朝臣萬人立車千乘不善之政加於下民者衆矣未能以聞者臣故曰官未備也此又晏子之善孔子者也子曰晏平仲善與人交久而敬之此又孔子之貴晏子者也曹明曰吾始謂墨子可疑今則決不妄疑矣獨治第十九子魚生於戰國之世長於兵戎之間然獨樂先王之道講習不倦季則謂子魚曰大丈夫不生則已生則有云為於世者也今先生淡泊世務修無用之業當身不蒙其榮百姓不獲其利竊為先生不取也子魚曰不如子之言也武者可以進取文者可與守成今天下將擾擾焉終必有所定子修武以助之取吾修文以助之守不亦可乎且吾不才無軍旅之任徒能保其祖業優遊以卒歲者也秦始皇東并子魚謂其徒叔孫通曰子之學可矣盍仕乎對曰臣所學於先生者不用於今不可仕也子魚曰子之材能見時變今為不用之學殆非子情也叔孫通遂辭去以法仕秦尹曾謂子魚曰子之誦讀先王之書將奚以為答曰為治也世治則助之行道世亂則獨治其身治之至也陳餘謂子魚曰秦將滅先王之籍而子為書籍之主其危矣子魚曰吾不為有用之學知吾者惟友秦非吾友吾何危哉然顧有可懼者必或求天下之書焚之書不出則有禍吾將先藏之以待其求求至無患矣子魚居衛與張耳陳餘相善耳餘魏之名士也秦滅魏求耳餘懼走會陳勝吳廣起兵於陳欲以誅秦餘謂陳王曰今必欲定天下取王侯者其道莫若師賢而友智孔子之孫今在魏居亂世能正其行修其祖業不為時變其父相魏以聖道輔戰國見利不易操名稱諸侯世有家法其人通材足以幹天下博智足以慮未形必宗此人天下無敵矣陳王大悅遣使者齎千金加束帛以車三乘聘焉耳餘又使謂子魚曰天下之事已可見矣今陳王興義兵討不義子宜速來以集其事王又聞子賢欲咨良謀虛意相望也子魚遂往陳王郊迎而執其手議世務子魚以霸王之業勸之王悅其言遂尊以博士為太師咨度焉子魚名鮒甲陳人或謂之子鮒或稱孔甲陳勝既立為王其妻之父兄往焉勝以衆賓待之長揖不拜無加其禮其妻之父怒曰怙亂僣號而傲長者不能久矣不辭而去陳王跪謝遂不為顧王心慚焉遂適博士太師之館而言曰豫雖丈夫哉然塞於禮義以啓罪於姻婭唯先生幸訓誨之使免於戾乎子魚曰王所問者善也敢固無辭而對乎今以禮言耶則禮無不拜且宗族婚媾又與衆賓異敬者也敬而加親自古以然也王曰雖已失之於前庶欲收之於後也願先王修明其事必奉遵焉對曰昔唐堯內親九族外協萬邦禮以婚為昆弟妻之父母為外舅姑由是明之則拜之可知夫婚親之義非宗賢之類也雖自己臣莫敢不敬昔魏信陵君嘗以此質臣之父臣之父曰於諸母之昆弟妻之諸父則以親配德年齊以上雖拜之可也幼於己者揖之可也此出於人情而可常者也王曰善哉請問同姓而服不及者其制何邪對曰先王制禮雖國君有合族之道宗人掌其列繼之以姓而無別醊之以食而無殊各隨本屬之隆殺屬近則死為之免屬遠則弔之而已禮之正也是故臣之家哭子氏之別姓於弗父之廟哭孔氏則於夫子之廟此有據而然也周之道雖百世婚姻不通重先世之同體也王跪曰先生之言厥義博哉寡人雖固敢不盡心問軍禮第二十陳王問大師曰行軍之禮可得備聞乎答曰天下有道禮樂征伐自天子出自天子出必以歲之孟秋賞軍師武人于朝簡練俊傑任用有功命將選士以誅不義於是孟冬以級授軍司徒榗朴北面而誓之誓于社以習其事先期五日大師筮於祖廟擇吉日齊戒告于郊社稷宗廟既筮則獻兆於天子天子使有司以特牲告社告以所征之事而受命焉舍奠于帝學以受成然後乃類上帝柴于郊以出以齊車遷廟之主及社主行大司馬職奉之無遷廟主則以幣帛皮圭告于祖禰謂之主命亦載齊車凡行主皮圭幣帛皆每舍奠焉而後就館主車止于中門之外外門之內廟主居于道左社主居于道右其所經名山大川皆祭告焉及敵所將戰太史卜戰日卜右御先期三日有司明以敵人罪狀告之史史定誓命戰日將帥陳列車甲卒伍于軍門之前有司讀誥誓使周走三令五申既畢遂禱戰祈克于上帝然後即敵將士戰全己克敵史擇吉日復禡於所征之地柴于上帝祭社奠祖以告克者不頓兵傷士也戰不克則不告也凡類禡皆用甲丙戊庚壬之剛日有司簡功行賞不稽于時其用命者則加爵受賜于祖奠之前其奔北犯令者則加刑罰戮于社主之前然後鳴金振旅有司遍告捷于時所有事之山川既至舍于國外三日齊以特牛親格于祖禰然後入設奠以反主若主命則卒奠斂玉埋之于廟兩階間反社主如初迎之禮舍奠于帝學以訊馘告大享于群吏用備樂饗有功於祖廟舍爵策勳焉謂之飲至天子親征之禮也陳王曰其命將出征則如之何太師曰古者大將受命而出則忘其國即戎帥陳則忘其家故天子命將出征親潔盛服設奠于祖以詔之大將先入軍吏畢從皆北面再拜稽首而受天子當階南面命授之節鉞大將受天子乃東面西向而揖之示弗御也然後告大社冢宰執蜃宜於社之右南面授大將大將北面稽首再拜而受之承所頒賜于軍吏其出不類其克不禡戰之所在有大山川則祈焉禱克于五帝捷則報之振旅復命簡異功勤親告廟告社而後適朝禮也王曰將居軍中之禮勝敗之變則如之何太師曰將帥尚左士卒尚右出國先鋒入國後刃介胄在身執鋭在列雖君王不拜若不幸軍敗則馹騎赴告于天子載櫜韔天子素服哭于庫門之外三日大夫素服哭于社亦如之亡將失城則皆哭七日天子使使迎于軍命將帥無請命然後將帥結草自縛袒右肩而入蓋喪禮也王曰行古禮如何太師曰古之禮固為於今也有其人行其禮則可無其人行其禮則民弗與也答問第二十一陳人有武臣謂子鮒曰夫聖人者誠高材美稱也吾謂聖人之智必見未形之前功垂於身歿之後立教而戾夫弗犯吐言而辨事不破也子之先君可謂當之矣然韓子立法其所以異夫子之論者紛如也豫每探其意而校其事持久歷遠遏姦勸善韓氏未必非孔氏未必得也吾今而後乃知聖人無世不有爾前聖後聖法制固不一也若韓非者亦當世之聖人也子以為奚若子鮒曰子信之為然是故未免凡俗也今世人有言高者必以極天為稱言下者必以深淵為名是資世之談而無其實者也好事而穿鑿者必言經以自輔援聖以自賢欲以取信於群愚而度其說也若諸子之書其義皆然吾先君之所自志也請略說一隅而吾子審其信否焉武臣曰諾子鮒曰乃者趙韓魏共并知氏趙襄子之行賞先加具臣而後有功韓非書云夫子善之引以張本然後難之豈有不似哉然實非也何以明其然昔我先君以春秋哀公十六年四月己丑卒至二十七年荀瑤與韓趙魏伐鄭遇陳坦而還是時夫子卒已十一年矣而晉四卿皆在也後悼公十四年知氏乃亡此先後甚遠而韓非公稱之曾無怍意則世多好事之徒皆非之罪也故吾以是默口於小道塞耳於諸子久矣而子立尺表以度天直寸指以測淵豫大道而不悟信誣說以疑聖殆非所望也武臣叉手跪謝施施而退遂告人曰吾自以為學之博矣而屈於孔氏方知學不在多要在精之也陳王問大師曰寡人不得為諸侯群賢所推而得南面稱孤其幸多矣今既賴二三君子且又欲規久長之圖何施而可答曰信王之言萬世之福也敢稱古以對昔周代殷乃興滅繼絶以為政首今誠法之則六國之不攜抑久長之本王曰周存二代又有三恪其事云何答曰封夏殷之後以為二代紹虞帝之胤備為三恪恪敬也禮之如賓客也非謂特有二代別有三恪也凡所以立二代者備王道通三統也王曰三統者何答曰各自用其正朔二代與周是謂三統王曰六國之後君吾不能封也遠世之王於我何有吾亦自有不及於周又安能純法之乎陳王涉讀國語言申生事顧博士曰始余信聖賢之道乃今知其不誠也先生以為何如答曰王何謂哉王曰晉獻惑亂聽讒而書又載驪姬夜泣公而以信入其言人之夫婦夜處幽室之中莫能知其私焉雖黔首猶然況國君乎豫以是知其不信乃好事者為之辭將欲成其說以誣愚俗也故使豫并疑於聖人也博士曰不然也古者人君外朝則有國史內朝則有女史舉則左史書之言則右史書之以無諱示後世善以為式惡以為戒廢而不記史失其官故凡若晉侯驪姬床笫之私房中之事不得掩焉若夫設教之言驅群俗使人入道而不知其所以者也今此皆書實事纍纍若貫珠可無疑矣王曰先生真聖人之後也今幸得聞命寡人無過焉陳王涉使周章為將西入關將以入秦秦使將章邯距之陳王以秦國之亂也有輕之之意勢若有餘而不設敵備博士大師諫曰章邯秦之名將周章非其敵也今王使霈然自得而不設備臣竊惑焉夫雖天之所命其禍福吉凶大者在天小者由人今王不修人利以應天祥若跌而不振悔之無及也王曰寡人之軍先生無纍也請先生息慮也又諫曰臣聞兵法無恃敵之不我攻恃吾之不可攻也今恃敵而不自恃非良計也王曰先生所言計策深妙豫不識也先生休矣已而告人曰儒者可與守成難與進取信哉博士他日復諫曰臣聞國大兵衆無備難恃一人善射百夫決拾章邯梟將卒皆死士也周章弱懦使彼席卷來前莫有當其鋒者王曰先生所稱寡人昧昧焉願以人間近事喻之答曰流俗之士臣所不忍也今王命之敢不盡情願王察之也臣昔在梁梁人有陽由者其力扛鼎伎巧過人骨騰肉飛手搏𨇩獸國人懼之然無治室之訓禮教不立妻不畏憚浸相媟瀆方乃積怒妻坐於床答焉由乃左手建杖右手制其頭妻亦奮恚因受以背使杖擊之而自撮其陰由乃仆地氣絶而不能興鄰人聞其凶凶也窺而見之趣而救之妻愈戇忿莫肯舍旃或發其裳然後乃放夫以無敵之伎力而劣於女子之手者何也以輕之無備故也今王與秦角強弱非若由之夫妻也而輕秦過甚臣是以懼故區區之心欲王備慮之也王曰譬類誠佳然實不同也弗聽周章果敗而無後救邯遂進兵擊陳王師大敗博士凡仕六旬老於陳將沒戒其弟襄曰魯天下有仁義之國也戰國之時講誦不衰且先君之廟在焉吾謂叔孫通處濁世而清其身學儒術而知權變是今師也宗於有道必有令圖歸必事焉

body:
  text: 卷三巡守第八子思遊齊陳莊伯與登泰山而觀見古天子巡守之銘焉陳子曰我生獨不及帝王封禪之世子思曰子不欲爾今周室卑微諸侯無霸假以齊之義率鄰國以輔文武子孫之有德者則齊桓晉文之事不足言也陳子曰非不悅斯道力不堪也子聖人之後吾願有聞焉敢聞昔聖帝明王巡守之禮可得聞乎子思曰凡求聞者為求行之也今子自計必不能行欲聞何為陳子曰吾雖不敏亦樂先王之道於子何病而不吾告也子思乃告之曰古者天子將巡守必先告於祖禰命史告群廟及社稷圻內名山大川告者七日而遍親告用牲史告用幣申命冢宰而後道而出或以遷廟之主行載于齋車每舍奠焉及所經五嶽四瀆皆有牲幣歲二月東巡守至于岱宗柴于上帝望秩于山川所過諸侯各待于境天子先問百年者所在而親見之然後覲方嶽之諸侯有功德者則發爵賜服以順陽義無功者則削黜貶退以順陰義命史採民詩謠以觀其風命市納賈察民之所好惡以知其志命典禮正制度均量衡考衣服之等協時月日辰入其疆土地荒穢遺老失賢掊克在位則君免山川社稷有不親舉者則貶秩削土土荒民遊為無教無教者則君退民淫僣上為無法無法者則君罪入其疆土地墾辟養老尊賢俊傑在位則君有慶遂南巡五月至于南嶽又西巡八月至于西嶽又北巡十有一月至于北嶽其禮皆如岱宗歸反舍于外次三日齋親告于祖禰用特命有司告群廟社稷及圻內名山大川而後入聽朝此古者明王巡守之禮也陳子曰諸侯朝乎天子盟會霸主則亦告宗廟山川乎子思曰告哉陳子曰王者巡守不及四嶽諸侯盟會不越鄰國則其禮同乎異乎子思曰天子封圻千里公侯百里伯七十里子男五十里虞夏殷周之常制也其或出此封者則其禮與巡守朝會無變其不越於封境雖行如在國陳子曰旨哉古之義也吾今而後知不學者淺之為人也公儀第九魯人有公儀休者砥節勵行樂道好古恬於榮利不事諸侯子思與之友穆公因子思欲以為相謂子思曰公儀子必輔寡人參分魯國而與之一子其言之子思對曰如君之言則公儀子愈所以不至也君若飢渴待賢納用其謀雖蔬食水飲伋亦願在下風今徒以高官厚祿鉤餌君子無信用之意公儀子之智若魚鳥可也不然則彼將終身不躡乎君之庭矣且臣不佞又不任為君操竿下釣以傷守節之士也閭丘溫見田氏將必危齊欲以其邑叛而適魯穆公聞之謂子思曰子能懷之則寡人割邑如其邑以償子子思曰伋雖能之義所不為也公曰何子思對曰彼為人臣君將顛弗能扶而叛之逆臣制國弗能以其衆死而逃之此罪誅之人也伋縱不能討而又要利以召姦非忍行也穆公問子思曰吾聞龐欄氏子不孝其行何如對曰臣聞明君之為政尊賢以崇德舉善以勸民則四封之內孰敢不化若夫過行是細人之所識不治其本而問其過臣不知所以也公曰善穆公謂子思曰子之書所記夫子之言或者以謂子之辭也子思曰臣所記臣祖之言或親聞之者有聞之於人者雖非其正辭然猶不失其意焉且君之所疑者何公曰於事無非子思曰無非所以得臣祖之意也就如君言以為臣之辭臣之辭無非則亦所宜貴矣事既不然又何疑焉穆公謂子思曰縣子言子之為善不欲人譽己信乎子思對曰非臣之情也臣之修善欲人知之知之而譽臣是臣之為善有勸也此所願而不可得者也若臣之修善而人莫知莫知則必毀臣是臣之為善而受毀也此臣所不願而不可避者也若夫雞鳴為善孜孜以至夜半而曰不欲人之知恐人之譽己臣以謂斯人也者非虛則愚也胡毋豹謂子思曰子好大世莫能容子也盍亦隨時乎子思曰大非所病所病不大也凡所以求容於世為行道也毀道以求容道何行焉大不見容命也毀大而求容罪也吾弗改矣子思居貧其友有饋之粟者受二車焉或獻樽酒束修子思弗為當也或曰子取人粟而辭吾酒脯是辭少而取多也於義則無名於介則不全而子行之何也子思曰然伋不幸而貧於財至於困乏將恐絶先人之祀夫所以受粟為周乏也酒脯所以飲宴也方乏於食而乃飲宴非義也吾豈以為介哉度義而行也或者擔其酒脯以歸穆公問子思曰吾國可興乎子思曰可公曰為之奈何對曰苟君與大夫慕周公伯禽之治行其政化開公家之惠杜私門之利結恩百姓修禮鄰國其興也勃矣子思曰吾之富貴甚易而人猶弗能夫不取於人謂之富不辱於人謂之貴不取不辱其於富貴庶矣哉抗志第十曾申謂子思曰屈己以伸道乎抗志以貧賤乎子思曰道伸吾所願也今天下王侯其孰能哉與屈己以富貴不若抗志以貧賤屈己則制於人抗志則不愧於道子思居衛衛人釣於河得鰥魚焉其大盈車子思問之曰鰥魚魚之難得者也子如何得之對曰吾始下釣垂一魴之餌鰥過而弗視也更以豚之半體則吞之矣子思喟然曰鰥雖難得貪以死餌士雖懷道貪以死祿矣子思居衛魯穆公卒縣子使乎衛聞喪而服謂子思曰子雖未臣魯父母之國也先君宗廟在焉奈何弗服子思曰吾豈愛乎禮不得也縣子曰請聞之答曰臣而去國君不掃其宗廟則不為之服寓乎是國而為國服吾既無列於魯而祭在衛吾何服哉是寄臣而服所寄之君則舊君無服明不二君之義也縣子曰善哉我未之思也衛君言計非是而群臣和者如出一口子思曰以吾觀衛所謂君不君臣不臣者也公丘懿子曰何乃若是子思曰人主自臧則衆謀不進事是而臧之猶卻衆謀況和非以長惡乎夫不察事之是非而悅人之讚己暗莫甚焉不度理之所在而阿諛求容諂莫甚焉君暗臣諂以居百姓之上民弗與也若此不已國無類矣子思謂衛君曰君之國事將日非矣君曰何故答曰有由然焉君出言皆自以為是而卿大夫莫敢矯其非卿大夫出言亦皆自以為是而士庶人莫敢矯其非君臣既自賢矣而群下同聲賢之賢之則順而有福矯之則逆而有禍故使如此如此則善安從生詩云具曰豫聖誰知烏之雌雄抑亦似衛之君臣乎衛君問子思曰寡人之政何如答曰無非君曰寡人不知其不肖亦望其如此也子思曰希旨容媚則君親之中正弼非則君疏之夫能使人富貴貧賤者君也在朝之士孰肯舍所以見親而取其所以見疏乎是故競求射君之心而莫有非君之非者此君所以無非也公曰然乎寡人之過也今知改矣答曰君弗能焉口順而心不懌者臨其事必疣君雖有命臣未敢受也司徒文子改葬其叔父問服於子思子思曰禮父母改葬緦既葬而除不忍無服送至親也非父母無服無服則弔服而加麻文子曰喪服既除然後乃葬則其服何服答曰三年之喪未葬服不變除何有焉期大功之喪服其所除之服以葬既葬而除之其虞也吉服以行事也公叔木謂申祥曰吾於子思親而敬之子思未吾察也申祥以告曰人求親敬於子子何辱焉子思答曰義也申祥曰請聞之答曰公叔氏之子愛人之同己慢而不知賢夫其親敬非心見吾所可親敬也則亦以人口而疏慢吾矣申祥曰其不知賢奈何答曰有龍穆者徒好飾弄辭説觀於坐席相人眉睫以為之意天下之淺人也而公叔子交之橋子良修實而不修名為善不為人之知己不撞不發如大鍾然天下之深人也而公叔子與之同邑而弗能知此其所以為愛同己而不知賢也子思自齊反衛衛君館而問曰先生魯國之士然不以衛之褊小猶步玉趾而慰存之願有賜於寡人也子思曰臣羈旅於此而辱君之威尊亟臨蓽門其榮多矣欲報君以財幣則君之府藏已盈而伋又貧欲報君以善言恐未合君志而徒言不聽也顧未有可以報君者唯達賢爾衛君曰賢則固寡人之所願也子思曰未審君之願將何以為君曰必用以治政子思曰君弗能也君曰何故答曰衛國非無賢才之士而君未有善政是賢才不見用故也君曰雖然願聞先生所以為賢者答曰君將以名取士耶以實取士耶君曰必以實子思曰衛之東境有李音者賢而有實者也君曰其父祖何也答曰世農夫也衛君乃盧胡大笑曰寡人不好農農夫之子無所用之且世臣之子未悉官之子思曰臣稱李音稱其賢才也周公大聖康叔大賢今魯衛之君未必皆同其祖考李音父祖雖善農則音亦未必與之同也君言世臣之子未悉官之則臣所謂有賢才而不見用果信矣臣之問君固疑君之取士不以實也今君不問李音之所以為賢才而聞其世農夫因笑而不受則君取士果信名而不由實者也衛君屈而無辭衛君曰夫道大而難明非吾所能也今欲學術何如子思曰君無然也體道者逸而不窮任術者勞而無功古之篤道君子生不足以喜之利何足以動之死不足以禁之害何足以懼之故明於死生之分通於利害之變雖以天下易其脛毛無所概於志矣是以與聖人居使窮士忘其貧賤使王公簡其富貴君無然也衛君曰善齊王謂子思曰今天下擾擾諸侯無伯吾國大人衆圖帝何如子思曰不可也君不能去君貪利之心王曰何害子思曰夫水之性清而土壤汩之人之性安而嗜欲亂之故能有天下者必無以天下為者也能有名譽者必無以名譽為者也達此則其利心外矣衛將軍文子之內子死復者曰皋媚女復子思聞之曰此女氏之字非夫氏之名也婦人於夫氏以姓氏稱禮也費子陽謂子思曰吾念周室將滅泣涕不可禁也子思曰然此亦子之善意也夫能以智知可知而不能以智知未可知危之道也今以一人之身憂世之不治而泣涕不禁是憂河水之濁而泣清之也其為無益莫大焉故微子去殷紀季之齊良知時也唯能不憂世之亂而患身之不治者可與言道矣齊王戮其民不辜謂子思曰吾知其不辜而適觸吾忿故戮之以為不足傷義也子思曰文王葬朽骨而天下知仁商紂斫朝涉而天下稱暴夫義者不必遍利天下也暴者不必盡虐海內也以其所施而觀其意民乃去就焉今君因心之忿遷戮不辜以為無傷於義此非臣之所敢知也王曰寡人實過乃今聞命請改之衛公子交見於子思曰先生聖人之後執清高之操天下之君子莫不服先生之大名也交雖不敏竊慕下風願師先生之行幸顧恤之子思曰公子不宜也夫清高之節不以私自纍不以利煩意擇天下之至道行天下之正路今公子紹康叔之緒處戰伐之世當務收英雄保其疆土非所以明臧否立規檢修匹夫之行之時也衛公子交饋馬四乘於子思曰交不敢以此求先生之歡而辱先生之潔也先生久降於鄙土蓋為賓主之餼焉子思曰伋寄命以來度身以服衛之衣量腹以食衛之粟矣且又朝夕受酒脯及祭膰之賜衣食已優意氣已定以無行志未敢當車馬之貺禮雖有爵賜人不踰父兄今重違公子之盛旨則有諂禮之愆焉若何公子曰交已言於君矣答曰不可為人子者三賜不及車馬公子曰我未之聞也謹受教穆公欲相子思子思不願將去魯魯君曰天下之主亦猶寡人也去將安之子思答曰蓋聞君子猶鳳也疑之則舉今君既疑矣又以己限天下之君臣竊謂君之言過矣齊王謂子思曰先生名高於海內吐言則天下之士莫不屬耳目今寡人欲相梁起起也名少願先生談説之也子思曰天下之士所以屬耳目者以伋之言是非當也今君使伋虛談於起則天下之士必改耳目矣耳目既改又無益於起是兩之喪也故不敢承命齊君曰起之不善何也子思曰君豈未之知乎厚於財色必薄於德自然之道也今起以貪成富聞於諸侯而無救施之惠焉以好色聞於齊國而無男女之別焉有一於此猶受其咎而起二之能無纍乎王曰寡人之言實過願先生赦焉子思見老萊子老萊子聞穆公將相子思老萊子曰若子事君將何以為乎子思曰順吾性情以道輔之無死亡焉老萊子曰不可順子之性也子性惟太剛而傲不肖且又無所死亡非人臣也子思曰不肖故為人之所傲也夫事君道行言聽則何所死亡道不行言不聽則亦不能事君所謂無死亡也老萊子曰子不見夫齒乎雖堅剛卒盡相摩舌柔順終以不弊子思曰吾不能為舌故不能事君廣詁第一淵懿邃賾深也封臣莫莽艾祁大也頒賦鋪敷布也蓋戴燾蒙冒覆也鐘崇府衆積灌叢朴聚也閲搜履庀具也攻為詁相旬宰營匠治也蠲祓禋屑潔也勿蔑微曼末沒無也隆巢岸峻高也逼昵附切局鄰傅戚近也邵媚旨伐美也賢裒繁優饒夥多也幾蔡模臬法也爰換變貿交更易也生造奏詣進也索搴探裒鉤掠採略取也聞徹接通達也固歷彌宿舊尚久也彌愈滋強益也赫斁爽曉昕著讚曙明也階附襲就因也封畛際限疆略界也承弟班列次也戶悛格扈止也幽曀暗昧冥也最凡目質要也疆窮充竟也而乃爾若汝也控彎挽引也承贊涼助佐也尋由以用也要捷集載成也肆赴捷疾也造之如適也掇督托拾也肄孑燼餘也拓斥啓闢開也杜實充牣塞也實牣滿也獎率厲勸也勤勉事力也經屑省過也闕缺間隙也迭遞交更也熸剗沒滅也玄黔驪黝黑也縞皓素白也彤梓頳縕赤也淫溢沉滅沒也載功物事也廣言第二晏明陽也旰晏晚也算麗數也叟艾老也僉皆同也交校報也舒布展也揚翥舉也索略求也獲干得也奚害何也里度居也周浹匝也充該備也列廞陳也轓輈輿也廢措置也駕乘凌也收戢斂也囚禁録也掌司主也偏贅屬也麗著思也載略行也沓襲合也抵享當也庚徹近也修杼長也校戰交也謁復白也勑質正也裔蔑末也延衍散也末沒終也辨詰別也菲涼薄也復旋還也祖翼送也走卬我也姓命孥子也諧籲和也悛寤覺也憾猜恨也艾盡止也撊忿也姦犯也汩滑亂也縮紬抽也暨捷及也苞跋本也肆臬極也睇題視也犯肆突也束縻縛也肆從遂也放投棄也莽蕪草也暴映曬也焮晞也燥乾也迪迹蹈也衍演廣也袤縱長也荷揭擔也仍再也徇歸也工官也稽考也顛殞也躋升也戕殘也勦截也辟除也慁患也謫責也間非也順退也抗禦也靳取也𧈪戲也褊狹也惎教也沮疑也虧損也毀壞也判散也蔽斷也交俱也俘罰也夷傷也枳害也適間也締閉也靡細也辨使也牧臨也嘗試也賴贏也若乃也嗟發聲也奏為也振救也庸償也賈價也贍足也曹耦也麗兩也驟數也逞快也越遠也姑且也哿可也釋解也庸善也荐重也登升也勵勉也赫顯也韙是也丕莊也佞才也暨息也話善也願謹也丰豐也都盛也腆厚也肆緩也競逐也紀基也惎忌教也憖願也憖強也薄迫也燀炊也資取也質信也餼饋也憑依也藉借也際接也裔外也閡限也廬寄也萃集也簉倅也尤怪也瞢慚也索空也素故也視比也徨往也矜惜也狃忕也覬望也何任也御侍也殿填也選擇也宣示也廣訓第三諸之也乎也旃焉也惡乎於何也烏乎吁嗟也吁嗟嗚呼也有所歎美有所傷痛隨事為義也無念念也無寧寧也不顯顯也不承承也不肖不似也繩之譽之也詰朝明旦也遐不黃耇言壽考也公孫碩膚德音不瑕道成王大美聲稱遠也鄂不韡韡言韡韡也我從事獨賢勞事獨多也魴鱮甫甫語其大也麀鹿麌麌語其衆也海物維錯錯雜也雜毛曰氂雜彩曰繪雜言曰哤廣義第四凡無妻無夫通謂之寡寡夫曰煢寡婦曰嫠妾婦之賤者謂之屬婦屬逮也逮婦之名言其徵也非分而得謂之幸詰責以辭謂之讓男女不以禮交謂之淫上淫曰蒸下淫曰報旁淫曰通不直失節謂之慚慚愧也面慚曰戁心慚曰恧體慚曰逡廣名第五諱死謂之大行死而復生謂之蘇疾甚謂之阽請天子命曰未可以戚先王請諸侯命曰未可以近先君請大夫命曰未可以從先子空棺謂之櫬有尸謂之柩饋死者謂之賵衣服謂之襚埋柩謂之殔殔坎謂之池壙謂之竁下棺謂之窆填竁謂之封宰冢也壟塋也無主之鬼謂之殤廣服第六治絲曰織織繒也麻紵葛曰布布通名也纊綿也絮之細者曰纊繒之精者曰縞縞之粗者曰素葛之精者曰絺粗者曰綌在首謂之元服辨髦大古布冠冠而敝之者也題定也顛顏顙額也璽謂之印紱謂之綬襜褕謂之童容布褐而紩之謂之藍縷袴謂之裳蔽膝謂之袡帶之垂者謂之厲大巾謂之幂覆帳謂之幄幄幕也簀床笫也大扇謂之箑杖謂之挺鍵謂之籥棊局謂之奕在足謂之屨屨尊者曰達屨達謂之金舄舄而金絇也廣器第七射有張布謂之侯侯中者謂之鵠鵠中者謂之正正方二尺正中者謂之𣙗𣙗方六寸棘戟也鏚鉞斧也干瞂盾也戈句孑戟也刃之削謂之室室謂之韠鞛珌鞸之飾也矢服謂之韜小船謂之艇艇之小者曰䒀船頭謂之舳尾謂之艫楫謂之橈車轅上者謂之𨏠轅謂之輈軫謂之枕較謂之幹衡軛也軛上者謂之烏喙纍綆繘也縚索也大者謂之索小者謂之繩詘而戾之為䋫繆而紾之為索墉城也坰地也墉墻謂之陴高平謂之大原汪池也水之北謂之汭澤之廣者謂之衍廣物第八藁謂之稈稈謂之芻生曰芻穀謂之粒菜謂之蔬禾穗謂之頴截頴謂之銍拔心曰揠拔根曰擢把謂之秉四秉曰筥筥十曰𥣯棘之實謂之棗桑之實謂之椹柞之實謂之橡廣鳥第九去陰就陽謂之陽鳥鴻鴈是也純黑而反哺者謂之烏小而腹下白不反哺者謂之雅烏白項而群飛者謂之燕烏白脰烏也雅烏鸒也廣獸第十豕彘也彘豬也其子曰豚豕之大者謂之𤜵小者謂之豵鳥之所乳謂之巢雞雉所乳謂之窠鹿之所息謂之場兔之所息謂之窟魚之所息謂之潛潛槮也積柴水中而魚舍焉度跬一舉足也倍跬謂之步四尺謂之仞倍仞謂之尋尋舒兩肱也倍尋謂之常五尺謂之墨倍墨謂之丈倍丈謂之端倍端謂之兩倍兩謂之匹匹有五謂之束量一手之盛謂之溢兩手謂之掬掬一升也掬四謂之豆豆四謂之區區四謂之釜釜二有半謂之藪藪二有半謂之缶二缶謂之鍾二鍾謂之秉秉十六斛也衡二十四銖曰兩兩有半曰捷倍捷曰舉倍舉曰鏘鏘謂之鍰二鍰四兩謂之斤斤十謂之衡衡有半謂之稱稱二謂之鈞鈞四謂之石石四謂之鼓然則鼓四百八十斤也

body:
  text: 卷四公孫龍第十二公孫龍者平原君之客也好刑名以白馬為非白馬或謂子高曰此人小辨而毀大道子盍往正諸子高曰大道之悖天下之交往也吾何病焉或曰雖然子為天下故往也子高適趙與龍會平原君家謂之曰僕居魯遂聞下風而高先生之行也願受業之日久矣然所不取於先生者獨不取先生以白馬為非白馬爾誠去非白馬之學則穿請為弟子公孫龍曰先生之言悖也龍之學正以白馬為非白馬者也今使龍去之則龍無以教矣今龍無以教而乃學於龍不亦悖乎且夫學於龍者以智與學不逮也今教龍去白馬非白馬是先教也先教而後師之不可也先生之非教龍者似齊王之問尹文也齊王曰寡人甚好士而齊國無士尹文曰今有人於此事君則忠事親則孝交友則信處鄉則順有此四行者可謂士乎王曰善是真吾所謂士者也尹文曰王得此人肯以為臣乎王曰所願不可得也尹文曰使此人於廣庭大衆之中見侮而不敢鬭王將以為臣乎王曰夫士也見侮而不敢鬭是辱也寡人不以為臣矣尹文曰雖見侮而不鬭是未失所以為士也然而王不以為臣則卿所謂士者乃非士乎夫王之令殺人者死傷人者刑民有畏王令故見侮終不敢鬭是全王之法也而王不以為臣是罰之也且王以不敢鬭為辱必以敢鬭為榮是王之所賞吏之所罰也上之所是法之所非也賞罰是非相與曲謬雖十黃帝固所不能治也齊王無以應且白馬非白馬者乃子先君仲尼之所取也龍聞楚王張繁弱之弓載忘歸之矢以射蛟兕於雲夢之囿反而喪其弓左右請求之王曰止也楚人遺弓楚人得之又何求乎仲尼聞之曰楚王仁義而未遂亦曰人得之而已矣何必楚乎若是者仲尼異楚人於所謂人也夫是仲尼之異楚人於所謂人而非龍之異白馬於所謂馬悖也先生好儒術而非仲尼之所取也欲學而使龍去所以教雖百龍之智固不能當其前也子高莫之應退而告人曰言非而博巧而不理此固吾所不答也異日平原君會衆賓而延子高平原君曰先生聖人之後也不遠千里來顧臨之欲去夫公孫子白馬之學今是非未分而先生翻然欲高逝可乎子高曰理之至精者則自明之豈在穿之退哉平原君曰至精之説可得聞乎答曰其説皆取之經傳不敢以意春秋記六鶂退飛覩之則六察之則鶂鶂猶馬也六猶白也覩之則見其白察之則知其馬色以名別內由外顯謂之白馬名實當矣若以絲麻加之女功為緇素青黃色名雖殊其質故一是以詩有素絲不曰絲素禮有緇布不曰布緇牛玄武此類甚衆先舉其色後名其質萬物之所同聖賢之所常也君子之論貴當物理不貴繁辭若尹文之折齊王之所言與其法錯故也穿之所説於公孫子高其智悅其行也去白馬之説智行固存是則穿未失其所師者也稱此云云沒其理矣是楚王之言楚人亡弓楚人得之先君夫子探其本意欲以示廣其實狹之故曰不如亦曰人得之而已也是則異楚王之所謂楚非異楚王之所謂人也以此為喻乃相擊切矣凡言人之者惣謂人也亦猶言馬者惣謂馬也楚自國也白自色也欲廣其人宜在去楚欲正名色不宜去白誠察此理則公孫之辨破矣平原君曰先生之言於理善矣因顧謂衆賓曰公孫子能答此乎燕客史由對曰辭則有焉理則否矣公孫龍又與子高泛論於平原君所辨理至於臧三耳公孫龍言臧之三耳甚辨析子高弗應俄而辭出明日復見平原君曰疇昔公孫之言信辨也先生實以為何如答曰然幾能臧三耳矣雖然實難僕願得又問於君今為臧三耳甚難而實非也謂臧兩耳甚易而實是也不知君將從易而是者乎亦其從難而非者乎平原君弗能應明日謂公孫龍曰公無復與孔子高辨事也其人理勝於辭公辭勝於理辭勝於理終必受詘李寅言曹良於平原君欲仕之平原君以問子高子高曰不識也平原君曰良嘗得見於先生矣故敢問子高曰世人多自稱上用我則國無患夫用智莫若觀其身其身且由不免於患國用之亦惡得無患乎平原君曰良之有患時不明也居家理治可移於官良能殖貨故欲仕之子高曰未可知也今有人於此身修計明而貧者志不存也身不修會計暗而富者非盜無所得之也儒服第十三子高曳長裾振褒袖方屐粗箑見平原君平原君曰吾子亦儒服乎子高曰此布衣之服非儒服也儒服非一也平原君曰請吾子言之答曰夫儒者居位行道則有袞冕之服統御師旅則有介胄之服從容徒步則有若穿之服故曰非一也平原君曰儒之為名何取爾子高曰取包衆美兼六藝動靜不失中道耳子高遊趙平原君客有鄒文季節者與子高相友善及將還魯詣故人訣既畢文節送行三宿臨別文節流涕交頤子高徒抗手而已分背就路其徒問曰先生與彼二子善彼有戀戀之心未知後會何期悽愴流涕而先生厲聲高揖無乃非親親之謂乎子高曰始吾謂此二子丈夫爾今乃知其婦人也人生則有四方之志豈鹿豕也哉而常聚乎其徒曰若此二子之泣非耶答曰斯二子良人也有不忍之心其於敢斷必不足矣其徒曰凡泣者一無取乎子高曰有二焉大姦之人以泣自信婦人懦夫以泣著愛平原君與子高飲強子高酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲十榼古之賢聖無不能飲也吾子何辭焉子高曰以穿所聞賢聖以道德兼人未聞以飲食也平原君曰即如先生所言則此言何生子高曰生於嗜酒者蓋其勸厲獎戲之辭非實然也平原君欣然曰吾不戲子無所聞此雅言也平原君謂子高曰吾聞子之先君親見衛夫人南子又云南遊過乎阿谷而交辭於漂女信有之乎答曰士之相保聞流言而不信者何哉以其所在行之事占之也昔先君在衛衛君問軍旅焉拒而不告色不在己攝駕而去衛君請見猶不能終何夫人之能覿乎古者大饗夫人與焉於時禮儀雖廢猶有行之者意衛君夫人饗夫子則夫子亦弗獲已矣若夫阿谷之言起於近世殆是假其類以行其心者之為也子高適魏會秦兵將至信陵君懼造子高之館而問祈勝之禮焉子高曰命勇謀之將以禦敵先使之迎於敵所從來之方為壇祈克乎五帝衣服隨其方色執事人數從其方之數牲則用其方之牲祝史告于社稷宗廟邦域之內名山大川君親素服誓衆于太廟曰某人不道侵犯大國二三子尚皆用心比力各死而守將帥稽首再拜受命既誓將帥勒士卒陳于廟之右君立太廟之庭祝史立于社百官各警其事御于君以待命乃大鼓于廟門詔將帥命卒習射三發擊刺三行告廟用兵于敵也五兵備效乃鼓而出以即敵此古諸侯應敵之禮也信陵君曰敬受教信陵君問子高曰古者軍旅賞人之必於祖戮人之必於社其義何也答曰賞功於祖告分之均示弗敢專也戮罪於社告中於主示聽之當也陳尫性多穢訾每得酒食輒先撥捐之然後乃食子高告之曰子無然也似有態者昔君子之於酒食有啐嘗之義無捐放之道假其可食上下何擇假令不潔其下滋甚陳尫曰吾知其無益意欲如此子高曰意不可恣也夫木之性曲者以隱括自直可以人而不如木乎子不見夫雞耶聚穀如陵跑而啄之若縱子之意則與雞豈有異乎陳尫跪曰吾今後知過矣請終改之子高任司馬乂為將於齊與燕戰而敗齊君曰以子賢明故信子也答曰君知穿孰若周公齊君曰周公聖人而子賢者弗如也子高曰然臣固弗如周公也以臣之知乂孰若周公之知其弟齊君曰兄弟審於他人子高曰君之言是也夫以周公之聖兄弟相知之審而近失於管蔡明人難知也臣與乂相見觀其材志察其所履齊國之士弗能過也尚書曰知人則哲惟帝難之穿何慚焉且曹子為魯三與齊戰三敗失地然後以勇敢之節奮三尺之劍要桓公管仲於盟壇卒收其所喪夫君子之敗如日月之蝕人各有能乂庸可棄乎今燕以詐敗破乂是乂不能於詐也臣之稱乂稱其武勇才藝不稱其有詐也乂雖敗臣固未失其所稱焉齊君辭屈而不黜司馬乂對魏王第十四魏王問人主所以為患子高對曰建大臣而不與謀嬖幸者言用則知上以踈自疑孽臣以遇徼幸者內則射合主心外則挻主之非此最人主之大患也子高謂魏王曰臣入魏國見君之二計臣焉張叔謀有餘范威智不逮然其功一也王曰叔也有餘威也不逮何同乎答曰駑驥同轅伯樂為之咨嗟玉石相糅卞氏為之歎息故賢愚共貫則能士匿謀真偽相錯則正士結舌叔雖有餘猶威不逮也魏王問如何可謂大臣子高答曰大臣則必取衆人之選能犯顏諫事公正無私者計陳事成主裁其賞事敗臣執其咎主任之而無疑臣當之而弗避君惣其契臣行其義然則君不猜於臣臣不隱於君故動無過計舉無敗事是以臣主並各有得也信陵君問曰古之善為國至於無訟其道何由答曰由乎政善也上下勤德而無私德無不化俗無不移衆之所譽政之所是也衆之所毀政之所非也毀譽是非與政相應所以無訟也齊王行車裂之刑群臣諍之弗聽子高見齊王曰聞君行車裂之刑無道之刑也而君行之臣竊以為下吏之過也王曰寡人爾以民多犯法為法之輕也子高曰然此誠君之盛意也夫人含五常之性有哀樂喜怒哀樂喜怒無不過其節節過則毀於義民多犯法以法之重無所措手足也今天下悠悠士亡定處有德則住無德則去欲規霸王之業與諸大國為難而行酷刑以懼遠近國內之民將畔四方之士不至此乃亡國之道君之下吏不具以聞徒恐逆主意以為憂不慮不諫之危亡其所矜者小所喪者大故曰下吏之過也臣觀之又非徒不諍而已也心知此事之為不可將有非議在後則因曰君忿意實然我諫諍必有龍逄比干之禍是為虛自居於忠正之地而暗推君主使同於桀紂也且夫為人臣見主非而不諍以諂主於危亡罪之大者也人主疾臣之弼己而惡之資臣以箕子比干之忠惑之大者也齊王曰謹聞命遂除車裂之法焉子高見齊王齊王問誰可為臨淄宰稱管穆焉王曰穆容貌陋民不敬也答曰夫見敬在德且臣所稱稱其材也君王聞晏子趙文子乎晏子長不過三尺面狀醜惡齊國上下莫不宗焉趙文子其身如不勝衣其言如不出口非但體陋辭氣又訥訥然其相晉國晉國以寧諸侯敬服皆有德故也以穆軀形方諸二子猶悉賢之昔臣嘗行臨淄市見屠商焉身修八尺鬚髯如戟面正紅白市之男女未有敬之者無德故也王曰是所謂祖龍始者也誠如先生之言於是乃以管穆為臨淄宰

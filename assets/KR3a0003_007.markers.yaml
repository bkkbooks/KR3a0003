  - {type: variant, offset: 2113, length: 288, content: 至里門府君大驚謂子建曰豈卿先君欲令太守行饗禮助太守誅惡邪子建對曰其然府君曰為之奈何對曰庠序之儀廢來久矣今誠修之民必觀焉且憲豐為盜或聚或散非有堅固部曲也若行饗射之禮內為禽之之備外示以簡易憲等無何依眾觀化可因而縛也府君從之用格憲等子建生仁以文學為議郎博士南海太守生子豐子豐以學行聞三府交命委質司空拜高第御史建初元年歲大旱天子憂之問群臣政教得失子豐乃上疏曰臣聞為不善而災報得其應也為善而災至遭時運也陛下即位日新視民如傷而不幸耗旱時運之會爾非政教之所致也昔成湯遭旱因自責省畋散積減御損膳而大有年意者陛下未為成湯之事焉天子納其言而從之三日雨即降轉拜黃門侍郎典東觀事子豐生子和大中大夫鮑彥, SBCK: 彦}

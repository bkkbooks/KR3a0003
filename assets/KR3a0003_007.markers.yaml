  - {type: variant, offset: 0, length: 6106, content: 連叢子上第二十二敘書家之族胤一世相承以至九世相魏居大梁始有三子焉長子之後承殷統為宋公中子之後奉夫子祀為褒成侯小子之後彥以將士高祖有功封蓼侯其子臧嗣焉歷位九卿遷御史大夫辭曰臣世以經學為業家傳相承作為訓法然今俗儒繁說遠本雜以妖妄難可以教侍中安國受詔綴集古義臣乞為太常典臣家業與安國紀綱古訓使永垂來嗣孝武皇帝重違其意遂拜太常其禮賜如三公在官數年著書十篇而卒先時嘗為賦二十四篇四篇別不在集以其幼時之作也又為書與從弟及戒子皆有義故列之于左諫格虎賦帝使亡諸大夫問乎下國下國之君方帥將士於中原車騎駢闐被行岡巒手格猛虎生縛貙犴昧爽而出見星而還國政不恤惟此為歡乃誇於大夫曰下國鄙固不知帝者之事敢問天子之格虎豈有異術哉大夫未之應因又言曰下國褊陋莫以虞心故乃闢四封以為藪圍境內以為林禽鳥育之驛驛淫淫晝則鳴嚾夜則嘷吟飛禽起而日翳走獸動而雷音犯之者其罪死驚之者其刑深虞候苑令是掌厥禁於是分幕將士營遮榛叢戴星入野列火求蹤見虎自來乃往尋從張罝網羅刃鋒驅檻車聽鼓鍾猛虎顛遽奔走西東怖駭內懷迷冒怔忪耳目喪精值網而衝局然自縛或隻或雙車徒抃讚咸稱曰工乃縛以絲組斬其爪牙支輪登較高載歸家孟賁被髮嗔目蹂猾紛華都邑百姓莫不于邁陳列路隅咸稱萬歲斯亦畋獵之至樂也大夫曰順君之心樂矣然非樂之至也樂至者與百姓同之之謂也夫兕虎之生與天地偕山林澤藪又其宅也被有德之君則不為害今君荒於遊獵莫恤國政驅民入山林格虎於其廷妨害農業殘夭民命國政其必亂民命其必散國亂民散君誰與處以此為至樂所未聞也於是下國之君乃頓首曰臣實不敏習之日久矣幸今承誨請遂改之楊柳賦嗟茲楊柳先生後傷蔚茂炎夏多陰可涼伐之原野樹之中塘溉浸以時日引月長巨本洪枝條脩遠楊夭繞連枝猗那其旁或拳句以逮下土或擢跡而接穹蒼綠葉累疊鬱茂翳沈蒙籠交錯應風悲吟鳴鵠集聚百變其音爾乃觀其四布運其所臨南垂大陽北被宏陰西奄梓園東覆果林規方冒乎半頃清室莫與比深於是朋友同好几筵列行論道飲燕流川浮觴殽核紛雜賦詩斷章各陳厥志考以先王賞恭罰慢事有紀綱洗觶酌樽兕觥並揚飲不至醉樂不及荒威儀抑抑動合典章退坐分別其樂難忘惟萬物之自然固神妙之不如意此楊樹依我以生未經一紀我賴以寧暑不御䈉淒而涼清內蔭我宗外及有生物有可貴云何不銘乃作斯賦以敘厥情鶚賦鶚賦季夏庚子思道靜居爰有飛鶚集我屋隅異物之來吉凶之符觀之歡然覽考經書在德為祥棄常為妖尋氣而應天道不渝昔在賈生有識之士忌茲服鳥卒用喪己咨我令考信道秉真變怪生家謂之天神脩德滅邪化及其鄰禍福無門唯人所求聽天任命慎厥所脩栖遲養志老氏之疇祿爵之來秪增我憂時去不索時來不逆庶幾中庸仁義之宅何思何慮自今勤劇蓼蟲賦季夏既望暑往涼還逍遙諷誦遂歷東園周旋覽觀憩乎南藩覩茲茂蓼結葩吐榮猗那隨風綠葉紫莖爰有蠕蟲厥狀似螟群聚其間食之以生於是悟物託事推況乎人幼長斯蓼莫或知辛膏梁粱之子豈曰不人惟非德義不以為家安逸無心如禽獸何逸必致驕驕必致亡匪唯辛苦乃丁大殃與從弟書與從弟書臧報侍中相如深忿俗儒淫辭冒義有意欲撥亂反正由來久矣然雅達博通不世而出流學守株比肩皆是眾口非非正將焉立每獨念至此夙夜反側誠懼仁弟道未信於世而以獨知為愆也人之所欲天必從之舊章潛於壁室正於紛擾之際欻爾而見俗儒結舌古訓復申豈非聖祖之靈欲令仁弟讚明其道以闡其業者哉且曩雖為今學亦多所不信唯聞尚書二十八篇取象二十八宿謂為至然也何圖古文乃自百篇邪如堯典說者以為堯舜同道弟常以為雜有舜典今果如所論及成王遇風雷周公見任俗儒群驅狗吠雷同不得其髣髴惡能明聖道之真乎知以今讎古以隸篆推科斗已定五十餘篇並為之傳云其餘錯亂文字摩滅不可分了欲垂待後賢誠合先君闕疑之義顧惟世移名制變改文體義類轉益難知以弟博洽溫敏既善推理又習其書而猶尚絕意莫肯垂留三思縱使來世亦有篤古碩儒其若斯何嗚呼惜哉先王遺典闕而不補聖祖之業分半而泯後之君子將焉取法假令顏閔不歿游夏更生其豈然乎其豈然乎不能已已貴復申之與子琳書告琳頃來聞汝與諸友生講肄書傳滋滋晝夜衎衎不怠善矣人之進道唯問其志取必以漸勤則得多山霤至柔石為之穿蝎蟲至弱木為之弊夫霤非石之鑿蝎非木之鑿然而能以微脆之形陷堅剛之體豈非積漸之致乎訓曰徒學知之未可多履而行之乃足佳故學者所以飾百行也侍中子國明達淵博雅好絕倫言不及利行不欺名動遵禮法少小及長操行如故雖與群臣並居近侍頗見崇禮不供褻事獨得掌御唾壺朝廷之士莫不榮之此汝親所見也詩不云乎無念爾祖聿脩厥德又曰操斧伐柯其則不遠遠則尼父近則子國於以立身其庶矣乎敘世臧子琳位至諸吏亦傳學問琳子黃厥德不脩失侯爵大司徒光以其祖有功德而邑土廢絕分所食邑三百戶封黃弟茂為關內侯茂子子國生子卬為諸生特善詩禮而傳之子卬生仲驩為博士弘農守善春秋三傳公羊穀梁訓諸生仲驩生子立善詩書少游京師與劉歆友善嘗以清論譏貶史丹史丹諸子並用事為是不仕以詩書教於闕里數百人子立生子元以郎校書時歆大用事而子元校書七年官不益故或譏以為不恤於進取唯楊子雲善之子元生子建與崔義幼相善長相親也義仕王莽為建新大尹數以世利勸子建仕子建答曰吾有布衣之心子有袞冕之志各從所好不亦善乎且習與子幼同志故相友也今子以富貴為榮而吾以貧賤為樂志已乖矣乖而相友非中情也請與子辭遂歸鄉里光武中興天下未悉從化董憲彭豐等部眾暴於鄒魯之間郡守上黨鮑府君長患之是時闕里無故荊棘叢生一旦自闢廣千數百步從舊講堂坦然至里門府君大驚謂子建曰豈卿先君欲令太守行饗禮助太守誅惡邪子建對曰其然府君曰為之奈何對曰庠序之儀廢來久矣今誠修之民必觀焉且憲豐為盜或聚或散非有堅固部曲也若行饗射之禮內為禽之之備外示以簡易憲等無何依眾觀化可因而縛也府君從之用格憲等子建生仁以文學為議郎博士南海太守生子豐子豐以學行聞三府交命委質司空拜高第御史建初元年歲大旱天子憂之問群臣政教得失子豐乃上疏曰臣聞為不善而災報得其應也為善而災至遭時運也陛下即位日新視民如傷而不幸耗旱時運之會爾非政教之所致也昔成湯遭旱因自責省畋散積減御損膳而大有年意者陛下未為成湯之事焉天子納其言而從之三日雨即降轉拜黃門侍郎典東觀事子豐生子和大中大夫鮑彥曰人之性分氣度不同有體貌亢䟽色厲矜莊儀容冰栗似若能斷而當事少決不遂其為者或性玄靜不與俗競氣不勝辭似若無能而涉事不顧臨危不橈者是為似若強焉而不能勝量似若弱焉而不可奪也君子觀之以表推內察容而度心所以得之也若是似類相亂如何取實乎子豐曰夫人者患在不察也人之所綜物才志也慮協於理固以守之此之謂強知足以通變明足以破偽情足以審疑果足以必志固足以先事而功成矣即所謂寬柔內思不報無道之強也豈待形氣之助乎若乃貌肅內荏高氣亢戾多意倨跡理不充分業不一定執志不果此謂剛愎非強者也是故君子欲必其行而違其貌由是論之強弱之分不取於氣色明矣必也察志在觀其履事乎非定計於內而敏發於外孰能稱此強名乎哉子豐曰夫物有定名而論有一至是故有可以一言而得其難極雖千言之不能奪者唯析理即實為得不以濫麗說辭為賢也然而世俗之人聰達者寡隨聲者眾持論無主俯仰為資因貴勢而附從託浮說以為定不求之於本不考之於理故長溷殽言而眾莫能折其中所以為口費而無得也夫論辨者貴其能別是非之理非巧說之謂也掌事要者納言而得理此乃辨也聽者猶弗之察辭氣支離取喻多端幸較以類理不應實而聽者因形飾偽徒讚然之是所謂以巧辭多喻為辨而莫識一言而別實者也人皆欲割析分理揆是真偽固不知所以精之如自得其為謬惑莫之甚焉是故舉多敗事而寡特之智困於群醜也夫聰者不可惑以淫聲明者不可眩以邪色而世人不必聰明故有氣色勢者佑德之半無此二者損德之半敘作左氏傳義詁者曰先生名奇字子異其先魯人即襃成君次儒第二子之後也家于茂陵以世學之門未嘗就遠方異師也唯兄君魚少從劉子駿受春秋左氏傳其於講業最名為精究其義子駿曰自以才學弗若也其或訪經傳於子駿輒曰幸問孔君魚吾已還從之資道矣由是大以春秋見稱當世王莽之末君魚避地至大河之西以大將軍竇融為家常為上賓從容以論道為事是時先生年二十一矣每與其兄議學其兄謝服焉及世祖即祚君魚乃仕官至武都太守關內侯以清儉聞海內先生雅好儒術淡忽榮祿不願從政遂刪撮左氏傳之難者集為義詁發伏闡幽讚明聖祖之道以祛後學著書未畢而早世不永宗人子通痛其不遂惜茲大訓不行于世乃校其篇目各如本第并序答問凡三十一卷將來君子儻肯遊意幸詳錄之焉子豐善於經學不好諸家書鮑彥與子豐名齊而業殊故謂子豐曰諸家書多才辭莫過淮南也讀之令人斷氣方自知為陋爾子豐曰試說其最工不可及者彥曰君子有酒小人鼓缶雖不可好亦不可醜此語何如子豐曰不急爾彥曰且效作此語子豐曰君子樂醼小人擊抃雖不足貴亦不可賤君子舞象小人擊壤上化使然又何足賞吾能作數十曲且無益於世故不為爾鮑子於是屈而無辭連叢子下第二十三元和二年三月孝章皇帝東巡過魯幸闕里以大牢祠聖師作六代之樂天子升廟西面群臣在庭北面皆再拜天子進爵而後坐乃召諸孔丈夫年二十以上者六十三人臨賜酒飯子和自陳曰臣草莽所蔽才非幹時行非絕倫託備先聖遺嗣世名學家陛下誤加拔擢微臣蘭臺令史會值車駕東巡先禮聖師猥以餘福惠及臣宗誠非碎首所能報謝詔曰治何經對曰為詩書頗涉禮傳詔曰今日之會寧於卿宗有光榮乎對曰非所敢當也臣聞明王聖主莫不尊師而貴道今陛下尊臣祖之靈貴臣祖之道親屈萬乘辱臨弊里此乃陛下所以崇聖也若夫顧其遺嗣得與群臣同受釐福此乃陛下愛屋及烏惠下之道所以崇德作聖臣宗弗與於光榮非所敢承天子嘆曰非聖者子孫惡有斯言遂拜子和郎中詔隨車駕賜孔氏男女錢帛子和從還京師遂校書東觀其年十二月為臨晉令其友崔駰以其家卦林占之謂為不吉語子和曰盍辭乎答曰學不為人仕不擇官所以為吉也且卜以決疑不疑何卜吉凶由人而由卦林乎徑往之官三年秋八月天子巡后土登龍門子和自請從行在所天子識其狀貌燕見移時賜帛十端而還九月既望寢疾浸不瘳乃命其二子留葬焉二子長曰長彥年十有二次曰季彥年十歲父之友西洛人姚進先有道徵不就養志于家長彥季彥常受教焉既除喪則苦身勞力以自衣食家有先人遺書兄弟相勉諷誦不倦于時蒲阪令汝南許君然造其宅勸使歸魯奉以車二乘辭曰載柩而返則違父遺命舍墓而去則心所不忍君然曰以孫就祖於禮為得願子無疑答曰若以死有知也祖猶有鄰宗族焉父獨留此不以極乎吾其定矣遂還其車於是甘貧味道研精墳典十餘年間會徒數百故時人為之語曰魯國孔氏好讀經兄弟講誦皆可聽學士來者有聲名不過孔氏那得成長彥頗隨時為今學季彥壹其家業兼脩史漢不好諸家之書華陰張太常問如何斯可謂備德君子季彥答曰性能沈邃則不可測志不在小則不可度砥厲廉隅則不可越行高體卑則不可階興事效業與言俱立捨己從善不恥服人交友以義不慕勢利並立相下不倡游言若此可謂備德矣張生曰不有孝弟忠信乎答曰別而論之則應此條惣而目之則曰孝弟忠信張生聞是言喜而書之魯人有同歲上計而死者欲為之服問於季彥季彥曰有恩好者其緦乎昔諸侯大夫共會事于王及以君命同盟霸主其死則皆有哭臨之禮今之上計並覲天子有交燕之歡同名綈素上紀先君下錄子弟相敦以好相厲以義又數相往來特有私親雖比之朋友不亦可乎崔駰學於大學而糧乏鄧衛尉欲餼焉而未果季彥年九歲以其父命往見衛尉曰夫言不在多在於當理施不在豐期於救乏崔生臣父之執也不幸而貧公許賑之言既當理矣從來有日嘉貺未至或欲豐之然後乃致乎荅曰家物少須租入當猥送之季彥曰公顧盼崔生欲分祿以周其無君之惠也必欲待君租入然後猥致則於崔生為贏受人以自贏非義崔生所不為也且今已乏矣而方須租入是猶古人欲決江海以救牛蹄之魚之類也鄧公曰諾梁人取後妻後妻殺夫其子又殺之季彥返魯過梁梁相曰此子當以大逆論禮繼母如母是殺母也季彥曰言如母則與親母不等欲以義督之也昔文姜與殺魯桓春秋去其姜氏傳曰不稱姜氏絕不為親禮也絕不為親即凡人爾且夫手殺重於知情知情猶不得為親則此下手之時母名絕矣方之古義是子宜以非司寇而擅殺當之不得為殺母而論以逆也梁相從之弘農太守皇甫威明問仲淵曰吾聞孔氏自三父之後能傳祖之業者常在於叔祖今觀連叢所記信如所聞然則伯季之後弗克負荷矣荅曰不然也先君所以為業者非唯經傳而已可以學則學可以進則進可以止則止故曰無可無不可也蓋唯執行中庸期於得道非末嗣子孫所能及也是以先父各取所能能仕則仕能學則學自伯祖之子孫世仕有位季祖之子孫或學或仕或文或武所統不壹故學不稽古仕無高官文非俎豆武非戢兵不專故也皇甫曰如高明之言是故弗克負荷已荅曰伯之子孫今何其仕季之子孫何所任所以世得聞焉且人之才性受天有分若如君之論則成王伯禽雖致泰平皆當以不聖蒙弗克負荷之罪乎皇甫笑曰善既而或謂仲淵曰以古人推之自可如皇甫之言爾而子矜之何也皇甫雖口與子心實不與也荅曰吾其然然此君來言頗欲相侵故激至於此豈曰得道由不獲已也長孫尚書問季彥曰處士聖人之後也豈知聖人之德惡乎齊荅曰德行邈於世智達秀於人幾於如此矣曰聖人者必能聞於無聲見於無形然後稱聖爾如處士所言大賢則能為之季彥曰君之論宜若未之近也夫有聲故可得而聽有形故可得而見若乃無聲雖師曠側耳將何聞乎無形雖離婁並照將何覩乎書曰惟狂克念作聖狂人思念道德猶為聖人聖人大賢之清者也賢人中人之清者也孔大夫謂季彥曰今朝廷以下四海之內皆為章句內學而君獨治古義治古義則不能不非章句內學非章句內學則危身之道也獨善固不容於世今古義雖善時世所廢也而獨為之必將有患盍固已乎荅曰君之此言殆非所望也君以為學學知乎學愚乎大夫曰學所以求知也季彥曰君頻日聞吾說古義一言輒再稱善善其使人知也以為章句內學迂誕不通即使人愚也今欲使吾釋善善之知業習迂誕不通之愚學為人謀如此於義何居且君子立論必析是非以是易非何傷之如主上聰明睿知不欲兩聞其義博覽古今擇善從之以廣其聖乎吾學不要祿貴得正義爾復以此受患猶甘心焉先聖遺訓壁出古文臨淮傳義可謂妙矣而不在科策之例世人固莫識其奇矣斯業之所以不泯賴吾家世世獨脩之也今君猥為祿利之故欲廢先君之道此殆非所望也若從君言是為先君正義滅於今日將使來世達人見今文俗說因嗤笑前聖吾之力此蓋為先人也物極則變比百年之外必當有明德君子恨不與吾偕世者於是大夫悵然曰吾意實不及此敢謝不敏楊太尉問季彥曰吾聞臨晉君異才博聞周洽群籍而世不歸大儒何也荅曰不為祿學故也惡直醜正實繁有徒辨經說義輒見增疾但以所據者正故眾人不能害爾免害為幸何大儒之見歸乎季彥見劉公客適有獻魚者公熟視魚歎曰厚哉天之與人也生五穀以為食育鳥獸以為之肴眾坐僉曰誠如明公之教也季彥曰賤子愚意竊與眾君子不同以為不如明公之教也何者萬物之生各稟天地未必為人人徒以知得而食焉故孝經曰天地之性人為貴貴有知也伏羲始嘗草木可食者一日而遇七十二毒然後五穀乃形非天本為人而生之也蚊蚋食人蚓蟲食土非天故為蚊蚋生人為蚓蟲生地也知此不然則五穀鳥獸之生本不為人可以為無疑矣公良久曰辨哉眾坐默然永初二年季彥如京師省宗人仲淵是年夏河南四縣雨雹如棬杯大者如斗殺禽畜雉兔折樹木秋苗盡於是天子責躬省過並令幽隱有道術之士各得因變事極陳厥故季彥與仲淵說道其意狀曰此陰乘陽也貴臣擅權母后黨盛多致此異然乃漢家之所大忌也于時下邳長孫子逸止仲淵第聞是言也心善之因見上說焉上召季彥季彥見於德陽殿陳其事如與仲淵言也曰陛下增脩聖德慮此二者而已矣夫物之相感各以類推其甚者必有山崩地震白氣相因其事不可盡論往者延平之中鄧后稱制而東垣巨屋山大崩聲動安邑即前事之驗者帝默然左右皆不善其言季彥聞之曰吾豈容媚勢臣而欺天子乎後子逸相魯舉季彥孝廉固辭不就會遭兄長彥憂遂止乎家季彥為人謙退愛厚簡而不華終不以榮利變其恬然之志見不義而富貴者視之如僕隸其下筆則典誥成章吐言必正名務理故每所交游莫不推先以為楷則也年四十有九延光三年十一月丁丑卒, WYG: ''}

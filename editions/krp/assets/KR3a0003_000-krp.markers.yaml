  - {type: variant, offset: 0, length: 154, content: 注孔叢子序孔叢子者乃孔子八世孫鮒字子魚仕陳勝爲博士以言不見用託目疾而退論集先君仲尼子思子上子髙子順之言及巳之事凢二十一篇爲六卷名之曰孔叢子盖言有善而叢聚之也至漢孝武朝太常孔臧又以其所爲賦與書謂之連叢上下篇爲一卷附之于末然士大夫號藏書者所得本皆豕亥魚魯不堪其讀臣凢百購求以損益𥙷竄近始完集然有語或淺固弗極於道疑, WYG: ''}

  - {type: variant, offset: 155, length: 595, content: 人増益乃悉誅去義例䌓猥随亦刪定因念彼鬼谷尉繚庚桑靈真浮夸汪洋之說尚且命氏于世矧是書所載皆先聖之言三代之術六藝之要在焉非諸子之流也又可泯而不稱耶故敢具所以然注而示諸學者云嘉祐三年戊戍歲二月日提點廣南西路諸州軍刑獄公事兼本路勸農事朝散郎守尚書屯田郎中上輕車都尉賜緋魚袋借紫臣宋咸謹序進孔叢子表臣咸言准中書札子以臣注孔叢子奉聖㫖附逓投進者集孔氏之遺書方成傳釋辱漢家之大詔廣示甄收退省妄庸實深震悸臣咸誠惶誠恐頓首頓首臣竊以仲尼以還子思而後聖嗣不絶賢才挺生皆道𬒳於門人悉教施於侯氏古今制度曲盡於討論禮樂綱衡並歸於矩矱成書雖在歷年滋深盖著非一時故語類三豕臣咸伏念上卷盖闕里之事業中篇乃聖人之子孫儻絶筆而未明則後代而何覩因以吏隙輙然管窺取諸史以究尋用群經而叅驗既指歸而斯得復刪定以無繁為注之文廣析其理然小臣之學古當真主之好儒有所述傳豈宜隱去遂剡其奏用文于天豈謂體天法道欽文聦武聖神孝徳皇帝陛下惟極宜慈未嘗自聖雖㣲言而必采在介善以無遺遽降玉音下從人欲臣是敢䖍効編摩之制仰塵黈纊之明雖姓異卯金素非於廣學倘恩垂乙夜特賜於詳觀詔近侍以刋修許善工而摹鏤叅汲冡之蠧簡大行於時庶鄹人之緒言不墜于地則非獨孤生之有遇抑亦素教之増輝永期大忠仰酧鴻造臣無任干天冐聖激切屏營之至所注孔叢子七卷謹寫成五冊附逓投進以聞伏候勑㫖嘉祐三年十二月十日廣南西路諸軍州水陸計轉運使兼本路勸農使朝散大夫尚書度支郎中上輕車都尉賜紫金魚袋臣宋咸上表, WYG: ''}

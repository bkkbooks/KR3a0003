  - {type: variant, offset: 0, length: 5857, content: 孔叢子卷第七連叢子上第二十二叙書家之族胤一世相承以至九世相魏居大梁孔子生鯉字伯魚鯉生伋字子思伋生白字子上白生求字子家求生箕字子京箕生穿字子髙穿生子順相魏自叔梁紇至子順凡九世魏城大梁始有三子焉長子之後承殷綂爲宋公中子之後奉夫子祀爲褒成侯小子之後彦以将士髙祖有功封蓼侯其子臧嗣焉歷位九卿遷御史大夫辭曰臣世以經學爲業家傳相承作爲訓法然今俗儒䌓說逺本雜以妖妄難可以教侍中安國受詔綴集古義臣乞爲太常典臣家業與安國紀綱古訓使永垂來嗣孝武皇帝重違其意遂拜太常其禮賜如三公在官數年著書十篇而卒先時嘗爲賦二十四篇四篇别不在集以其㓜時之作也又爲書與從弟及戒子皆有義故列之于左諫格虎賦帝使亡諸大夫問乎下國下國之君方帥将士於中原車騎駢闐𬒳行岡巒手格猛虎生縳􅓔犴昧爽而出見星而還國政不恤惟此爲歡乃誇於大夫曰下國鄙固不知帝者之事敢問天子之格虎豈有異術哉大夫未之應因又言曰下國𥚹陋莫以虞心故乃闢四封以爲藪圍境内以爲林禽鳥育之驛驛淫淫晝則鳴嚾夜則嘷吟飛禽起而日翳獸動而雷音犯之者其罪死驚之者其刑深虞候苑令是掌厥禁於是分幕将士營遮榛叢戴星入野列火求蹤見虞自自乃徃尋從張罝網羅刃鋒驅檻車聴皷鍾猛虎顛遽奔走西東悕駭内懐迷冐怔忪耳目䘮精值網而衝局然自縳以絲組斬其瓜牙支輪登較髙載歸家孟賁𬒳髪嗔目蹂猾紛華都邑百姓莫不于邁陳列路隅咸稱萬歲斯亦畋獵之至樂也大夫曰順君之心樂矣然非樂之至也樂至者與百姓同之之謂也夫兕虎之生與天地偕山林澤藪又其宅也𬒳有徳之君則不爲害今君荒於遊獵莫恤國政驅民入山林格虎於其廷妨害農業殘夭民命國政其必亂民命其必散國亂民散君誰與䖏以此爲至樂所未聞也於是下國之君乃蝢首曰臣實不敏習之日乆矣幸今承誨請遂改之楊桞賦嗟茲楊桞先生後傷蔚茂炎夏多隂可凉伐之原野樹之中塘溉浸以時日引月長巨本洪枝條脩逺楊夭繞連枝猗那其旁或拳句以逮下土或擢跡而接穹蒼緑葉累疊欝茂翳沈蒙籠交錯應風悲吟鳴鵠集聚百變其音爾乃觀其四布運其所臨南垂大陽北𬒳宏隂西奄梓園東覆果林䂓方冐乎半頃清室莫與比深於是朋友同好几筵列行論道飲燕流川浮觴殽核紛雜賦詩㫁章各陳厥志考以先王賞恭罰慢事有紀綱洗觶酌樽兕觥並揚飲不至醉樂不及荒威儀抑抑動合典章退坐分别其樂難忘惟萬物之自然固神妙之不如意此楊樹依我以生未經一紀我頼以寧暑不御䈉凄而凉清内䕃我宗外及有生物有可貴云何不銘乃作斯賦以叙厥情鶚賦季夏庚子思道静居爰有飛鶚集我屋隅異物之來吉㐫之符觀之歡然覽考經書在徳爲祥棄常爲妖尋氣而應天道不渝昔在賈生有識之士忌茲服鳥卒用䘮己咨我令考信道秉真變恠生家謂之天神脩徳㓕邪化及其鄰禍福無門唯人所求聴天任命慎厥所脩栖遅養志老氏之疇禄爵之來秪増我憂時去不索時來不逆庶㡬中庸仁義之宅何思何慮自今勤劇蓼蟲賦季夏既望暑徃凉還逍遥諷誦遂歷東園周旋覽觀憇乎南藩覩茲茂蓼結葩吐榮猗郍隨風緑葉紫莖爰有蠕蟲厥狀似螟群聚其間食之以生於是悟物託事推况乎人㓜長斯蓼莫或知辛膏梁之子豈曰不人惟非徳義不以爲家安逸無心如禽獸何逸必致驕驕必致亡匪唯辛苦乃丁大殃與從弟書臧報侍中相如深忿俗儒淫辭冐義有意欲撥亂反正由來乆矣然雅逹博通不世而出流學守株比肩皆是衆口非非正将焉立毎獨念至此夙夜反側誠懼仁弟道未信於世而以獨知爲愆也人之所欲天必從之舊章潜於壁室正於紛擾之際欻爾而見俗儒結舌古訓復申豈非聖祖之靈欲令仁弟讃明其道以闡其業者哉且曩雖爲今學亦多所不信唯聞尚書二十八篇取象二十八宿謂爲至然也何圖古文乃自百篇邪如堯典說者以爲堯舜同道弟常以爲雜有堯典今果如所論及成王遇風雷周公見任俗儒群驅狗吠雷同不得其髣髴惡能明聖道之真乎知以今讐古以隷篆推科斗巳定五十餘篇並爲之傳云其餘錯亂文字摩㓕不可分了欲垂待後賢誠合先君闕疑之義顧惟世移名制變改文體義類轉益難知以弟愽洽温敏既善推理又習其書而猶尚絶意莫肯垂留三思縱使來世亦有篤古碩儒其若斯何嗚呼惜哉先王遺典闕而不𥙷聖祖之業分半而泯後之君子将焉取法假令顔閔不殁㳺夏更生其豈然乎其豈然乎不能巳己貴復申之衆口非非一作衆非非正與子琳書告琳頃來聞汝與諸友生講肄書傳滋滋晝夜衎衎不怠善矣人之進道唯問其志取必以漸勤則得多山霤至柔石爲之穿蝎蟲至弱木爲之弊夫霤非石之鑿蝎非木之鑿然而能以微脆之形䧟堅剛之體豈非積漸之致乎訓曰徒學知之未可多履而行之乃足佳故學者所以餙百行也侍中子國明逹淵愽雅好絶倫言不及利行不欺名動遵禮法少小及長操行如故雖與群臣並居近侍頗見崇禮不供䙝事獨得掌御唾壼朝廷之士莫不榮之此汝親所見也詩不云乎無念爾祖聿脩厥徳又曰操斧伐柯其則不逺逺則尼父近則子國於以立身其庻矣乎叙世臧子琳位至諸吏亦傳學問琳子黄厥徳不脩失侯爵大司徒光以其祖有功徳而邑士廢絶分所食邑三百戸封黄弟茂爲關内侯茂子子國生子卬爲諸生特善詩禮而傳之子卬生仲驩爲博士弘農守善春秋三傳公羊榖梁訓諸生仲驩生子立善詩書少㳺京師與劉歆友善嘗以清論譏貶史丹史丹諸子並用事爲是不仕以詩書教於闕里數百人子立生子元以郞校書時歆大用事而子元校書七年官不益故或譏以爲不恤於進取唯楊子雲善之子元生子建與崔義㓜相善長相親也義仕王莾爲建新大尹數以世利勸子建仕子建答曰吾有布衣之心子有衮冕之志各從所好不亦善乎且習與子㓜同志故相友也今子以富貴爲榮而吾以貧賎爲樂志巳乖矣乖而相友非中情也請與子辭遂歸鄉里光武中興天下未悉從化董憲彭豐等部衆暴於鄒魯之間郡守上黨鮑府君長患之是時闕里無故荆棘叢生一旦自闢廣千數百歩從舊講堂坦然彦曰人之性分氣度不同有體貌亢䟽色厲矜荘儀容氷栗似若䏻断而當事少决不遂其爲者或性玄静不與俗􅔡氣不勝辭似若無䏻而渉事不顧臨危不橈者是爲似若強焉而不䏻勝量似若弱焉而不可奪也君子觀之以表推内察容而度心所以得之也若是似類相亂如何取實乎子豐曰夫人者患在不察也人之所綜物方志也慮恊於理固以守之此之謂強知足以通變明足以破偽情足以審疑果足以必志固足以先事而功成矣即所謂寛柔内思不報無道之強也豈待形氣之助乎若乃貌肅内荏髙氣亢戾多意倨跡理不充分業不一定執志不果此謂剛復非強者也是故君子𣣔必其行而違其貌由是論之強弱之分不取於氣色明矣必也察志在觀其履事乎非定計於内而敏發於外孰能称此強名乎哉子豐曰夫物有定名而論有一至是故有可一言而得其難極雖千言之不能奪者唯析理即實爲得不以濫䴡說辭爲賢也然而世俗人聦逹者寡隨聲者衆持論無主俯仰爲資因貴勢而附從託浮說以爲定不求之於本不考之於理故長溷殽言而衆莫䏻折其中所以爲口費而無得也夫論辨者貴其䏻别是非之理非巧說之謂也掌事要者納言而得理此乃辨也聴者猶弗之察辭氣支離取喻多端弗較以類理不應實而聴者因形飾偽從讃然之是所謂以巧辭多喻爲辨而莫識一言而别實者也人皆𣣔割析分理揆是真偽固不知所以精之如自得其爲謬惑莫之甚焉是故舉多敗事而寡特之智困於群醜也夫聦者不可惑以滛聲明者不可眩以邪色故有氣色勢者佑徳之半無此二者損徳之半叙作左氏傳義詰者曰先生名竒字子異其先魯人即襃成君次儒第二子之後也家于茂陵以世學之門未嘗就逺方異師也唯兄君魚少從劉子駿受春秋左氏傳於講業最名爲精䆒其義子駿曰自以才學弗若也其或訪經傳於子駿輒曰幸問孔君魚吾巳還從之資道矣由是大以春秋見称當世王莾之末君魚避地至大河之西以大将軍竇融爲家常爲上賔從容以論道爲事是時先生年二十一矣毎與其兄議學其兄謝服焉及世祖即祚君魚乃仕官至武都太守関内侯以清儉聞海内先生雅好儒術淡忽榮禄不碩從政遂刪撮左氏傳之難者集爲義詰發伏闡幽讃明聖祖之道以祛後學著書未畢而早世不永宗人子通痛其不遂惜兹大訓不行于世乃校其篇目各如本第并序答問凡三十一卷将来君子儻肯遊意幸詳録之焉子豐善於經學不好諸家書鮑彦與子豐名齊而業殊故謂子豐曰諸家書多才辭莫過淮南也讀之令人断氣方自知爲陋爾子豐曰試說其最工不可及者彦曰君子有酒小人鼓缶雖不可好亦不可醜此語何如子豐曰不急爾彦曰且効作此語子豐曰君子樂醼小人擊抃雖不足貴亦不可賤君子舞象小人擊壤上化使然又何足賞吾能作數十曲且無益於世故不爲爾鮑子於是屈而無辭連叢子下第二十三元和二年三月孝章皇帝東巡過魯幸闕里以大牢祠聖師作六代之樂天子升廟西面群臣在庭北面皆再拜天子進爵而後坐乃召諸孔丈夫年二十以上者六十三人臨賜酒飯子和自陳曰臣草莾所蔽才非幹時行非絶倫託備先聖遺嗣世名學家陛下誤加㧞擢微臣蘭䑓令史會值車駕東巡先禮聖師猥以餘福惠及臣宗誠非碎首所能報謝詔曰治何經對曰為詩書頗渉禮傳詔曰今日之會寧扵卿宗有光榮乎對曰非所敢當也臣聞明王聖主莫不尊師而貴道今陛下尊臣祖之靈貴臣祖之道親屈萬乗辱臨弊里此乃陛下所以崇聖也若夫顧其遺嗣得與群臣同受釐福此乃陛下愛屋及烏惠下之道所以崇徳作聖臣宗弗與扵光榮非所敢承天子嘆曰非聖者子孫惡有斯言遂拜子和郎中詔隨車駕賜孔氏男女銭帛子和從還京師遂校書東觀其年十二月爲臨晉令其友崔駰以其家卦林占之謂爲不吉語子和曰盍辭乎答曰學不爲人仕不擇官所以爲吉也且卜以决疑不疑何卜吉㓙由人而由卦林乎徑徃之官三年秋八月天子巡后土登龍門子和自請從行在所天子識其状貌燕見移時賜帛十端而還九月旣望寢疾浸不瘳乃命其二子留葬焉二子長曰長彦年十有二次曰季彦年十歲父之友西洛人姚進先有道徴不就飬志于家長彦季彦常受教焉旣除䘮則苦身勞力以自衣食家有先人遺書兄弟相勉諷誦不倦于時蒲阪令汝南許君然造其宅勸使歸魯奉以車二乗辭曰載柩而返則遺父違命舎墓而去則心所不忍君然曰以孫就祖於禮爲得碩子無疑答曰若以死有知也祖猶鄰宗族焉父獨留此不以極乎吾其定矣遂還其車於是甘貧味道研精墳典十餘年間㑹徒數百故時人爲之語曰魯國孔氏好讀經兄弟講誦皆可聽學士來者有聲名不過孔氏郍得成長彦頗隨時爲今學季彦壹其家業兼脩史漢不好諸家之書華隂張太常問如何斯可謂備徳君子季彦答曰性能沈䆳則不可測志不在小則不可度砥厲㢘隅則不可越行髙體卑則不可階興事効業與言俱立捨巳從善不恥服人交友以義不慕勢利並立相下不倡㳺言若此可謂備徳矣張生曰不有孝弟忠信乎答曰别而論之則應此條惣而目之則曰孝弟忠信張生聞是言喜而書之魯人有同歲上計而死者𣣔爲之服問於季彦季彦曰有㤙好者其緦乎昔諸侯大夫共㑹事于王及以君命同盟覇主其死則皆有哭臨之禮今之上計並覲天子有交燕之歡同名綈素上紀先君下録子弟相敦以好相厲以義又數相徃來特有私親雖比之朋友不亦可乎崔駰學於大學而糧乏鄧衞尉欲餼焉而未果季彦年九歲以其父命徃見衞尉曰夫言不在多在於當理施不在豊期於救乏崔生臣父之執也不幸而貧公許賑之言旣當理矣從來有曰嘉貺未至或欲豊之然後乃致乎荅曰家物少湏租入當猥送之季彦曰公顧盻崔生欲分禄以周其無君之惠也必欲待君租入然後猥致則於崔生爲贏受人以自贏非義崔生所不爲也且今已乏矣而方湏租入是猶古人欲决江海以救牛蹄之魚之類也鄧公曰諾梁人取後妻後妻殺夫其子又殺之季彦返魯過梁梁相曰此子當以大逆論禮繼母如母是殺毋也季彦曰言如母則與親毋不等欲以義督之也昔文姜與殺魯桓春秋去其姜氏傳曰不稱姜氏絶不爲親禮也絶不爲親即凡人爾且夫手殺重於知情知情猶不得爲親則此下手之時母名絶矣方知古義是子冝以非司冦而擅殺當之不得爲殺母而論以逆也梁相從之弘農太守皇甫威明問仲淵曰吾聞孔氏自三父之後能傳祖之業者常在於叔祖今觀連叢所記信如所聞然則伯季之後弗克負荷矣荅曰不然也先君所以爲業者非唯經傳而巳可以學則學可以進則進可以止則止故曰無可無不可也盖唯執行中庸期於得道非末嗣子孫所能及也是以先父各取所能能仕則仕能學則學自伯祖之子孫世仕有位季祖之子孫或學或仕或文或武所綂不壹故學不稽古仕無髙官文非爼豆武非戢兵不專故也皇甫曰如髙明之言是故弗克負荷已荅曰伯之子孫今何其仕季之子孫何所任所以世得聞焉且人之才性受天有分若如君之論則成王伯禽雖致㤗平皆當以不聖䝉弗克負荷之罪乎皇甫笑曰善既而或謂仲淵曰以古人推之自可如皇甫之言爾而子矜之何也皇甫雖口與子心實不與也荅曰吾其然然此君來言頗欲相侵故激至於此豈曰得道由不獲己也長孫尚書問季彦曰䖏士聖人之後也豈知聖人之徳惡乎齊荅曰徳行邈於世智逹秀於人㡬於如此矣曰聖人者必能聞於無聲見於無形然後稱聖爾如䖏士所言大賢則能爲之季彦曰君之論冝若未之近也夫有聲故可得而聴有形故可得而見若乃無聲雖師曠側耳将何聞乎無形雖離婁並照将何覩乎書曰惟狂克念作聖狂人思念道徳猶爲聖人聖人大賢之清者也賢人中人之清者也孔大夫謂季彦曰今朝廷以下四海之内皆爲章句内學而君獨治古義治古義則不能不非章句内學非章句内學則危身之道也獨善固不容於世今古義雖善時世所廢也而獨爲之必将有患盍固己乎荅曰君之此言殆非所望也君以爲學學知乎學愚乎大夫曰學所以求知也季彦曰君頻日聞吾說古義一言輙再稱善善其使人知也以爲章句内學迂誕不通即使人愚也今欲使吾釋善善之知業習迂誕不通之愚學爲人謀如此於義何居且君子立論必析是非以是易非何傷之如主上聦明睿知不欲兩聞其義愽覧古今擇善從之以廣其聖乎吾學不要禄貴得正義爾復以此受患猶甘心焉先聖遺訓壁出古文臨淮傳義可謂妙矣而不在科䇿之例世人固莫識其竒矣斯業之所以不泯頼吾家世世獨脩之也今君猥爲禄利之故欲廢先君之道此殆非所望也若從君言是爲先君正義㓕於今日将使來世逹人見今文俗說因嗤笑前聖吾之力此盖爲先人也物極則變比百年之外必當有明徳君子恨不與吾偕世者於是大夫悵然曰吾意實不及此敢謝不敏楊太尉問季彦曰吾聞臨晋君異才博聞周洽群籍而世不歸大儒何也荅曰不爲禄學故也惡直醜正實繁有徒辨經說義輙見増疾但以所據者正故衆人不能害爾免害爲幸何大儒之見歸乎季彦見劉公客適有獻魚者公孰視魚歎曰厚哉天之於人也生五榖以爲食育鳥獸以爲之肴衆坐僉曰誠如明公之教也季彦曰賤子愚意竊與衆君子不同以爲不如明公之教也何者萬物之生各禀天地未必爲人人徒以知得而食焉故孝經曰天地之性人爲貴貴有知也伏羲始甞草木可食者一日而遇七十二毒然後五榖乃形非天本爲人之生也蚊蚋食人蚓蟲食土非天故爲蚊蚋生人蚓蟲生地也知此不然則五榖鳥獸之生本不爲人可以爲無疑矣公良乆曰辨哉衆坐黙然永𥘉二年季彦如京師省宗人仲淵是年夏河南四縣雨雹如棬杯大者如斗殺禽畜雉兎折樹木秋苗盡於是天子責躬省過並令幽隱有道術之士各得因變事極陳厥故季彦與仲淵說道其意狀曰此隂乗陽也貴臣擅權母后黨盛多致此異然乃漢家之所大忌也于時下邳長孫子逸止仲淵第聞是言也心善之因見上說焉上召季彦季彦見於徳陽殿陳其事如與仲淵言也曰陛下増脩聖徳慮此二者而巳矣夫物之相感各以類推其甚者必有山崩地震白氣相因其事不可盡論徃者延平之中鄧后稱制而東垣巨屋山大崩聲動安邑即前事之驗者帝黙然左右皆不善其言季彦聞之曰吾豈容媚勢臣而欺天子乎後子逸相魯舉季彦孝㢘固辭不就㑹遭兄長彦憂遂止乎家季彦爲人謙退愛厚簡而不華終不以榮利變其恬然之志見不義而富貴者視之如僕隷其下筆則典誥成章吐言必正名務理故毎所交㳺莫不推先以爲楷則也年四十有九延光三年十一月丁丑卒, WYG: ''}

  - {type: punctuation, offset: 2669, content: (, id: KR3a0003_krp_009-bkkpn1503}
  - {type: variant, offset: 2669, length: 3, content: 驅圎切, WYG: 大者如斗殺禽畜雉兎折樹木秋苗盡天子責躬省過並令幽隱有道術之士各得假變事亟陳厥故季彦與仲淵説道其意狀曰此陰}
  - {type: voice, offset: 2669, length: 3, name: note, id: n477}
  - {type: punctuation, offset: 2671, content: /, id: KR3a0003_krp_009-bkkpn1504}
  - {type: punctuation, offset: 2672, content: ), id: KR3a0003_krp_009-bkkpn1505}
  - {type: punctuation, offset: 2674, content: (, id: KR3a0003_krp_009-bkkpn1506}
  - {type: variant, offset: 2674, length: 5, content: 神陵切孔叢, WYG: 也貴臣擅權母后黨盛多致此異然乃漢家大忌時下邳長孫}
  - {type: voice, offset: 2674, length: 3, name: note, id: n478}
  - {type: punctuation, offset: 2676, content: /, id: KR3a0003_krp_009-bkkpn1507}
  - {type: punctuation, offset: 2677, content: ), id: KR3a0003_krp_009-bkkpn1508}

  - {type: punctuation, offset: 170, content: (, id: KR3a0003_krp_009-bkkpn93}
  - {type: variant, offset: 170, length: 339, content: 盧困切錯行七各切樂之音落下同愀然七小切而巳音巳惡覩音烏大麓音鹿己而音以迷錯七各切死難奴旦切與於音預祗祗㫖夷切刑錯七故切三監古咸切所任汝鴆切應之去聲之長展两切記義第三鍾餼許記切施人施智切相室息亮切從死才用切長者两切好人虚到切譽巳音紀任臣汝鴆切下自任同巳耳音以巳巳並音以使宰爽士切舎實音捨私昵足質切亦作暱䧟辟彼亦切淇澳乙六切苞苴子余切好賢呼告切下好賢同豳公悲巾切亦作邠造周在早切與於音預蓼莪力竹切裳裳如字清澈敕列切爲施商移切刑論第四刑省所景切降典古巷切折民之列切弗勝詩證切又書蒸切下同無别彼列切下同刑重直隴切民匱求位切惡之烏故切不省所景切夫赤音扶折獄之烈切非從牆容切則巳音以適爯施隻切不中陟仲切比罰卑履切㫁者徒玩切之悖蒲没刃之抧諸氏切亦作疻惡其烏故切下同閒居音閑記問第五孔伋音級析薪, WYG: 是時}
  - {type: voice, offset: 170, length: 3, name: note, id: n29}

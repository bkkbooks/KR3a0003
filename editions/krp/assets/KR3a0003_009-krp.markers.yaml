  - {type: punctuation, offset: 2584, content: (, id: KR3a0003_krp_009-bkkpn1449}
  - {type: variant, offset: 2584, length: 3, content: 虚到切, WYG: 相厲以義}
  - {type: page-break, offset: 2584, content: '', id: KR3a0003_WYG_003-15a, image: WYG0695/WYG0695-0366a.png}
  - {type: voice, offset: 2584, length: 3, name: note, id: n459}
  - {type: punctuation, offset: 2586, content: /, id: KR3a0003_krp_009-bkkpn1450}
  - {type: punctuation, offset: 2587, content: ), id: KR3a0003_krp_009-bkkpn1451}
  - {type: punctuation, offset: 2589, content: (, id: KR3a0003_krp_009-bkkpn1452}
  - {type: variant, offset: 2589, length: 3, content: 色角切, WYG: 相往來特有私親雖比之朋友不亦可乎崔駰學於太學而糧乏鄧衞尉欲餼焉而未果季彦年九嵗以其父命往見衞尉曰夫言不在多在于當理施不在豐期於救乏崔生臣父之執也不幸而貧公許}
  - {type: voice, offset: 2589, length: 3, name: note, id: n460}
  - {type: punctuation, offset: 2591, content: /, id: KR3a0003_krp_009-bkkpn1453}

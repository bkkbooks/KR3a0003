  - {type: variant, offset: 2579, length: 3, content: 杜奚切, WYG: 上紀先君下録子弟相敦}
  - {type: voice, offset: 2579, length: 3, name: note, id: n458}
  - {type: punctuation, offset: 2581, content: /, id: KR3a0003_krp_009-bkkpn1447}

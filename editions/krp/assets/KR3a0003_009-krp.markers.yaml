  - {type: variant, offset: 2663, length: 4, content: 井切下切, WYG: 人仲淵是年夏河南四縣雨雹如}
  - {type: voice, offset: 2663, length: 4, name: note, id: n476}
  - {type: punctuation, offset: 2665, content: /, id: KR3a0003_krp_009-bkkpn1501}

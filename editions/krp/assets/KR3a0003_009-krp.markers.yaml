  - {type: variant, offset: 1787, length: 340, content: 戸孟切由惡烏故切使相爽士切脩好虚到切而燕音宴強之如字不巳音以糜於旻悲切貲擬音資䟽逹音踈之行下孟切謟鬽音寐度骸唐各切稱膚赤證切論慮困切宫他唐何切又湯何切作難乃旦切相惡烏各切而臨力鳩切舎先音捨相魏悉亮切下同䘮職四浪切麛裘旻悲切而芾博盖切又方味切㡬乎音機論勢第十六求從将容切數𬒳色角切二難乃旦切自累力縋切質秦音致嫪毐上郎到切下哀改切在䘮如字執節第十七義強巨两切下強作同談說舒贅切省刑所省切問相悉亮切其行下孟切下以行同卒不遵律切學行下孟切詰墨第十八崇䘮蘇郎切惡禮烏故切苴絰子余切菅菲古顔切躬行户庚切隂重直隴切強諌其良切卒自遵律切獨治第十九易操倉躁切名鮒方遇切塞於桑則切媾音遘降殺上如字下色戒切之免音問弗父音甫問軍禮第二十齊戒側皆切下齊車三日齊同舎奠音釋訊䤋古獲切飲至於禁切絜齊側皆切荅問第, WYG: 年}

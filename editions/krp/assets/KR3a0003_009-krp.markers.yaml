  - {type: line-break, offset: 2506, content: '', id: KR3a0003_SBCK_009-10a06}
  - {type: variant, offset: 2506, length: 0, content: '', WYG: 元和二年三月孝章皇帝東巡過魯幸闕里以太牢祠聖師作六代之樂天子升廟西面群臣在庭北面皆再拜天子進爵而後坐乃召諸孔丈夫年二十以上者六十三人臨賜酒飯子和自陳曰臣草莽所蔽才非幹時}
  - {type: page-break, offset: 2506, content: '', id: KR3a0003_WYG_003-12b, image: WYG0695/WYG0695-0364d.png}
  - {type: punctuation, offset: 2508, content: (, id: KR3a0003_krp_009-bkkpn1404}
  - {type: variant, offset: 2508, length: 0, content: '', WYG: 絶倫託備先聖嗣世名學家陛}
  - {type: voice, offset: 2508, length: 3, name: note, id: n444}
  - {type: variant, offset: 2509, length: 2, content: 孟切, WYG: 謬加拔擢微臣蘭臺}
  - {type: punctuation, offset: 2510, content: /, id: KR3a0003_krp_009-bkkpn1405}
  - {type: punctuation, offset: 2511, content: ), id: KR3a0003_krp_009-bkkpn1406}
  - {type: punctuation, offset: 2513, content: (, id: KR3a0003_krp_009-bkkpn1407}
  - {type: variant, offset: 2513, length: 3, content: 力政切, WYG: 㑹值車駕東巡先禮聖師猥以餘福惠及臣宗誠非碎首所能報謝詔曰治何經對曰為詩書頗涉禮傳詔曰今日之㑹寧於卿宗有光榮乎對曰非所敢當也臣聞明王聖主莫不尊師而貴道今陛下尊臣祖之靈貴臣祖之道親屈萬乗辱臨敝里此乃陛下所以崇聖也若夫顧其遺嗣}
  - {type: voice, offset: 2513, length: 3, name: note, id: n445}
  - {type: punctuation, offset: 2515, content: /, id: KR3a0003_krp_009-bkkpn1408}
  - {type: punctuation, offset: 2516, content: ), id: KR3a0003_krp_009-bkkpn1409}
  - {type: punctuation, offset: 2518, content: (, id: KR3a0003_krp_009-bkkpn1410}
  - {type: variant, offset: 2518, length: 3, content: 音預下, WYG: 群臣}
  - {type: voice, offset: 2518, length: 4, name: note, id: n446}
  - {type: punctuation, offset: 2520, content: /, id: KR3a0003_krp_009-bkkpn1411}
  - {type: punctuation, offset: 2522, content: ), id: KR3a0003_krp_009-bkkpn1412}
  - {type: variant, offset: 2523, length: 1, content: 釐, SBCK: 􅁵}
  - {type: punctuation, offset: 2524, content: (, id: KR3a0003_krp_009-bkkpn1413}
  - {type: variant, offset: 2524, length: 4, content: 虚其切亦, WYG: 福此乃陛下愛屋及烏惠下之道所以崇徳}
  - {type: page-break, offset: 2524, content: '', id: KR3a0003_WYG_003-13a, image: WYG0695/WYG0695-0365a.png}
  - {type: voice, offset: 2524, length: 6, name: note, id: n447}
  - {type: punctuation, offset: 2527, content: /, id: KR3a0003_krp_009-bkkpn1414}
  - {type: variant, offset: 2529, length: 1, content: 禧, WYG: 聖臣宗弗與於光榮非所敢承天子嘆曰非聖者子孫}
  - {type: punctuation, offset: 2530, content: ), id: KR3a0003_krp_009-bkkpn1415}

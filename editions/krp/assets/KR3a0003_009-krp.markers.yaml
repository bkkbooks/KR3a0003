      ', id: KR3a0003_krp_009-bkkkrnewl171}
  - {type: line-break, offset: 2551, content: '', id: KR3a0003_SBCK_009-10a08}
  - {type: punctuation, offset: 2551, content: (, id: KR3a0003_krp_009-bkkpn1428}
  - {type: variant, offset: 2551, length: 2, content: 音宴, WYG: 移時賜帛十端還而九月既望寢疾不瘳乃命其二子留塟焉二子長曰長彦年十有二次曰季彦年十嵗父之友西洛人姚進先有道徵不就養志于家長彦季彦常受教焉既除䘮則苦身勞力以自衣食家有先人遺書兄弟相勉諷誦不倦于時蒲阪令汝南許君然}
  - {type: voice, offset: 2551, length: 2, name: note, id: n452}
  - {type: punctuation, offset: 2552, content: /, id: KR3a0003_krp_009-bkkpn1429}
  - {type: punctuation, offset: 2553, content: ), id: KR3a0003_krp_009-bkkpn1430}
  - {type: punctuation, offset: 2555, content: (, id: KR3a0003_krp_009-bkkpn1431}
  - {type: variant, offset: 2555, length: 3, content: 倉到切, WYG: 宅勸使歸魯奉車二乗辭曰載柩而返則違父遺命舍父而去則心所不忍君然曰以孫就祖於禮為得子無疑答曰若以死有知也祖猶有鄰宗族父獨留此不亦劇乎吾以定矣遂還其車於是甘貧味道研精墳典十餘年間㑹徒數百故時人為之語曰魯國孔氏好讀經兄弟講誦皆可聽學士來者有聲名不過孔氏那得成長彦頗隨時為今學其時多為章句學季彦壹其家業兼修史漢不好諸家之書華隂張太常問何如斯可謂備徳君子季彦答曰性能沉邃則不可測志不在小則不}
  - {type: page-break, offset: 2555, content: '', id: KR3a0003_WYG_003-14a, image: WYG0695/WYG0695-0365c.png}
  - {type: voice, offset: 2555, length: 3, name: note, id: n453}
  - {type: punctuation, offset: 2557, content: /, id: KR3a0003_krp_009-bkkpn1432}
  - {type: punctuation, offset: 2558, content: ), id: KR3a0003_krp_009-bkkpn1433}
  - {type: punctuation, offset: 2560, content: (, id: KR3a0003_krp_009-bkkpn1434}
  - {type: variant, offset: 2560, length: 3, content: 唐落切, WYG: 砥礪廉隅則不可越}
  - {type: voice, offset: 2560, length: 3, name: note, id: n454}
  - {type: punctuation, offset: 2562, content: /, id: KR3a0003_krp_009-bkkpn1435}
  - {type: punctuation, offset: 2563, content: ), id: KR3a0003_krp_009-bkkpn1436}
  - {type: punctuation, offset: 2565, content: (, id: KR3a0003_krp_009-bkkpn1437}
  - {type: variant, offset: 2565, length: 0, content: '', WYG: 體卑則不可階興事教業與言俱立捨己從善不耻服人交友以義不慕勢利並立相}
  - {type: page-break, offset: 2565, content: '', id: KR3a0003_WYG_003-14b, image: WYG0695/WYG0695-0365d.png}
  - {type: voice, offset: 2565, length: 3, name: note, id: n455}
  - {type: variant, offset: 2566, length: 2, content: 孟切, WYG: 不倡游言若此可謂備徳矣張生曰不有孝弟忠信乎答曰}
  - {type: punctuation, offset: 2567, content: /, id: KR3a0003_krp_009-bkkpn1438}
  - {type: punctuation, offset: 2568, content: ), id: KR3a0003_krp_009-bkkpn1439}
  - {type: punctuation, offset: 2570, content: (, id: KR3a0003_krp_009-bkkpn1440}
  - {type: variant, offset: 2570, length: 3, content: 彼列切, WYG: 論之則應此條總而目之則曰孝弟忠信張生聞是言喜而書之魯人有同嵗上計而死者欲為之服問於季彦季彦曰有恩好其緦乎昔諸侯大夫同㑹事于王及以君命同盟覇主其死則有哭臨之禮今之上計並覲天子有}
  - {type: voice, offset: 2570, length: 3, name: note, id: n456}
  - {type: punctuation, offset: 2572, content: /, id: KR3a0003_krp_009-bkkpn1441}

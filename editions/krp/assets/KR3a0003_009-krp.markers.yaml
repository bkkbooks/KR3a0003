      ', id: KR3a0003_krp_009-bkkkrnewl174}
  - {type: line-break, offset: 2594, content: '', id: KR3a0003_SBCK_009-10b02}
  - {type: punctuation, offset: 2594, content: (, id: KR3a0003_krp_009-bkkpn1455}
  - {type: variant, offset: 2594, length: 4, content: 止忍切爲, WYG: 言既當理矣從來有日嘉貺未至或欲豐之然後乃至乎答曰家物少湏租入當猥送季彦曰公顧盻崔生欲分禄以周其無君之惠也必欲待君租入然後猥致則於崔生為}
  - {type: voice, offset: 2594, length: 3, name: note, id: n461}
  - {type: punctuation, offset: 2596, content: /, id: KR3a0003_krp_009-bkkpn1456}
  - {type: punctuation, offset: 2597, content: ), id: KR3a0003_krp_009-bkkpn1457}
  - {type: punctuation, offset: 2599, content: (, id: KR3a0003_krp_009-bkkpn1458}
  - {type: variant, offset: 2599, length: 3, content: 餘䡖切, WYG: 非義崔生所不為也且今已乏矣而方湏租入是猶古人欲决江河以救牛蹄之魚之類也鄧公曰諾梁人}
  - {type: page-break, offset: 2599, content: '', id: KR3a0003_WYG_003-15b, image: WYG0695/WYG0695-0366b.png}
  - {type: voice, offset: 2599, length: 3, name: note, id: n462}
  - {type: punctuation, offset: 2601, content: /, id: KR3a0003_krp_009-bkkpn1459}
  - {type: punctuation, offset: 2602, content: ), id: KR3a0003_krp_009-bkkpn1460}
  - {type: punctuation, offset: 2604, content: (, id: KR3a0003_krp_009-bkkpn1461}
  - {type: variant, offset: 2604, length: 2, content: 音娶, WYG: 妻後妻殺夫其子又殺之季彦返魯過梁梁相曰此子後以大逆論禮繼母如母是殺母也季彦曰言如母則}
  - {type: voice, offset: 2604, length: 2, name: note, id: n463}
  - {type: punctuation, offset: 2605, content: /, id: KR3a0003_krp_009-bkkpn1462}
  - {type: punctuation, offset: 2606, content: ), id: KR3a0003_krp_009-bkkpn1463}
  - {type: variant, offset: 2607, length: 0, content: '', WYG: 親母不等欲以義督之也昔文姜與弑魯桓春秋去其姜氏傳曰不稱姜氏絶不為親禮也絶不為親即凡人爾且夫手}
  - {type: punctuation, offset: 2608, content: (, id: KR3a0003_krp_009-bkkpn1464}
  - {type: variant, offset: 2608, length: 2, content: 音預, WYG: 重於知情知情猶不得為親則此下手之時母名絶矣方之古義是子宜以非司寇而擅殺當之不得為殺母而論以逆也梁相從之𢎞農太守皇甫威明問仲淵曰即皇甫規仲淵乃季彦族吾聞孔氏自三父之後能傳祖之業者常在於叔祖今觀連叢所記信如所聞然則伯季之後弗克負}
  - {type: page-break, offset: 2608, content: '', id: KR3a0003_WYG_003-16a, image: WYG0695/WYG0695-0366c.png}
  - {type: voice, offset: 2608, length: 2, name: note, id: n464}
  - {type: punctuation, offset: 2609, content: /, id: KR3a0003_krp_009-bkkpn1465}
  - {type: punctuation, offset: 2610, content: ), id: KR3a0003_krp_009-bkkpn1466}
  - {type: variant, offset: 2611, length: 2, content: 巳音, WYG: 矣答曰不然也先君所}
  - {type: punctuation, offset: 2612, content: (, id: KR3a0003_krp_009-bkkpn1467}
  - {type: voice, offset: 2612, length: 2, name: note, id: n465}
  - {type: punctuation, offset: 2613, content: /, id: KR3a0003_krp_009-bkkpn1468}
  - {type: punctuation, offset: 2614, content: ), id: KR3a0003_krp_009-bkkpn1469}
  - {type: variant, offset: 2614, length: 0, content: '', WYG: 為業者非惟經傳而已可以學則學可以進則進可以止則止故曰無可無不可也葢惟執行中庸其於得道非末嗣子孫所能及也是以先父各取所能能仕則仕能學則學自伯祖之子孫世仕有位季祖之子孫或學或仕或文或武所綂不一故學不稽古仕無髙官文非俎豆武非戢兵不専故也皇甫曰如髙明之言是故弗克負荷矣答曰伯之子孫今其可仕季之子孫何所能任所以世得聞焉且人之才聖受天}
  - {type: page-break, offset: 2614, content: '', id: KR3a0003_WYG_003-16b, image: WYG0695/WYG0695-0366d.png}
  - {type: 'kr:newline', offset: 2616, content: '

      ', id: KR3a0003_krp_009-bkkkrnewl175}
  - {type: line-break, offset: 2616, content: '', id: KR3a0003_SBCK_009-10b03}
  - {type: punctuation, offset: 2616, content: (, id: KR3a0003_krp_009-bkkpn1470}
  - {type: variant, offset: 2616, length: 1, content: 扶, WYG: 若如君之論則成王伯禽雖致太平皆當以不聖蒙弗克負荷之罪乎皇甫笑曰善既而或謂仲淵曰以古人推之自可如皇甫之言爾而子矜之何也皇甫雖口與子心實不與也答曰吾其然然此君來言頗欲相侵故激至于此豈曰得道由不獲已也長孫尚書}
  - {type: page-break, offset: 2616, content: '', id: KR3a0003_WYG_003-17a, image: WYG0695/WYG0695-0367a.png}
  - {type: voice, offset: 2616, length: 3, name: note, id: n466}
  - {type: punctuation, offset: 2618, content: /, id: KR3a0003_krp_009-bkkpn1471}
  - {type: variant, offset: 2618, length: 1, content: 切, WYG: 季彦曰處士聖人之後也豈知聖人之徳}
  - {type: punctuation, offset: 2619, content: ), id: KR3a0003_krp_009-bkkpn1472}
  - {type: punctuation, offset: 2621, content: (, id: KR3a0003_krp_009-bkkpn1473}
  - {type: variant, offset: 2621, length: 3, content: 音烏㡬, WYG: 齊答曰徳行邈}
  - {type: voice, offset: 2621, length: 2, name: note, id: n467}
  - {type: punctuation, offset: 2622, content: /, id: KR3a0003_krp_009-bkkpn1474}
  - {type: punctuation, offset: 2623, content: ), id: KR3a0003_krp_009-bkkpn1475}
  - {type: punctuation, offset: 2625, content: (, id: KR3a0003_krp_009-bkkpn1476}
  - {type: variant, offset: 2625, length: 3, content: 音機巳, WYG: 世智達秀於人幾於如此矣曰聖人者必能聞于無聲見于無形然後稱聖爾如處士所言大賢則能為之季彦曰君之論宜若未之近也夫有聲故可得而聽有形故可得而見若乃無聲雖師曠側耳將何聞}
  - {type: voice, offset: 2625, length: 2, name: note, id: n468}
  - {type: punctuation, offset: 2626, content: /, id: KR3a0003_krp_009-bkkpn1477}
  - {type: punctuation, offset: 2627, content: ), id: KR3a0003_krp_009-bkkpn1478}
  - {type: punctuation, offset: 2629, content: (, id: KR3a0003_krp_009-bkkpn1479}
  - {type: variant, offset: 2629, length: 1, content: 音, WYG: 無形雖離婁並照將何覩乎書曰惟狂克念作聖狂人念思道徳猶為聖人聖人大賢之清者也賢人中人之清者也孔大夫謂季彦曰大夫乃孔昱字元世今朝廷}
  - {type: page-break, offset: 2629, content: '', id: KR3a0003_WYG_003-17b, image: WYG0695/WYG0695-0367b.png}
  - {type: voice, offset: 2629, length: 2, name: note, id: n469}
  - {type: punctuation, offset: 2630, content: /, id: KR3a0003_krp_009-bkkpn1480}
  - {type: punctuation, offset: 2631, content: ), id: KR3a0003_krp_009-bkkpn1481}
  - {type: variant, offset: 2631, length: 0, content: '', WYG: 下四海之内皆為章句内學西漢士論以經術為内學諸子雜説為外學季彦之時方尚辭文乃以章句為内學經術為外學而君獨治古義治古義則不能不非章句非章句内學則危身之道也獨善固不容于世今古義雖善時世所廢也而獨為之必將有患盍姑已乎答曰君之此言殆非所望也君以為學}
  - {type: punctuation, offset: 2633, content: (, id: KR3a0003_krp_009-bkkpn1482}
  - {type: variant, offset: 2633, length: 4, content: 音智下同, WYG: 乎學愚乎大夫曰學所以求知也季彦曰君頻日聞吾説古義一言輙再稱善善其使人知也以為章句内學迂誕不通即使人愚也今欲使吾釋善善之知業習迂誕不通之愚學為人謀如此於義}
  - {type: page-break, offset: 2633, content: '', id: KR3a0003_WYG_003-18a, image: WYG0695/WYG0695-0367c.png}
  - {type: voice, offset: 2633, length: 4, name: note, id: n470}
  - {type: punctuation, offset: 2635, content: /, id: KR3a0003_krp_009-bkkpn1483}
  - {type: punctuation, offset: 2637, content: ), id: KR3a0003_krp_009-bkkpn1484}
  - {type: 'kr:newline', offset: 2639, content: '

      ', id: KR3a0003_krp_009-bkkkrnewl176}
  - {type: line-break, offset: 2639, content: '', id: KR3a0003_SBCK_009-10b04}
  - {type: punctuation, offset: 2639, content: (, id: KR3a0003_krp_009-bkkpn1485}
  - {type: variant, offset: 2639, length: 2, content: 音基, WYG: 且吾子立論必析是非以是易非何傷之如主上聰明庸知不欲兩聞其義博覽古今擇善從之以廣其聖乎吾學不}
  - {type: voice, offset: 2639, length: 2, name: note, id: n471}
  - {type: punctuation, offset: 2640, content: /, id: KR3a0003_krp_009-bkkpn1486}
  - {type: punctuation, offset: 2641, content: ), id: KR3a0003_krp_009-bkkpn1487}
  - {type: punctuation, offset: 2643, content: (, id: KR3a0003_krp_009-bkkpn1488}
  - {type: variant, offset: 2643, length: 2, content: 音腰, WYG: 貴得其義爾復以此受患猶甘心焉先聖垂訓壁出古文臨淮傳義可謂妙矣而不在科策之例世人固莫識其竒矣斯業之所以不泯賴吾家世世獨修之也今君猥為禄利之故欲廢先君之道此殆非所望也若從君言是為先君之義㓕于今日將使來世達人見今文俗説因嗤笑前聖吾之力此葢為先人也物極則變此百年之外必當有明慎君子恨不與吾同世者於是大夫}
  - {type: page-break, offset: 2643, content: '', id: KR3a0003_WYG_003-18b, image: WYG0695/WYG0695-0367d.png}
  - {type: voice, offset: 2643, length: 2, name: note, id: n472}
  - {type: punctuation, offset: 2644, content: /, id: KR3a0003_krp_009-bkkpn1489}
  - {type: variant, offset: 2644, length: 1, content: 腰, SBCK: 􅆎}
  - {type: punctuation, offset: 2645, content: ), id: KR3a0003_krp_009-bkkpn1490}
  - {type: punctuation, offset: 2647, content: (, id: KR3a0003_krp_009-bkkpn1491}
  - {type: variant, offset: 2647, length: 3, content: 丑亮切, WYG: 曰吾意實不及此也敢謝不敏楊太尉楊震問季彦曰吾聞臨晉君異才博聞周合群籍如世不歸大儒何答曰不為禄學故也}
  - {type: voice, offset: 2647, length: 3, name: note, id: n473}
  - {type: punctuation, offset: 2649, content: /, id: KR3a0003_krp_009-bkkpn1492}
  - {type: punctuation, offset: 2650, content: ), id: KR3a0003_krp_009-bkkpn1493}
  - {type: punctuation, offset: 2652, content: (, id: KR3a0003_krp_009-bkkpn1494}
  - {type: variant, offset: 2652, length: 1, content: 烏, WYG: 醜正實繁有徒辨經説義輙見憎疾但以所據者正}
  - {type: voice, offset: 2652, length: 3, name: note, id: n474}
  - {type: punctuation, offset: 2654, content: /, id: KR3a0003_krp_009-bkkpn1495}
  - {type: variant, offset: 2654, length: 1, content: 切, WYG: 衆人不能用爾免害為幸何大儒之能歸乎季彦見劉公客適有獻魚者公熟視魚歎曰厚哉天之于人也生五穀以為食育鳥獸以為肴衆座僉曰誠如明公之教季彦曰賤子愚意竊與衆君子不同以為不如明公之教也何者萬物之生各禀天地未必為人人徒以}
  - {type: page-break, offset: 2654, content: '', id: KR3a0003_WYG_003-19a, image: WYG0695/WYG0695-0368a.png}
  - {type: punctuation, offset: 2655, content: ), id: KR3a0003_krp_009-bkkpn1496}
  - {type: punctuation, offset: 2657, content: (, id: KR3a0003_krp_009-bkkpn1497}
  - {type: variant, offset: 2657, length: 4, content: 音智下同, WYG: 而食焉故孝經曰天地之性人為貴貴有知也伏羲始甞草木一日而遇七十二毒然後五穀乃形非天本為人而生也蚊蚋食人蚓蟲食土非天故為蚊蚋生人為蚓蟲生地也知此不然則五穀鳥獸之生本不為人可以無疑矣公良乆曰辨哉衆座黙然永初二年季彦如京師}
  - {type: page-break, offset: 2657, content: '', id: KR3a0003_WYG_003-19b, image: WYG0695/WYG0695-0368b.png}

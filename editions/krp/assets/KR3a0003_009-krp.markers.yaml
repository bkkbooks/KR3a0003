  - {type: punctuation, offset: 2532, content: (, id: KR3a0003_krp_009-bkkpn1416}
  - {type: variant, offset: 2532, length: 2, content: 音烏, WYG: 斯言遂拜子和郎中詔隨車駕賜孔氏男女錢帛子和從還京師遂校書東觀其年十二月為臨晉令其友崔駰以其家卦林占之謂為不吉語子和曰}
  - {type: voice, offset: 2532, length: 2, name: note, id: n448}
  - {type: punctuation, offset: 2533, content: /, id: KR3a0003_krp_009-bkkpn1417}
  - {type: punctuation, offset: 2534, content: ), id: KR3a0003_krp_009-bkkpn1418}
  - {type: punctuation, offset: 2536, content: (, id: KR3a0003_krp_009-bkkpn1419}
  - {type: variant, offset: 2536, length: 3, content: 轄臘切, WYG: 乎漢崔篆嘗著易林篆乃駰之祖故曰家答曰學不}
  - {type: voice, offset: 2536, length: 3, name: note, id: n449}
  - {type: punctuation, offset: 2538, content: /, id: KR3a0003_krp_009-bkkpn1420}
  - {type: punctuation, offset: 2539, content: ), id: KR3a0003_krp_009-bkkpn1421}
  - {type: punctuation, offset: 2541, content: (, id: KR3a0003_krp_009-bkkpn1422}
  - {type: variant, offset: 2541, length: 3, content: 于偽切, WYG: 仕不擇官所以為吉也且卜以决疑不疑何卜吉㓙由人而由卦林乎徑往之官三年秋八月天子巡后土登龍門子和自}
  - {type: voice, offset: 2541, length: 3, name: note, id: n450}
  - {type: punctuation, offset: 2543, content: /, id: KR3a0003_krp_009-bkkpn1423}
  - {type: punctuation, offset: 2544, content: ), id: KR3a0003_krp_009-bkkpn1424}
  - {type: punctuation, offset: 2546, content: (, id: KR3a0003_krp_009-bkkpn1425}
  - {type: variant, offset: 2546, length: 3, content: 才用切, WYG: 行在所天子識其狀貌}
  - {type: page-break, offset: 2546, content: '', id: KR3a0003_WYG_003-13b, image: WYG0695/WYG0695-0365b.png}

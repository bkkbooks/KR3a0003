      ', id: KR3a0003_krp_009-bkkkrnewl178}
  - {type: line-break, offset: 2677, content: '', id: KR3a0003_SBCK_009-10b06}
  - {type: variant, offset: 2680, length: 2, content: 釋文, WYG: 逸止仲淵第聞是言也心善之因見上説焉上召季彦季彦見於德陽殿陳其事如與仲淵言也曰陛下増修聖德慮此二者而已夫物之相感必以類推其甚者必有山崩地震乖氣相因其事不可盡論往者延平中鄧后稱制而東垣巨屋山大崩聲動安邑即前事之驗者帝黙然左右皆不善其言季彦聞之曰吾豈容媚勢臣而欺天子乎後子逸相魯舉季彦孝㢘固辭不就㑹遭兄長彦憂遂止乎家季彦為人謙退愛厚簡而不華終不以榮利變其恬然之志見不義而富貴者視之如僕𨽻舉筆則典誥成章吐言必正名務理故每所交游莫不推先以為楷則也年四十有九延光三年十一月丁丑卒史稱年四十七}

  - {type: variant, offset: 5103, length: 1, content: 六, WYG: 二十二叙書家之族𦙍一世相承以至九世相魏居大梁孔子生鯉字伯魚鯉生伋字子思伋生白字子上白生求字子家求生箕字子京箕生穿字子髙穿生子順相魏自叔梁紇至子順凡九世始有三子焉長子之後承殷綂為宋公中子之後奉夫子祀為褒成侯少子之後彦以將事髙祖有功封蓼侯其子臧嗣焉歴位九卿遷御史大夫辭曰臣世以經學為家轉相承作訓法然今俗儒繁説逺本雜以妖妄難可以教侍中安國安國孔忠之子受詔綴集古義臣乞為太常典臣家業與安國紀綱古訓使永垂來嗣孝武皇帝重違其意遂拜太常其禮賜如三公在官數年著書十篇而卒先時嘗為賦二十四篇四篇别不在集似其㓜時之作也又為書與從弟及戒子皆有義故列之于左諫格虎賦帝使亡諸大夫問乎下國下國之君方帥將士於中原車騎駢闐被行岡巒手格猛虎生縛􅓔犴昧爽而出見星而還國政不恤惟此為歡乃夸于大夫曰下國鄙固不知帝者之事敢問天子之格虎豈有異術哉大夫未之應因又言曰下國褊陋莫以娯心故乃闢四封以為藪圍境内以為林禽鳥育之驛驛淫淫晝則鳴嚾夜則嘷吟飛禽起而翳日走獸動而審音犯之者其罪死驚之者其刑深虞侯苑令是掌厥禁於是分幕將士營遮榛叢戴星入野列火求蹤見虎自來乃往尋從張罝網羅刃鋒驅檻車聽鼓鐘猛虎顛遽奔走西東怖駭内懷迷冒怔忪耳目䘮精值網而衝局然自縛或隻或雙車徒抃讚咸稱曰工乃縛以絲組斬其爪牙支輪登較支與榰同言獲獸多可榰其輈輪登滿較式髙載歸家孟賁被髮瞋目躁猾紛華故都邑百姓莫不于邁陳列路隅咸稱萬嵗斯亦畋獵之至樂也大夫曰順君之心樂矣然則樂之至也者與百姓同之謂夫兕虎之生與天地偕山林澤藪又其宅也被有徳之君則不為害今君荒于遊獵莫恤國政驅民入山林格虎於其廷妨害農業殘夭民命國政其必亂民命其必散國亂民散君誰與處以此為至樂所未聞也於是下國之君乃頓首曰臣實不敏習之日乆矣幸今承誨請遂改之楊柳賦嗟兹楊柳先生後傷蔚茂炎夏多陰可凉伐之原野樹之中塘溉浸以時日引月長巨本洪枝條修逺揚夭繞連枝猗那其房或拳局以逮下或擢跡而接穹蒼緑葉累疊鬱茂翳沈䝉籠交錯應風悲吟鳴鵠集聚百變其音爾乃觀其四布運其所臨南垂大陽北被𤣥隂西奄梓園東覆果林規方冒乎半頃清室莫與比深於是朋友同好几筵列行論道飲燕流川浮觴殽核紛雜賦詩斷章合陳厥志考以先王賞恭罰慢事有紀綱洗觶酌樽兕觥並揚飲不至醉樂不及荒威儀抑抑動合典常退坐分别其樂難忘惟萬物之自然固神妙之不如意此楊樹依我以生未寧一紀我賴以寧暑不御䈉凄而凉清内蔭我宇外及有生物有可貴云何不銘乃作斯賦以叙斯情鴞賦季夏庚子思道静居爰有飛鴞集我屋隅異物之來吉㓙之符觀之歡然覽考經書在徳為常棄常為妖尋氣而應天道不踰昔在賈生有志之士忌茲鵩鳥卒用䘮己咨我令考信道秉真變恠生家謂之天神修徳㓕邪化及其鄰禍福無門惟人所求聽天任命慎厥所修栖遲養志老氏之疇爵禄之求秪増我憂時去不索時來不逆庶幾中庸仁義之宅何思何慮自今勤劇蓼蟲賦季夏既望暑往凉還逍遙諷誦遂歴東園周旋覽觀憇于南藩覩兹茂蓼結葩吐榮猗那隨風緑葉紫莖爰有蠕蟲厥狀似螟群聚其間食之以生於是悟物託事推况乎人幼長斯蓼莫或知辛膏梁之子豈曰不云惟非徳非義不以為家安逸無心如禽獸何逸必致驕驕必致亡匪惟辛苦乃丁大殃與侍中從弟安國書臧報侍中相知忿俗儒淫辭冒義有意欲校亂反正由來乆矣然雅達博通不世而出流學守株比肩皆是衆口非非正將焉立每獨念至此夙夜反側誠懼仁弟道非信於世而以獨知為愆也人之所欲天必從舊章潛於壁室正於紛擾之際欻爾而見俗儒結舌古訓復申豈非聖祖之靈欲令仁弟讚明其道以闡其業者哉且曩雖為今學亦多所不信唯聞尚書二十八篇取象二十八宿謂為至然也何圖古文乃有百篇邪如堯典説者以為堯舜同道弟素常以為雜有舜典今果如所論及成王道雷風周公信自在俗儒群驅狗吠雷同不得其髣髴惡能明聖道之真乎知以今讐古之𨽻篆推科斗已定五十餘篇並為之傳云其餘錯亂文字摩㓕不可分了欲垂待後賢誠合先君闕疑之義顧惟世移名制改變文體義類轉益難知以弟博洽温敏既善推理又習其書而猶尚絶意莫肯垂留三思縱使來世亦有篤古碩儒其若斯何嗚呼惜哉先王遺典缺而不補聖祖之業分半而泯後之君子將焉取法假令顔閔不殁游夏更生其豈然乎不得已已貴復申之與子琳書告琳頃來聞汝與諸友書講肄學傳滋滋晝夜衎衎不怠善矣人之進道惟問其志取必以漸勤則得多山霤至柔石為之穿蝎蟲至弱木為之弊夫霤非石之鑿蝎非木之鑽然而能以微脆之形陷堅剛之體豈非積漸之致乎訓曰徒學知之未可多履而行之乃足佳故學者所以飾百行也侍中子國明達淵博雅學絶倫言不及利行不欺名動遵禮法少小長操故雖與群臣並叅侍見待崇禮不供䙝事獨得掌御唾壺朝廷之士莫不榮之此汝親所見詩不云乎毋念爾祖聿修厥徳又曰操斧伐柯其則不逺逺則尼父近則子國於以立身其庶矣乎叙世臧子琳位至諸吏亦博學問琳子黄厥徳不修失侯爵大司徒光以其祖有功德而邑土廢絶分所食邑三百戸封黄弟茂為闗内侯茂子子國生子卯為諸生特善詩禮而傳之子卯生仲驩為博士𢎞農守善春秋三傳公羊榖梁訓諸生仲驩生子立善詩書少游京師與劉歆友善嘗以清論譏貶史丹史丹諸子並用事為是不仕以詩書教於闕里數百人子立生子元以郎校書時歆大用事而子元校書七年官不益故或譏以為不恤於進取唯揚子雲善之子元生子建與崔義㓜相善長相親也義仕王莽為建新大尹數以世利勸子建仕子建答曰吾有布衣之心子有衮冕之志各從所好不亦善乎且昔與子㓜同志故相友也今子以富貴為榮而吾以貧賤為樂志已乖矣乖而相友非中情也請與子辭遂歸鄉里崔義當作毅字光武中興天下未悉從化董憲彭豐等部衆於鄒魯之間郡守上黨鮑府君君長患之是時闕里無故荆棘叢生一旦自闢廣千數百步從舊講堂坦然至里門府君大驚謂子建曰豈卿先君欲令太守行饗禮助太守誅惡耶子建對曰其然府君曰為之奈何對曰庠序之儀廢來乆矣今誠修之民必觀焉且憲豐為盜或聚或散非有堅固部曲也若行饗射之禮内為禽之之備外示以簡易憲等無何依衆觀化可因而縛也府君從之用格憲等子建生仁以文學為議郎博士南海太守生子豐子豐以學行聞三府交命委質司空拜髙第御史建初元嵗大旱天子憂之問群臣政教得失子豐乃上疏曰臣聞為不善而災報得其應也為善而災至遭時運也陛下即位日新視民如傷而不幸耗旱時運之㑹爾非政教之所致也昔成湯遭旱因自責省故散積减御損膳而大有年意者陛下未為成湯之事焉天子納其言而從之三日雨即降轉拜黄門侍郎典東觀事子豐生子和史作孔僖字仲和此書葢孔氏子孫所作故不書名大中大夫鮑彦曰人之性分氣度不同有體貌亢疏色厲矜莊儀容氷栗似若能斷而當事少决不遂其為者或性𤣥靜不與俗競氣不勝辭似若無能而涉事不顧臨危不撓者是為似若彊焉而不能勝似若弱焉而不可奪也君子觀之以表推内察容而度心所以得之也若是似類相亂如何取實乎子豐曰夫人者患在不察也人之所綜物才志也慮協於理固以守之此之謂彊知足以通變明足以破偽情足以審疑果足以必志固可以先事而成功矣即所謂寛柔内思不報無道之彊豈待形氣之助乎若乃貌厲内荏髙氣亢戾多意倨跡理不充分業不一定執志不果此謂剛愎非彊者也是故君子欲必其行由是論之彊弱之分不取於氣色明矣必也察志在觀其履事乎非定計於内而敏發於外孰能稱此彊名乎哉子豐曰夫物有定名而論有一至是故有可以一言而得其極雖十言不能奪者惟析理即實為得不以濫麗費辭為賢也然而世俗之人聰達者寡隨聲者衆持論無主俯仰為資因貴勢而附從託浮説以為定不求之於本不考之於理故冗長溷殽之言而衆莫能折其中所以為口實而無得也夫論辨者貴其能别是非之理非巧説之謂也當要者訥言得理此乃辨也聽者由弗之察辭氣支離取喻多端幸較以類理不應實而聽者因形飾偽徒讚然之是所謂以巧辭多喻為辨而莫識一言之别實者也人皆欲剖析分理揆度真偽固不知所以精之如自為得其謬惑莫之甚焉是故舉多敗事而寡特之知困於群醜也夫聰者不可亂以淫聲明者不可眩以邪色而世人不必聰明故有氣勢者益得之半無此二者損得之半也子豐善於經學不好諸家書鮑彦與子豐名齊而業殊故謂子豐曰家書多才辭莫過淮南也讀之令人斷氣方自知為陋爾子豐曰試説其最工不可及者彦曰君子有酒小人鼔缶雖不可好亦不可醜此語何如子豐曰不急爾彦曰且效作此語子豐曰君子樂醼小人擊抃雖不足貴亦不可賤君子舞象小人擊壌上化使然又何足賞吾能作數十曲但無益於世故不為爾鮑子於是屈而無辭}

body:
  text: 孔叢子卷第五陳士義第十五魏王遣使者奉黄金束帛聘子順為相子順謂使者曰若王信䏻用吾道吾道故為治世也雖𬞞食水飲吾猶為之若徒𣣔制服吾身委以重禄吾猶一夫爾則魏王不少扵一夫子度魏王之心以告我使者曰魏國狹小乏扵聖賢寡君人聞下風願委國先生親受教訓如肯降節豈唯魏國君臣是頼其亦社稷之神祗實永受慶扵是乃之魏魏王郊迎謂子順曰寡人不肖嗣先君之業先生聖人之後道徳懿邵幸見顧臨願圖國政對曰臣羇旅之臣慕君髙義是以戻此君辱貺之而問以政事敢不敬受君之明令魏王朝群臣問理國之所先季文對曰唯在知人王未之應子順進曰知人則喆帝堯所病故四㐫在朝鯀任無功夫豈樂然哉人難知故也今文之對不稱吾君之所能行而乃𣣔強吾君以聖人所難此不可行之說也王曰先生言之對曰當今所急在脩仁尚義崇徳敦禮以接鄰國而巳昔舜命衆官群臣競讓得禮之致也苟使朝臣皆有推賢之心主雖不知人則臣位必當若皆以知人為治則人主宜未過堯且其目所不見者亦必漏矣王曰善秦王得西戎利刀以之切玉如割水焉以示東方諸侯魏王問子順曰古亦有之乎對曰昔周穆王大征西戎西戎獻錕鋙之劍火浣之布其劒長尺有咫錬鋼赤刃用之切玉如切泥焉是則古亦有也王曰火浣之布若何對曰周書火浣布必投諸火布則火色垢乃灰色出火振之皜然疑乎雪焉王曰今何以獨無對曰秦貪而多求求𣣔無厭是故西戎閉而不致此以素防絶之也然則人立貪𣣔乃異物所以不至不可不慎也魏王曰吾聞道士登華山則長不死意亦願之對曰古無是道非所願也王曰吾聞之信對曰未審君之所聞親聞之扵不死者耶聞之扵傳聞者耶若聞之扵傳聞者傳者妄也若聞之扵不死者不死者今安在在者君學之勿疑不在者君勿學無疑李由之毋少寡與李音竊相好而生由由有才藝仕扵魏魏王甚愛之或曰李由毋姦不知其父不足貴也王以告由且曰吾不以此賤子也雖然古之賢聖豈有似子者乎吾将舉以折毀子者李由對曰今人不通扵逺在臣𣣔言誰爾且孔子少孤則亦不知其父者也孔子母死殯扵五父之衢人見之皆以爲葬問聊曼父之毋得合葬扵防此則聖人與臣同者也王笑曰善子順聞之問魏王曰李由安得斯言王曰假以自顯無傷也對曰虚造謗言以誣聖人非無傷也且夫明主之扵臣唯徳所在不以小疪妨大行也昔闘子文生扵淫女而不害其爲令尹今李由可則寵之何患扵人之言而使横生不然之說若欺有知則有知不受若欺凢人則凢人疑之必亦問臣則臣不為君之故誣祖以顯由也如此則群臣更知由惡此惡必聚矣所謂求自㓗而益其垢猶抱石以救溺愈不濟矣魏王使相國脩好於鄰國遂連和於趙趙王旣賔之而燕問子順曰今寡人𣣔来北狄不知其所以然荅曰誘之以其所利而與之通市則自至矣王曰寡人𣣔因而弱之若與交市分我國貨散於夷狄是強之也可乎荅曰夫𣣔與之市者将以我無用之貨取其有用之物是故所以弱之之術也王曰何謂我之無用彼之有用答曰衣服之物則有珠玉五采飲食之物則有酒醪五熟此即我之所有而彼所利者也夷狄之貨唯牛馬􅏧裘弓矢之噐是其所饒而䡖以與人者也以吾所有易彼所饒如斯不巳則夷狄之用将糜於衣食矣殆可舉捶而驅之豈徒弱之而巳乎趙王曰敬受教枚産謂子順曰臣匱於財聞猗頓善殖貨𣣔學之先生同國也當知其術願以告我荅曰然知之猗頓魯之窮士也耕則常飢桑則長寒聞陶朱公富徃而問術焉朱公告之曰子𣣔速富當畜五牸於是乃適西河大畜牛羊于猗氏之南十年之間其滋息不可計貲擬王公馳名天下以興富於猗氏故富猗頓且夫爲富者非唯一術今子徒問猗頓何也枚産曰亦将問之於先生也答曰吾貧而子問以富術縱有其術是不可用之術也昔人有言能得長生者道士聞而𣣔學之比徃言者死矣道士髙蹈而恨夫所𣣔學學不死也其人巳死而猶恨之是不知所以爲學也今子𣣔求殖貨而問術於我我且自貧安能教子以富乎子之此問有是道士之學不死也東里閭空腹而好自賢𣣔自親於子順子順弗下顔或曰夫君子之交於世士亦取其一節而已今東閭子䟽逹亮直大丈夫也求爲先生役而先生無意接之斯者無乃非周公之交人乎子順曰此吾所以行周公之行也夫東閭子外質頑拙有似䟽直然内懐容媚謟鬽非大丈夫之節也若其度骸稱膚面目鬢眉實羙於聖人論士不以爲貴者無益於徳故也然東閭子中不應外侮慢世士即所謂愚人而謂人爲愚者也恃其虚狀以不徳於人此乃周公之所罪何交之有宫佗見子順曰佗困於貧賤将𣣔自託富貴之門庶克免乎子順曰夫富而可以託貧貴而可以寄賤者天下寡矣非信義君子明識窮逹則不可今子所𣣔託者誰也宫佗曰将適趙公子子順曰非其人矣雖好養士自奉而已終弗能稱也宫佗曰将適燕相國子順曰彼徒兄第甥舅各濟其私無求賢之志不足歸也宫佗曰将適齊田氏子順曰齊大國也其士大夫皆有自多之心不能容子也佗曰然則何嚮而可子順曰吾弗識也宫佗曰唯先生知人願告所擇将徃庇焉子順曰濟子之𣣔則宜若郈成子者也昔郈成子自魯聘晉過乎衛右宰榖臣止而觴之陳樂而不作送以寳璧反過而不辭其僕曰日者右宰之觴吾子甚歡也今過而不辭何也成子曰夫止而觴我與我歡也陳樂而不作告我哀也送我以璧寄之我也若由此觀之衛其有亂乎過衛三十里聞寗喜作難右宰死之還車而臨三舉而歸反命于君乃使人迎其妻子隔宅而居之分禄而食之其子長而反其璧夫子聞之曰智可與微謀仁可與託孤廉可以寄財者其郈成子之謂乎今子求若人之比庇焉可也宫佗曰循先生之言舎先生将安之請從執事子順辭不得巳乃言之魏王而升諸朝子順相魏改嬖寵之官以事賢才奪無任之禄以賜有功諸䘮職秩者不恱乃造謗言文咨以告且曰夫不害前政而有成孰與變之而起謗哉子順曰民之不可與慮始乆矣古之善爲政者其𥘉不能無謗子産相鄭三年而後謗止吾先君之相魯三月而後謗止今吾爲政日新雖不能及聖賢庸知謗止獨無時乎文咨曰子産之謗嘗亦聞之未識先君之謗何也子順曰先君𥘉相魯魯人謗誦曰麛裘而芾投之無戾芾之麛裘投之無郵及三月政成化行民又作誦曰衮衣章甫實獲我所章甫衮衣惠我無私文咨喜曰乃今知先生亦不異乎聖賢矣魏王謂子順曰吾𣣔致天下之士柰何子順對曰昔周穆王問祭公謀父曰吾𣣔得天下賢才對曰去其帝王之色則㡬乎得賢才矣今臣亦請君去其尊貴之色而巳王曰吾𣣔得無𣣔之士爲臣何如子順曰人之可使以有𣣔也故𣣔多者其所得用亦多𣣔少者其所得用亦少矣夷齊無𣣔雖文武不能制君安得而臣之論勢第十六魏王問相國曰今秦負強以無道陵天下天下莫不患寡人𣣔豁國之半以親諸侯求從事於秦可乎子順對曰以臣觀之殆無益也今天下諸侯畏秦之日乆矣數𬒳其毒無欲復之之志心無所計委國於逰說之士逰說之士挾強秦以爲資賣其國以收利义手服從曽不能制如君之謀未獲其利而秪以爲名適足以速秦之首誅則無以得之不如守常以湏其變也王曰秦其遂有天下乎對曰必然雖然取不以義得不以道自古以來未有能終之者五國約而誅秦子順㑹之秦未入境而還諸侯留兵於成臯子順謂市丘子曰此師楚爲之主今兵罷而不散殆有異意君其備諸市丘子曰先生幸而教之願以國寄先生子順許諾遂見楚王曰王約五國而西伐秦事旣而不集又乆師於市丘謗君者或以君欲攻市丘以償兵費天下之士且以是䡖君而重秦且又不義君之爲矣王何不卜交乎楚王曰柰何子順曰王今岀令使五國勿攻市丘五國重王則聴王之令矣不重王則且反王之令而攻市丘以此卜五國交王之䡖重必明矣楚王敬諾而五國散趙聞魏将以求親於秦子順謂趙王曰此君之下吏計過也比目之魚所以不見得於人者以耦視而俱走也今秦有兼吞天下之志日夜伺間不忘於側息趙魏與之鄰接而強弱不敵秦所以不敢圖并趙魏者徒以二國併目周旋者也今無故自離以資強秦天下拙謀無過此者故臣曰君之下吏計過也夫連雞不能上棲亦猶二國構難不能自免於秦也願王熟慮之趙王曰敬受教韓與魏有隙子順謂韓王曰昭釐侯一世之明君也申不害一世之賢相也韓與衞敵侔肩國而釐侯執圭見梁君者非好卑而惡尊慮過而計失也與嚴敵爲鄰而動有㓕亡之變獨勁不能支二難故降心以相從屈己以求存也申不害慮事而言忠臣也昭釐侯聴而行之明君也今韓弱於始之韓魏均於始之魏秦強於始之秦而背先人之舊好以區區之衆居二敵之間非良䇿也齊楚逺而難恃秦魏呼吸而至舎近而求逺是以虚名自累而不免近敵之困者也爲王計者莫如除小忿全大好也吳越之人同舟濟江中流遇風波其相救如左右手者所患同也今不恤所同之患是不如吳越之舟人也韓王曰善秦兵攻趙魏大夫以爲於魏便子順曰何謂曰勝趙則吾因而服焉不勝趙則可乗弊而擊之子順曰不然秦自孝公以來戰未甞屈今皆良将何弊之乗大夫曰縱其勝趙於我何損鄰之不脩國之福也子順曰秦貪暴之國也勝趙必復他求吾恐於時受其師也先人有言燕雀處屋子母相哺喣喣焉其相樂也自以爲安矣竈突决上棟宇将焚燕雀顔色不變不知禍之将及巳也今子不悟趙破患将及己可以人而同於燕雀乎齊攻趙圍廩丘趙使孔青師五萬撃之尅齊軍獲尸三萬趙王詔勿歸其尸将以困之子順聘趙問王曰不歸尸其困何也曰其父兄子弟悲苦無巳廢其産也子順曰非所以窮之也死一也歸尸與不歸悲苦胡異焉以臣愚計貧齊之術乃冝歸尸王曰何謂對曰使其家逺來迎尸不得事農一費也歸所葬使其送死終事二費也一年之中䘮卒三萬三費也欲無困貧不能得巳王曰善既而齊大夫聞子順之謀曰君子之謀其利博哉子順相魏凡九月陳大計輙不用乃喟然曰不見用是吾言之不當也言不當於主而居人之官食人之禄是尸利也尸利素飱吾罪深矣退而以病致事魏王遣使入其舘謝曰寡人昧於政事不顯明是非以啓罪於先生今知改矣願先生爲百姓故幸起而教之辭曰臣有犬馬之疾不任國事苟得從四民之列子弟供魏國之征乃君惠也敢辱君命以速刑書人謂子順曰王不用子子其行乎答曰吾将行如之山東則山東之國将并於秦秦爲不義義所不入遂寝于家秦急攻魏魏王恐或謂子順曰如之何答曰吾私有計然豈能賢於執政故無言焉魏王聞之駕如孔氏親問焉曰國亡矣如之何對曰夫棄之不如用之之易也死之不如棄之之易也人能棄之弗能用也能死之不能棄也此人過也今王亡地數百里亡城數十而患不解是王棄之非用之也秦之強天下無敵魏之弱甚矣而王是以質秦此王能死不能棄之也是重過也若能用臣之計則虧地不足傷卑國體不足苦身患觧而怨報矣今秦四境之内執政以下固曰與嫪氏乎與吕氏乎雖門閭之下廊廟之上猶皆如是今王誠能割地賄秦以爲嫪毐功卑身尊秦以自嫪毐始王又以國賛嫪毐也則嫪毐勝矣於是太后之徳王也深如骨肉王之交最爲天下之上矣孰不棄吕氏而從嫪毐天下皆然則王怨必報矣執節第十七趙孝成王問曰昔伊尹爲臣而放其君其君不怨何可而得乎此也子順答曰伊尹執人臣之節而弼其君以禮亦行此道而巳矣王曰方以放君爲名而先生稱禮何也子順曰以禮括其君使入於善也曰其說可得聞乎答曰其在商書太甲嗣立而干冡宰之政伊尹曰惟王舊行不義習與性成予不狎于不順王姑即桐邇干先王其訓㒺以後人迷王徃居憂允思厥祖之明徳是言太甲在䘮不明乎人子之道而欲知政於是伊尹使之居桐近湯之墓處憂哀之地放之不得知政三年服竟然後反之即所以奉禮執節事大甲者也率其君以義強其君以孝道未有行此見怨也王曰善哉我未之聞也魏安釐王問子順曰馬回之爲人雖少才文梗梗亮直有大丈夫之節吾欲以爲相可乎答曰知臣莫若君何有不可至於亮直之節臣未明也王曰何故答曰聞諸孫卿云其爲人也長目而豕視者必體方而心貟毎以其法相人千百不失臣見回非不偉其體幹也然甚疑其目王卒用之三月果以謟得罪新垣固謂子順曰賢者所在必興化致治今子相衞未聞異政而即自退其有志不得乎何去之速也答曰以無異政所以自退也且死病無良醫今秦有吞食天下之心以義事之固不獲安救亡不睱何化之興昔伊摯在夏吕望在商而二國不理豈伊吕之不欲哉勢不可也當如今日山東之國弊而不振三晋割地以求安二周折節而入秦燕齊宋楚楚巳屈服矣以此觀之不岀二十年天下盡爲秦乎季節見於子順子順賜之酒辭問其故對曰今日家之忌日也故不敢飲子順曰飲也禮雖服衰麻見於君及先生與之粱肉無辭所以敬尊長而不敢遂其私也忌日方於有服則䡖矣魏安釐王問天下之髙士子順曰世無其人也抑可以爲次其魯仲連乎王曰魯仲連強作之者非體自然也答曰人皆作之作之不止乃成君子文武欲作堯舜而至焉昔我先君夫子欲作文武而至焉作之不變習與體成則自然矣虞卿著書名曰春秋魏齊曰子無然也春秋孔聖所以名經也今子之書大抵談說而巳亦以爲名何答曰經者取其事常也可常則爲經矣且不爲孔子其無經乎齊問子順子順曰無傷也魯之史記曰春秋經因以爲名焉又晏子之書亦曰春秋吾聞㤗山之上封禪者七十有二君其見稱述數不盈十所謂貴賤不嫌同名也邯郸之民以正月之旦獻雀於趙王而綴之以五綵趙王大恱申叔以告子順子順曰王何以爲也對曰正旦放之示有生也子順曰此委巷之鄙事爾非先王之法也且又不令申叔曰敢問何謂不令答曰夫雀者取其名焉則宜受之於上不宜取之於下下人非所得制爵也而王恱此殆非吉祥矣昔􅉑公祈神神賜之土田是失國而更受田之祥也今以一國之王受民之雀将何恱哉申叔問曰犬馬之名皆因其形色而名焉唯韓盧宋鵲獨否何也子順答曰盧黒色鵲白黒色非色而何魏公子無忌死韓君将親吊焉其子榮之以告子順子順曰必辭之禮鄰國君吊君爲之主今君不命子則子無所受韓君也其子辭韓韓君乃止子髙以爲趙平原君覇相之一作覇世之士惜不遇其時也其子子順以爲衰世之好事公子無覇相之才也申叔問子順曰子之家公有道先生旣論之矣今子易之是非焉在答曰言貴盡心亦各其所見也若是非則明智者裁之申叔問子順曰禮爲人臣三諌不從可以稱其君之非乎答曰禮所不得也曰叔也昔者逮事有道先生問此義焉而告叔曰得稱其非者所以欲天下人君使不敢遂其非也子順曰然吾亦聞之是亡考起時之言非禮意也禮受放之臣不說人以無罪先君夫子曰事君欲諌不欲陳言不欲顯君之非也申叔曰然則晏子叔向皆非禮也答曰此二大夫相與私燕言及國事未爲非禮也晏子既陳履賤而踊貴於君其君爲之省刑然後以及叔向叔向聴晏子之私又承其問所宜亦答以其事也魏王問子順曰寡人聞昔者上天神異后稷而爲之下嘉糓周以遂興徃者中山之地無故有榖非人所爲云天雨之反亡國何故也答曰天雖至神自古及今未聞下榖與人也詩羙后稷能大教民種榖嘉以利天下故詩曰誕降嘉種猶書所謂稷降播種農植嘉榖皆說種之其義一也若中山之榖妖恠之事非所謂天祥也趙王問相於平原君平原君曰鄒文可王曰其行如何對曰夫孔子髙天下之髙士也取友以行交逰以道文與之逰稱曰好義王其用之王卒不用後以平原君言問子順且曰先生知之乎答曰先父之所交也何敢不知王曰寡人雖失之在前猶願聞其行於先生也答曰行不苟合雖賤不渝君子人也王遂禮之固以老辭趙王謂子順曰寡人聞孔氏之世自正考甫以來儒林相繼仲尼重之以大聖自茲以降世業不替天下諸侯咸賔禮焉先生承緒作二國師從古及今載徳流聲未有若先生之家者也先生之嗣率由前訓将與天地相敵矣答曰若先祖父並禀聖人之性如君王之言也至如臣者學行不敏寄食於趙祿仕於魏幸遇二國之君寛以容之若乃師也未敢承命假令頼君之福願後世克祚不忝前人不泯祖業豈徒一家之賜哉亦天下之慶也王曰必然必然孔叢子卷第五

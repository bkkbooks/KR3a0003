body:
  text: 孔叢子記先聖之遺訓與世家有足稽者近世鮮所流傳今夏官貳卿林公填江右時取其書刋之以惠學者既而召去余適繼至得書以此爲託且曰挍讎之未精也因取而閱之譌至多蓫訪得蜀書意其據而脫繆乃滋甚幸有可以互見者又旁證逺取凢刋誤㡬六百字今可讀矣然前軰謂挍書如几塵隨去隨有故歐陽公讀韓乆得石刻益知讎正之難因書其末以諗後之君子淳熈戊申七月濡湏王藺書

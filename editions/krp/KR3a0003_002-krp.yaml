body:
  text: 孔叢子卷第二刑論第四仲弓問古之刑教與今之刑教孔子曰古之刑省今之刑繁其爲教古有禮然後有刑是以刑省今無禮以教而齊之以刑刑是以繁書曰伯夷降典折民維刑謂下禮以教之然後維以刑折之也夫無禮則民無耻而正之以刑故民苟免孔子適衞衞将軍文子問曰吾聞魯公父氏不䏻聴獄信乎孔子答曰不知其不能也夫公父氏之聴獄有罪者懼無罪者恥文子曰有罪者懼是聴之察刑之當也無罪者恥何乎孔子曰齊之以禮則民恥矣刑以止刑則民懼矣文子曰今齊之以刑刑猶弗勝何禮之齊孔子曰以禮齊民譬之於御則轡也以刑齊民譬之於御則鞭也執轡扵此而動扵彼御之良也無轡而用䇿則馬失道矣文子曰以御言之右手執轡左手運䇿不亦速乎若徒轡無䇿馬何懼哉孔子曰吾聞古之善御者執轡如組两驂如舞非䇿之助也是以先王盛於禮而薄於刑故民從命今也廢禮而尚刑故民彌暴文子曰呉越之俗無禮而亦治何也孔子曰夫呉越之俗男女無别同川而浴民䡖相犯故其刑重而不勝由無禮也中國之教爲外内以别男女異噐服以殊等類故其民篤而法其刑䡖而勝由有禮也孔子曰民之所以生者衣食也上不教民民匱其生飢寒切扵身而不爲非者寡矣故古之於盗惡之而不殺也今不先其教而一殺之是以罰行而善不反刑張而罪不省夫赤子知慕其父毋由審故也况乎爲政興其賢者而廢其不賢以化民乎知審此二者則上盗先息書曰兹殷罰有倫子張問曰何謂也孔子曰不失其理之謂也今諸侯不同徳毎君異法折獄無倫以意爲限是故知法之難也子張曰古之知法者與今之知法者異乎孔子曰古之知法者䏻逺獄今之知法者不失有罪不失有罪其於恕寡矣能逺於獄其於防深矣寡恕近乎濫防深治乎本書曰維敬五刑以成三徳言敬刑所以爲徳矣書曰非從維從孔子曰君子之扵人也有不語也無不聴也况聴訟乎必盡其辭矣夫聴訟者或從其情或從其辭辭不可從必断以情書曰人有小罪非眚乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟眚災適爾旣道極厥辜時乃不可殺曽子問聴獄之術孔子曰其大法也三焉治必以寛寛之之術歸於察察之之術歸於義是故聴而不寛是亂也寛而不察是慢也察而不中義是私也私則民怨故善聴者聴不越辭辭不越情情不越義書曰上下比罰亡僣亂辭書曰哀敬折獄仲弓問曰何謂也孔子曰古之聴訟者察貧賤哀孤獨及鰥寡老弱不肖而無告者雖得其情必哀矜之死者不可生断者不可屬若老而刑之謂之悖弱而刑之謂之克不赦過謂之逆率過以小罪謂之抧故宥過赦小罪老弱不受刑先王之道也書曰大辟疑赦又曰與其殺不辜寕失不經書曰若保赤子子張問曰聴訟可以若此乎孔子曰可哉古之聴訟者惡其意不惡其人求所以生之不得其所以生乃刑之君必與衆共焉愛民而重弃之也今之聴訟者不惡其意而惡其人求所以殺是反古之道也孟氏之臣叛武伯問孔子曰如之何答曰臣人而叛天下所不容也其将自反子姑待之三旬果自歸孟氏武伯将執之訪扵夫子夫子曰無也子之於臣禮意不至是以去子今其自反罪以反除又何執焉子脩禮以待之則臣去子将安徃武伯乃止記問第五夫子閒居喟然而嘆子思再拜請曰意子孫不脩将忝祖乎羡堯舜之道恨不及乎夫子曰爾孺子安知吾志子思對曰伋於進膳亟聞夫子之教其父析薪其子弗克負荷是謂不肖伋毎思之所以大恐而不懈也夫子忻然笑曰然乎吾無憂矣世不廢業其克昌乎子思問於夫子曰爲人君者莫不知任賢之逸也而不䏻用賢何故子曰非不𣣔也所以官人失䏻者由於不明也其君以譽爲賞以毀爲罰賢者不居焉子思問於夫子曰亟聞夫子之詔正俗化民之政莫善於禮樂也管子任法以治齊而天下稱仁焉是法與禮樂異用而同功也何必但禮樂哉子曰堯舜之化百世不輟仁義之風逺也管仲任法身死則法息嚴而寡㤙也若管仲之知足以定法材非管仲而專任法終必亂成矣子思問於夫子曰物有形類事有真偽必審之奚由子曰由乎心心之精神是乎聖推數究理不以物疑周其所察聖人難諸趙簡子使聘夫子夫子将至焉及河聞竇鳴犢與舜華之見殺也孔子家語云殺竇凖鳴犢及舜華又云趙簡子湏此二人而後從政則竇凖鳴犢爲一人舜華爲一人也史記世家云竇鳴犢與舜華徐廣注云或作鳴鐸竇凖今備存之逥輿而旋之衞息鄹遂爲操曰周道衰微禮樂凌遅文武既墜吾将焉師周逰天下靡邦可依鳯鳥不識珍寳梟鴟眷然顧之慘焉心悲巾車命駕将適唐都黄河洋洋悠悠之魚臨津不濟還轅息鄹傷子道窮哀彼無辜翶翔于衞復我舊廬從吾所好其樂只且哀公使以幣如衞迎夫子而卒不能當故夫子作丘陵之歌曰登彼丘陵峛崺其阪仁道在邇求之若逺遂迷不復自嬰屯蹇喟然囬慮題彼㤗山欝確其髙梁甫囬連枳棘充路陟之無縁将伐無柯患茲蔓延惟以永歎涕霣潺湲楚王使使奉金帛聘夫子宰予冉有曰夫子之道於是行矣遂請見問夫子曰太公勤身苦志八十而遇文王孰與許由之賢夫子曰許由獨善其身者也太公兼利天下者也然今世無文王之君也雖有太公孰能識之乃歌曰大道隱兮禮爲基賢人竄兮将待時天下如一欲何之一作待清時叔孫氏之車卒曰子鉏商樵於野而獲獸焉衆莫之識以爲不祥棄之五父之衢冉有告夫子曰有􅍪而肉角豈天之妖乎夫子曰今何在吾将觀焉遂徃謂其御髙柴曰若求之言其必麟乎到視之果信言偃問曰飛者宗鳯走者宗麟爲其難致也敢問今見其誰應之子曰天子布徳将致太平則麟鳯龜龍先爲之祥今周宗将㓕天下無主孰爲來哉遂泣曰予之於人猶麟之於獸也麟出而死吾道窮矣乃歌曰唐虞世兮麟鳯逰今非其時來何求麟兮麟兮我心憂雜訓第六子上請所習於子思子思曰先人有訓焉學必由聖所以致其材也厲必由砥所以致其刃也故夫子之教必始扵詩書而終於禮樂雜說不與焉又何請子思謂子上曰白乎吾嘗深有思而莫之得也於學則窹焉吾嘗企有望而莫之見也登髙則覩焉是故雖有本性而加之以學則無惑矣懸子問子思曰吾聞同聲者相求同志者相好子之先君見子産則兄事之而世謂子産仁愛稱夫子聖人是謂聖道事仁愛也吾未諭其人之孰先後也故質於子子思曰然子之問也昔季孫問子㳺亦若子之言也子㳺荅曰以子産之仁愛譬夫子其猶浸水之與膏雨乎康子曰子産死鄭人丈夫舍玞珮婦女舎珠瑱巷哭三月竽瑟不作夫子之死也吾未聞魯人之若是也奚故哉子㳺曰夫浸水之所及也則生其所不及則死故民皆知焉膏雨之所生也廣莫大焉民之受賜也普矣莫識其由來者上徳不徳是以無徳季孫曰善懸子曰其然孟子車尚㓜請見子思子思見之甚恱其志命子上侍坐焉禮敬子車甚崇子上不願也客退子上請曰白聞士無介不見女無媒不嫁孟孺子無介而見大人恱而敬之白也未諭敢問子思曰然吾昔從夫子於郯遇程子於途傾盖而語終日而别命子路将束帛贈焉以其道同於君子也今孟子車孺子也言稱堯舜性樂仁義世所希有也事之猶可况加敬乎非爾所及也子思在魯使以書如衞問子上子上北面再拜受書伏讀然後與者宴遂爲復書返中庭北面再拜以授使者旣受書然後退使者還魯問子思曰吾子堂上南面立授臣書事畢送臣子上中庭拜授臣書而不送何也子思曰拜而不送敬也使人而送之賔也魯人有同姓死而弗吊者人曰在禮當免不免當吊不吊有司罰之如之何子之無吊也荅曰吾以其䟽逺也子思聞之曰無恩之甚也昔者季孫問於夫子曰百世之宗有絶道乎子曰繼之以姓義無絶也故同姓爲宗合族爲屬雖國君之尊不廢其親所以崇愛也是以綴之食序列之昭穆萬世婚姻不通忠篤之道然也魯穆公訪於子思曰寡人不徳嗣先君之業三年矣未知所以爲令名者且欲掩先君之惡以揚先君之善使談者有述焉爲之若何願先生教之也子思荅曰以伋所聞舜禹之於其父非勿欲也以爲私情之細不如公義之大故弗敢私之焉耳責以虚餙之教又非伋所得言公曰思之可以利民者子思曰願有惠百姓之心則莫如一切除非法之事也毁不居之室以賜窮民奪嬖寵之禄以振困匱無令人有悲怨而後世有聞見抑亦可乎公曰諾縣子問子思曰顔囬問爲邦夫子曰行夏之時若是殷周異政爲非乎子思曰夏數得天堯舜之所同也殷周之王征伐革命以應乎天因改正朔若云天時之改爾故不相因也夫受禪於人者則襲其綂受命於天者則革之所以神其事如天道之變然也三綂之義夏得其正是以夫子云穆公問於子思曰立太子有常乎荅曰有之在周公之典公曰昔文王舎適而立其次㣲子舎孫而立其弟是何法也子思曰殷人質而尊其尊故立弟周人文而親其親故立子亦各其禮也文質不同其禮則異文王舎適立其次權也公曰苟得行權豈唯聖人唯賢與愛立也子思曰聖人不以權教故立制垂法順之爲貴若必欲犯何有於異公曰舎賢立聖舎愚立賢何如子思曰唯聖立聖其文王乎不及文王者則各賢其所愛不殊於適何以限之必不能審賢愚之分請父兄群臣卜於祖廟亦權之可也孟軻問牧民何先子思曰先利之曰君子之所以教民亦有仁義而巳矣何必曰利子思曰仁義固所以利之也上不仁則下不得其所上不義則下樂爲亂也此爲不利大矣故易曰利者義之和也又曰利用安身以崇徳也此皆利之大者也居衞第七子思居衞言茍變於衞君曰其材可将五百乗君任軍旅率得此人則無敵於天下矣衞君曰吾知其材可将然變也嘗爲吏賦於民而食人二鷄子以故弗用也子思曰夫聖人之官人猶大匠之用木也取其所長棄其所短故𣏌梓連抱而有數尺之朽良工不棄何也知其所妨者細也卒成不訾之噐今君䖏戰國之世選瓜牙之士而以二卵焉棄干城之将此不可使聞於鄰國者也衞君再拜曰謹受教矣子思適齊齊君之嬖臣羙鬚眉立乎側齊君指之而笑且言曰假貌可相易寡人不惜此之鬚眉於先生也子思曰非所願也所願者唯君脩禮義富百姓而伋得寄帑於君之境内從襁負之列其庸多矣若無此鬚鬛非伋所病也昔堯身脩十尺眉乃八彩實聖舜身脩八尺有竒面頷無毛亦聖禹湯文武及周公勤思勞體或折臂望視或秃骭背僂亦聖不以鬚眉羙鬛爲稱也人之賢聖在徳豈在貌乎且吾先君生無鬚眉而天下王侯不以此損其敬由是言之伋徒患徳之不邵不病毛鬢之不茂也子思謂子上曰有可以爲公侯之尊而富貴人衆不與焉者非唯志乎成其志者非唯無欲乎夫錦繢紛華所服不過温體三牲大牢所食不過充腹知以身取節者則知足矣苟知足則不累其志矣曽子謂子思曰昔者吾從夫子遊於諸侯夫子未嘗失人臣之禮而猶聖道不行今吾觀子有傲世主之心無乃不容乎子思曰時移世異各有冝也當吾先君周制雖毁君臣固位上下相持若一體然夫欲行其道不執禮以求之則不能入也今天下諸侯方欲力争競招英雄以自輔翼此乃得士則昌失士則亡之秋也伋於此時不自髙人将下吾不自貴人将賤吾舜禹揖譲湯武用師非故相詭乃各時也子思在齊齊尹文子生子不類怒而杖之告子思曰此非吾子也吾妻殆不婦吾将黜之子思曰若子之言則堯舜之妃復可疑也此二帝聖者之英而丹朱商鈞不及匹夫以是推之豈可類乎然舉其多者有此父斯有此子人道之常也若夫賢父之有愚子此由天道自然非子之妻之罪也尹文子曰先生止之願無言文留妻矣孟軻問子思曰堯舜文武之道可力而致乎子思曰彼人也我人也稱其言履其行夜思之晝行之滋滋焉汲汲焉如農之赴時商之趣相惡有不至者乎子思謂孟軻曰自大而不脩其所以大不大矣自異而不脩其所以異不異矣故君子髙其行則人莫能偕也逺其志則人莫能及也禮接於人人不敢慢辭交於人人不敢侮其唯髙逺乎申祥問曰殷人自契至湯而王周人自弃至武王而王同嚳之後也周人追王大王王季文王而殷人獨否何也子思曰文質之異也周人之所追大王王迹起焉又曰文王受命㫁虞芮之訟伐崇邦退犬夷追王大王王季何也子思曰狄人攻大王大王召耆老而問焉曰狄人何來耆老曰欲得菽粟財貨大王曰與之與之至無狄人不止大王又問耆老曰狄人何欲耆老曰欲土地大王曰與之耆老曰君不爲社稷乎大王曰社稷所以爲民也不可以所爲亡民也耆老曰君縱不爲社稷不爲宗廟乎大王曰宗廟者私也不可以吾私害民遂杖䇿而去過梁山止乎𡵨下豳民之束脩奔而從之者三千乗一止而成三千乗之邑此王道之端也成王於是追而王之王季其子也承其業廣其基焉雖同追王不亦可乎羊客問子思曰古之帝王中分天下使二公治之謂之二伯周自后稷封爲王者後子孫據國至大王王季文王此固世爲諸侯矣焉得爲西伯乎子思曰吾聞諸子夏殷王帝乙之時王季以功九命作伯受珪瓉秬鬯之賜故文王因之得專征伐此以諸侯爲伯猶周召之君爲伯也子思年十六適宋宋大夫樂朔與之言學焉朔曰尚書虞夏數四篇善也下此以訖于秦費効堯舜之言耳殊不如也子思荅曰事變有極正自當爾假令周公堯舜更時易䖏其書同矣樂朔曰凡書之作欲以喻民也簡易爲上而乃故作難知之辭不亦繁乎子思曰書之意兼複深奥訓詁成義古人所以爲典雅也昔魯委巷亦有似君之言者伋荅之曰道爲知者傳苟非其人道不貴矣今君何似之甚也樂朔不恱而退曰孺子辱吾其徒曰此雖以宋爲舊然世有讐焉請攻之遂圍子思宋君聞之駕而救子思子思既免曰文王厄於牗里作周易祖君屈於陳蔡作春秋吾困於宋可無作乎於是撰中庸之書四十九篇孔叢子卷第二

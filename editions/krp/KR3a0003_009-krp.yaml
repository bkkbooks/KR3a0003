body:
  text: 孔叢子釋文嘉言第一萇音長安施商移切或弛詩止切好禮虚到切事夫風無切使于䟽吏切遇虺許偉切後瘳丒鳩切與在音預爲病于僞切夫三折上音扶下食列切巳之巳人巳並養里切下巳之同既宴伊甸切夫死音扶與計音預盍姑巳上轄臘切下音巳夫以音扶繫方胡計切又吉詣切下繫絶同塡之堂練切巳矣音以冨說輸䙝切知者音智夫不音扶論書第二曠夫風無切巳殁音以巳之音紀肜日以中切之惡烏各切論事盧困切錯行七各切樂之音落下同愀然七小切而巳音巳惡覩音烏大麓音鹿己而音以迷錯七各切死難奴旦切與於音預祗祗㫖夷切刑錯七故切三監古咸切所任汝鴆切應之去聲之長展两切記義第三鍾餼許記切施人施智切相室息亮切從死才用切長者两切好人虚到切譽巳音紀任臣汝鴆切下自任同巳耳音以巳巳並音以使宰爽士切舎實音捨私昵足質切亦作暱䧟辟彼亦切淇澳乙六切苞苴子余切好賢呼告切下好賢同豳公悲巾切亦作邠造周在早切與於音預蓼莪力竹切裳裳如字清澈敕列切爲施商移切刑論第四刑省所景切降典古巷切折民之列切弗勝詩證切又書蒸切下同無别彼列切下同刑重直隴切民匱求位切惡之烏故切不省所景切夫赤音扶折獄之烈切非從牆容切則巳音以適爯施隻切不中陟仲切比罰卑履切㫁者徒玩切之悖蒲没刃之抧諸氏切亦作疻惡其烏故切下同閒居音閑記問第五孔伋音級析薪先的切負荷下可切任賢汝鵷切亟聞訖力切任法汝鵷切之知音智難諸那干切竇犫蚩周切息鄹側鳩切亦作鄒操曰七到切已得音以焉師於䖍切梟鴟上堅堯切慘焉尤䖍切所好虚到切只且上諸氏切下子余切使以爽士切峛崺上力𥿄切下移尔切自嬰伊盈切蔓延夷然切亦去聲永歎他干切涕霣羽敏切亦作隕使使上爽士切下䟽吏切車子斤於切又昌遮切鉏商牀魚切五父方矩切􅍪身居筠切又作麏麋同今見賢遍切應之於證切雜訓第六由砥諸氏切不與音預相好虚到切舎玦上音捨下古穴切珠瑱他甸切子車斤於切於郯徒丼切而别皮列切使以䟽吏切下同當免亡運切下同亦作纔䟽逺音䟽爲屬殊玉切令名力正切之惡烏各切以振音賑受禪時戰切舎適上音捨下音的下同居衞第七可將即亮切下同百乗䋲證切君任汝鴆切不訾即移切適齊施隻切相易夷益切寄帑與孥同有竒居冝切折臂食列切秃骭下晏切背僂隴主切不與音預大牢音㤗不累力僞切惡有音烏其行下孟切自契私列切亦作偰卨同嚳枯沷追王于况切大王音㤗不爲于僞切下爲民切千乗䋲證切焉得於䖍切珪瓉才賛切秬鬯上音鉅下丑亮切亶父扶雨切適宋施隻切樂朔音嶽巡守第八巡守音狩禪㤗時戰切亦作檀曰墠時戰切齊車側偕切舎奠上音釋納賈音價好惡上虚到切下烏故切墾辟音闢日齊側偕切公儀第九參音三要利伊消切其行下孟切過行下孟切胡毋音無甚易以豉切抗志第十鰥魚姑頑切一魴音房使乎䟽吏切和者胡卧切下同以長丁丈切無已音以下同故使爽士切舎所音捨必疣音尤期大居之切爲人于僞切府藏才浪切之分扶問切無伯如字又音覇汨之古忽切不禁居吟切適觸施隻切自累力僞切四乗䋲證切餼焉許既切祭膰符表切巳優音以下同行志户庚切食巳下音以重違直隴切巳言音以談說式銳切屬耳之欲切䘮也四浪切卒盡即律切小爾雅第十一莾艾牛盖切頒賦逋還切亦作朌樸博木切模臬倪結切徹勑列切造之七到切􅑒剗将廉切廣言害何曷葛切麗直畧切脩杼直吕切仳辨四彼切卬我俄剛切籲和俞戍切汨猾古忽切焮也香靳切烯乾欣衣切晞慘桑感切勦截楚夜切辟除北激切惎渠記切燀之稱延切瞢慙莫中切又莫鳯母亘二切偟徃胡光切狃􅏸上女九切下時制切殿填顛甸切下音鎮廣訓惡乎音烏韡韡羽鬼切魴鱮上符方切下象吕切麀鹿於丘切麌虞矩切曰哤莫江切廣義曰焭渠營切亦作惸曰婺陵之切屬婦時欲切非分扶問切曰戁乃版切曰恧女六切廣名之阽余廉切從先牆容切之賵撫鳯切之禭徐醉切之殔羊至切之竁昌縜切又充芮切廣服織繒慈陵切曰縞古老切紱謂分物切䄡䄖上蚩占切下容朱切紩之直質切之袡蚩㢘切幂莫狄切牀第壮土切鍵謂巨偃切筥居許切曰於求切之葚食荏切又作椹之橡徐雨切廣鳥白脰田候切鸒羊茹切廣獸之豻古賢切之􅚧子紅切槮也桑感切魚舎如字度跬一丘弭切之两力譲切量之盛時征切之溢戈質切衡銖慵朱切鏘龍輟切鍰胡関切公孫龍第十二盍徃轄臘切悖蒲沒切之令力政切兕徐姉切而䘮四浪切其行下孟切下同狹之音狎泥論音泛㡬能音機惡得音烏儒服第十三䈉色洽切而巳音以下巳行同與焉音預獲巳音巳比力卑履切訾音紫所䘮四浪切對魏王第十四與謀音預則射神夜切相揉忍九切相錯倉落切所䘮四浪切惡之烏故切下同呐呐懦物切陳士義第十五使者䟽吏切𬞞食音嗣一夫音膚降節如字夫豈音扶欲強巨两切必當丁浪切錕鋙上公渾切下五乎切皜然胡老切少寡燒照下下同相好虚到切折毀旃列切五父音甫合葬音閤大行下孟切撗生戸孟切由惡烏故切使相爽士切脩好虚到切而燕音宴強之如字不巳音以糜於旻悲切貲擬音資䟽逹音踈之行下孟切謟鬽音寐度骸唐各切稱膚赤證切論慮困切宫他唐何切又湯何切作難乃旦切相惡烏各切而臨力鳩切舎先音捨相魏悉亮切下同䘮職四浪切麛裘旻悲切而芾博盖切又方味切㡬乎音機論勢第十六求從将容切數𬒳色角切二難乃旦切自累力縋切質秦音致嫪毐上郎到切下哀改切在䘮如字執節第十七義強巨两切下強作同談說舒贅切省刑所省切問相悉亮切其行下孟切下以行同卒不遵律切學行下孟切詰墨第十八崇䘮蘇郎切惡禮烏故切苴絰子余切菅菲古顔切躬行户庚切隂重直隴切強諌其良切卒自遵律切獨治第十九易操倉躁切名鮒方遇切塞於桑則切媾音遘降殺上如字下色戒切之免音問弗父音甫問軍禮第二十齊戒側皆切下齊車三日齊同舎奠音釋訊䤋古獲切飲至於禁切絜齊側皆切荅問第二十一之知音智戾夫風無切當之如字度其唐落切下度天同施施余支切何施商移切三恪康落切第壮士切累累力追切使使上爽士切下䟽吏切霈然普盖切跌而田烈切無累力縋切决拾古穴切梟将堅堯切扛鼎古雙切􅵕獸𥘉衘切㕳㕳許拱切戇忿陟降切亦作惷舎旃音捨令圖力政切連叢子上第二十二相魏湘亮切將事即亮切蓼侯力竹切轉相思漿切䌓說遄熱切使永爽士切方帥音率駢闐音田貙犴上勅朱切下音岸乃夸音誇翳日於計切苑令力政切怔忪上朱誠切下朱容切䘮精四浪切登較古孝切孟賁逋昆切蹂猾柔首切至樂郎各切下同猗那上於宜切下奴何切飲燕音宴洗觶支義切兕觥序娣切鴞于堯切䘮已四浪切令考力政切蓼蟲盧皎切蠕蟲而兖切焉立於䖍切惡能音烏將焉於䖍切衎衎空旱切山霤力舊切雅好虚到切䙝事先烈切性分扶問切亢䟽上音抗下音踈知足音智謂強如字下同剛愎憑壁切稱此赤證切析理星歷切下剖析切溷殽上胡困切下河交切折其章烈切揆度唐落切㫁氣徒管切連叢子下第二十三行非下孟切令史力政切得與音預下同受釐虚其切亦作禧惡有音烏盍辭轄臘切為人于偽切請從才用切燕見音宴造其倉到切可度唐落切行髙下孟切别而彼列切交燕音宴綈素杜奚切以好虚到切又數色角切賑之止忍切爲贏餘䡖切取後音娶與殺音預荷巳音以有分扶問切惡乎音烏㡬於音機巳乎音以學知音智下同何居音基要禄音腰悵然丑亮切惡直烏故切知得音智下同省宗井切下切棬杯驅圎切乗陽神陵切孔叢子釋文孔叢子卷第七

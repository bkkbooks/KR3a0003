body:
  text: 孔叢子卷第六詰墨第十八墨子稱景公問晏子以孔子而不對又問三皆不對公曰以孔子語寡人者衆矣俱以爲賢聖也今問扵子而不對何也晏子曰嬰聞孔子之荆知白公謀而奉之以石乞勸下亂上教臣弑君非聖賢之行也詰之曰楚昭王之世夫子應聘如􅍮不用而反周旋乎陳宋齊衞楚昭王卒惠王立十年令尹子西乃召王孫勝以爲白公是時魯哀公十五年也夫子自衞反魯君五年矣白公立一年然後乃謀作亂亂作在哀公十六年秋也夫子巳卒十旬矣墨子雖􅁒謗毀聖人虚造妄言柰此年世不相值何墨子曰孔子之齊見景公公恱之封之以尼谿晏子曰不可夫儒倨法而自順立命而怠事崇䘮遂哀盛用繁禮其道不可以治國其學不可以導家公曰善詰之曰即如此言晏子爲非儒惡禮不􅁒崇䘮遂哀也察傳記晏子之所行未有以異扵儒焉又景公問所以爲政晏子答以禮云景公曰禮其可以治乎晏子曰禮扵政與天地並此則未有以惡於禮也晏桓子卒晏嬰斬衰枕草苴經帶杖菅菲食粥居于􅀝廬遂哀三年此又未以異扵儒也若䏻以口非之而躬行之晏子所弗爲墨子曰孔子怒景公之不封己乃􅀣鴟夷子皮扵田常之門詰之曰夫􅀣人爲其信己也記曰孔子適齊惡陳常而終不見常病之亦惡孔子交相惡而又徃仕其不然矣記又曰陳常殺其君孔子齊戒沐浴而朝請討之觀其終不􅀣子皮審矣墨子曰孔子爲魯司冦舎公家而奉季孫詰之曰若以季孫爲相司冦綂焉奉之自法也若附意季孫季孫旣離公室則孔子合之季孫旣受女樂則孔子去之季孫􅁒殺囚則孔子赦之非苟順之謂也墨子曰孔子厄扵陳蔡之間子路烹豚孔子不問肉之所由来而食之剥人之衣以沽酒孔子不問酒之所由来而飲之詰之曰所謂厄者沽買無䖏藜􅅅不粒乏食七日􅀂烹豚飲酒則何言乎厄斯不然矣且子路爲人勇扵見義縦有豚酒不以義不取之可知也又何問焉墨子曰孔子諸弟子子貢季路輔孔悝以亂衞陽虎亂魯弗肹以中牟畔􅃮雕開形殘詰之曰如此言衞之亂子貢季路爲之耶斯不待言而了矣陽虎􅁒見孔子孔子不見何弟子之有弗肹以中牟畔召孔子則有之矣爲孔子弟子未之聞也且􅃮雕開形殘非行巳之致何傷扵徳哉墨子曰孔子相魯齊景公患之謂晏子曰鄰有聖人國之憂也今孔子相魯爲之若何晏子對曰君其勿憂彼魯君弱主也孔子聖相也不如隂重孔子􅁒以相齊則必強諌魯君魯君不聴􅀅適齊君勿受則孔子困矣詰之曰案如此辭則景公晏子畏孔子之聖也而上云非聖賢之行上下相反若晏子悖可也不然則不然矣墨子曰孔子見景公公曰先生素不見晏子乎對曰晏子事三君而得順焉是爲三心所以不見也公告晏子晏子曰三君皆􅁒其國安是以嬰得順也聞君子獨立不慙扵影今孔子伐樹削迹不自以爲辱身窮陳蔡不自以爲約始吾望儒貴之今則疑之詰之曰若是乎孔子晏子交相毁也小人有之君子則否孔子曰靈公汙而晏子事之以整荘公怯而晏子事之以勇景公侈而晏子事之以儉晏子君子也梁丘㩀問晏子曰事三君而不同心而俱順焉仁人固多心乎晏子曰一心可以事百君百心不可以事一君故三君之心非一也而嬰之心非三也孔子聞之曰小子記之晏子以一心事三君君子也如此則孔子譽晏子非所謂毀而不見也景公問晏子曰若人之衆則有孔子賢乎對曰孔子者君子行有節者也晏子又曰盈成匡父之孝子兄之悌弟也其父尚爲孔子門人門人且以爲貴則其師亦不賎矣是則晏子亦譽孔子可知也夫徳之不脩巳之罪也不幸而屈扵人己之命也伐􅀣削迹絶粮七日何約乎哉若晏子以此而疑儒則晏子亦不足賢矣墨子曰景公登路􅆍聞哭聲問梁丘㨿對曰魯孔子之徒也其毋死服哀三年哭泣甚哀公曰豈不可哉晏子曰古者聖人非不䏻也而不爲者知其無􅀘扵死者而深害生事故也詰之曰墨子􅁒以親死不服三日哭而巳扵意安者卒自行之空用晏子爲引而同于己適證其非耳且晏子服父以禮則無縁非行禮者也曹明問子魚曰觀子詰墨者之辭事義相反墨者妄矣假使墨者復起對之乎答曰苟得其禮雖百墨吾亦明白焉失其正雖一人猶不䏻當前也墨子之所引者矯稱晏子晏子之善吾先君吾先君之善晏子其事庸盡乎曹明曰可得聞諸子魚曰昔齊景公問晏子曰吾􅁒善治可以覇諸侯乎對曰官未具也臣亟以聞而君未肯然也臣聞孔子聖人然猶居䖏勌惰廉隅不脩則原憲季羔侍血氣不休志意不通則仲由卜商侍徳不盛行不勤則顔閔冉雍侍今君之朝臣萬人立車千乗不善之政加於下民者衆矣未􅀎以聞者臣故曰官未備也此又晏子之善孔子者也曰晏平仲善與人交乆而敬之此又孔子之貴晏子者也曹明曰吾始謂墨子可疑今則决不妄疑矣獨治第十九子魚生扵戰國之世長扵兵戎之間然獨樂先王之道講習不倦季則謂子魚曰大丈夫不生則巳生則有云爲扵世者也今先生淡泊世務脩無用之業當身不􅀩其榮百姓不獲其利􅀼爲先生不取也子魚曰不如子之言也武者可以進取文者可與守成今天下􅀅擾擾焉終必有所定子脩武以􅂇之取吾脩文以􅂇之守不亦可乎且吾不才無軍旅之任徒䏻保其祖業優逰以卒􅀊者也秦始皇東并子魚謂其徒叔孫通曰子之學可矣盍仕乎對曰臣所學扵先生者不用扵今不可仕也子魚曰子之材􅀎見時變今為不用之學殆非子情也叔孫通遂辭去以法仕秦尹曽謂子魚曰子之誦讀先王之書􅀅奚以爲答曰爲治也世治則􅂇之行道世亂則獨治其身治之至也陳餘謂子魚曰秦􅀅㓕先王之籍而子爲書籍之主其危矣子魚曰吾不爲有用之學知吾者惟友秦非吾友吾何危哉然顧有可懼者必或求天下之書焚之書不出則有禍吾􅀅先藏之以待其求求至無患矣子魚居衞與張耳陳餘相善耳餘魏之名士也秦㓕魏求耳餘懼走㑹陳勝呉廣起兵扵陳􅁒以誅秦餘謂陳王曰今必􅁒定天下取王侯者其道莫若師賢而友智孔子之孫今在魏居亂世䏻正其行修其祖業不爲時變其父相魏以聖道輔戰國見利不易操名稱諸侯世有家法其人通材足以幹天下􅀶智足以慮未形必宗此人天下無敵矣陳王大恱遣使者齎千金加束帛以車三乗聘焉耳餘又使謂子魚曰天下之事巳可見矣今陳王興義兵討不義子宜速来以集其事王又聞子賢􅁒諮良謀虚意相望也子魚遂徃陳王郊迎而執其手議世務子魚以覇王之業勸之王恱其言遂尊以􅀶士爲太師諮度焉子魚名鮒甲陳人或謂之子鮒或稱孔甲陳勝旣立爲王其妻之父兄徃焉勝以衆賔待之長揖不拜無加其禮其妻之父怒曰怙亂僣號而傲長者不􅀎乆矣不辭而去陳王跪謝遂不爲顧王心慙焉遂􅃴愽士太師之舘而言曰予雖丈夫哉然塞扵禮義以啓扵姻婭唯先生幸訓誨之使免扵戾乎子魚曰王所問者善也敢固無辭而對乎今以禮言耶則禮無不拜且宗族婚媾又與衆賔異敬者也敬而加親自古以然也王曰雖巳失之扵前庶􅁒􅀵之扵後也願先生脩明其事必奉遵焉對曰昔唐堯内親九族外恊萬􅀖禮以婚爲昆弟妻之父母爲外舅姑由是明之則拜之可知夫婚親之義非宗賢之􅁼也雖自巳臣莫敢不敬昔魏信陵君嘗以此質臣之父臣之父曰扵諸毋之昆弟妻之諸父則以親配徳年齊以上雖拜之可也㓜扵巳者揖之可也此出扵人情而可常者也王曰善哉請問同姓而服不及者其制何邪對曰先王制禮雖國君有合族之道宗人掌其列繼之以姓而無别醊之以食而無殊各隨本属之隆殺属近則死爲之兑属逺則吊之而巳禮之正也是故臣之家哭子氏之别姓扵弗父之廟哭孔氏則扵夫子之廟此有㨿而然也周之道雖百世婚姻不通重先世之同體也王跪曰先生之言厥義愽哉寡人雖固敢不盡心問軍禮第二十陳王問大師曰行軍之禮可得備聞乎答曰天下有道禮樂征伐自天子出自天子出必以􅀊之孟秋賞軍師武人于朝簡練俊傑任用有功命􅀅選士以誅不義扵是孟冬以級授軍司徒榗朴北面而誓之誓于社以習其事先期五日大師筮扵祖廟擇吉日齋戒告于郊社禝宗廟旣筮則獻兆扵天子天子使有司以特牲告社告以所征之事而受命焉舎奠于帝學以受成然後乃􅁼上帝柴于郊以出以齊車遷廟之主及社主行大司馬職奉之無遷廟主則以幣帛皮圭告于祖禰謂之主命亦載齊車凢行主皮圭幣帛皆毎舎奠焉而後就舘主車止爲中門之外外門之之内廟主居于道左社主居于道右其所經名山大川皆􅀕告焉及敵所􅀅戰太史卜戰日卜右御先期三日有司明以敵人罪状告之史史定誓命戰日􅀅帥陳列車甲卒伍于軍門之前有司讀誥誓使周走三令五申既畢遂禱戰祈克于上帝然後即敵􅀅士戰全已克敵史擇吉日復禡於所征之地柴于上帝􅀕社奠祖以告克者不頓兵傷士也戰不克則不告也凡􅁼禡皆用甲丙戊庚壬之刚日有司簡功行賞不稽于時其用命者則加爵受賜于祖奠之前其奔北犯令者則加刑罰戮于社主之前然後鳴金振旅有司徧告捷于時所有事之山川既至舎于國外三日齋以特牛親格于祖禰然後入設奠以反主若主命則卒奠歛玉埋之于廟两階間反社主如􅀄迎之禮舎奠于帝學以訊馘告大享于群吏用備樂饗有功於祖廟舎爵䇿勲焉謂之飲至天子親征之禮也陳王曰其命􅀅出征則如之何太師曰古者大􅀅受命而岀則忘其國即戎帥陣則忘其家故天子命􅀅岀征親㓗盛服設奠于祖以詔之大􅀅先入軍吏畢􅀙皆北面再拜稽首而受天子當階􅀯面命授之節􅃏大􅀅受天子乃東面西向而揖之示弗御也然後告大社􅃁宰执蜃宜扵社之右南面授大􅀅大􅀅北面稽首再拜而受之承所頒賜于軍吏其出不􅁼其克不禡戰之所在有大山川則祈焉禱克于五帝捷則報之振旅復命簡異功勤親告廟告社而後適朝禮也王曰􅀅居軍中之禮勝敗之變則如之何大師曰􅀅帥尚左士卒尚右出國先􅄡入國後刃介胄在身執鋭在列雖君王不拜若不幸軍敗則馹􅀐赴告于天子載櫜韔天子素服􅂘于庫門之外三日大夫素服􅂘于社亦如之亡􅀅失城則皆􅂘七日天子使使迎于軍命􅀅師無請命然後􅀅帥結草自縳􅃝右肩而入盖䘮禮也王曰行古禮如何大師曰古之禮固爲於今也有其人行其禮則可無其人行其禮則民弗與也答問第二十一陳人有武臣謂子鮒曰夫聖人者誠髙材羙稱也吾謂聖人之智必見未形之前功垂扵身殁之後立教而戾夫弗犯吐言而辯事不破也子之先君可謂當之矣然韓子立法其所以異夫子之論者紛如也予毎探其意而校其事持久歴逺遏姦勤善韓氏未必非孔氏未必得也吾今而後乃知聖人無世不有爾前聖後聖法制固不一也若韓非者亦當世之聖人也子以為奚􅀂子鮒曰子信之為然是故未免凡俗也今世人有言髙者必以極天為稱言下者必以深渊為名是資世之談而無其實者也好事而穿鑿者必言經以自輔援聖以自賢􅁒以取信扵群愚而度其􅀃也若諸子之書其義皆然吾先君之所自志也請畧􅀃一隅而吾子審其信否焉武臣曰諾子鮒曰乃者趙韓魏共并知氏趙㐮子之行賞先加具臣而後有功韓非書云夫子善之引以張本然難之豈有不似哉然實非也何以明其然昔我先君以春秋哀公十六年四月巳丒卒至二十七年荀瑶與韓趙魏伐鄭遇陳坦而還是時夫子卒已十一年矣而晋四􅀸皆在也後悼公十四年知氏乃亡此先後甚逺而韓非公稱之曽無怍意則世多好事之徒皆非之罪也故吾以是然口扵小道塞耳扵諸子乆矣而子立尺表以度天直寸指以測渊豫大道而不悟信誣􅀃以疑聖殆非所望也武臣义手跪謝施施而退遂告人曰吾自以為學之愽矣而屈於孔氏方知學不在多要在精之也陳王問大師曰寡人不得為諸侯群賢所推而得南面稱􅀌其幸多矣今既頼二三君子且又􅁒規乆長之圖何施而可答曰信王之言萬世之福也敢稱古以對昔代殷乃興㓕継絶以為政首今誠法之則六國之不携抑乆之本王曰周存二代又有三恪其事云何答曰封夏殷之後以為二代紹虞帝之胤備為三恪恪敬也禮之如賔客也非謂特有二代别有三恪也凡所以立二代者備王道通三綂也王曰三綂者何答曰各自用其正朔二代與周是謂三統王曰六國之後君吾不􅀎封也逺世之王扵我何有吾亦自有不及扵周又安䏻純法之乎陳王渉讀國語言申生事顧􅀶士曰始余信聖賢之道乃今知其不誠也先生以為何如答曰王何謂哉王曰晋獻惑亂聴䜛而書又載􅌐􅁎夜泣公而以信入其言人之夫婦夜䖏幽室之中莫䏻知其􅀻焉雖黔首猶然况國君乎予以是知其不信乃好事者為之辭􅀅􅁒成其􅀃以誣愚俗也故使予并疑於聖人也􅀶士曰不然也古者人君外朝則有國史内朝則有女史舉則左史書之言則右史書之以無諱示後世善以為式惡以為戒廢而不記史失其官故凡若晋侯􅌐􅁎牀第之􅀻房中之事不得掩焉若夫設教之言驅群俗使人入道而不知其所以者也今此皆書實事累累若貫珠可無疑矣王曰先生真聖人之後也今幸得聞命寡人無過焉陳王渉使周章爲􅀅西入関􅀅以入秦秦使􅀅章邯距之陳王以秦國之亂也有䡖之之意􅀔若有餘而不設敵備􅀶士大師諌曰章邯秦之名􅀅周章非其敵也今王使霈然自得而不設備臣􅀼惑焉夫雖天之所命其禍福吉㓙大者在天小者由人今王不修人利以􅀿天祥若跌而不振悔之無及也王曰寡人之君先生無累也請先生息慮也又諌曰臣聞兵法無恃敵之不我功恃吾之不可攻也今恃敵而不自恃非良計也王曰先生所言計䇿􅀷妙予不識也先生休矣巳而告人曰儒者可與守成難與進取信哉􅀶士他日復諌曰臣聞國大兵衆無備難恃一人善射百夫决舎章邯梟􅀅卒皆死士也周章弱懦使彼席卷來前莫有當其􅄡者王曰先生所稱寡人昧昧焉願以人間近事喻之荅曰流俗之士臣所不忍也今王命之敢不盡情願王察之也臣昔在梁梁人有陽由者其力扛鼎伎巧過人骨騰肉飛手搏􅵕獸國人懼之然無治室之訓禮教不立妻不畏憚浸相媟瀆方乃積怒妻坐於牀荅焉由乃左手建杖右手制其頭妻亦􅁬恚因受以背使杖撃之而自撮其隂由乃什也氣絶而不能興鄰人聞其㓙㓙也窺而見之趣而救之妻愈戇忿莫肯舎旃或發其裳然後乃放夫以無敵之伎力而劣於女子之手者何以䡖之無備故也今王與秦角強弱非若由之夫妻也而䡖秦過甚臣是以懼故區區之心欲王備慮之也王曰譬􅀋誠佳然實不同也弗聴周章果敗而無後救邯遂進兵撃陳王師大敗􅀶士凡仕六旬老於陳􅀅設戒其弟㐮曰魯天下有仁義之國也戰國之時講誦不衰且先君之廟在焉吾謂叔孫通䖏濁世而清其身學儒術而知權變是今師也宗於有道必有令圖歸必事焉孔叢子卷第六

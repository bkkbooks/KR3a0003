body:
  text: 孔叢子卷第一嘉言第一夫子􅃴周見萇弘言繼退萇弘語劉文公曰吾觀孔仲尼有聖人之表河目而隆顙黄帝之形貌也脩肱而􅀛背長九尺有六寸成湯之容體也然言稱先王躬履廉譲洽聞強記愽物不窮抑亦聖人之興者乎劉子曰方今周室衰㣲而諸侯力争孔丘布衣聖􅀅安施萇弘曰堯舜文武之道或弛而墜禮樂崩䘮其亦正其綂紀而巳矣旣而夫子聞之曰吾豈敢哉亦好禮樂者也陳惠公大城因起凌陽之䑓未終而坐法死者數十人又執三監吏􅀅殺之夫子􅃴陳聞之見陳侯與俱登䑓而觀焉夫子曰羙哉斯䑓自古聖王之爲城䑓未有不戮一人而能致功􅀂此者也陳侯黙而退遽竊赦所執吏旣而見夫子問曰昔周作靈䑓亦戮人乎答曰文王之興附者六州六州之衆各以子道來故區區之䑓未及期日而巳成矣何戮之有乎夫以少少之衆能立大大之功唯君爾子張曰女子必漸乎二十而後嫁何也孔子曰十五許嫁而後從夫是陽動而隂􅀿男唱而女随之義也以爲紡績組紃織絍者女子之所有事也黼黻文章之羙婦人之所有大功也必十五以徃漸乎二十然後可以通乎此事通乎此事然後乃能上以孝於舅姑下以事夫養子也宰我使于齊而反見夫子曰梁丘據遇虺毒三旬而後瘳朝齊君㑹大夫衆賔而慶焉弟子與在賔列大夫衆賔並復獻攻療之方弟子謂之曰夫所以獻方􅀅爲病也今梁丘子巳瘳矣而諸夫子乃復獻方方􅀅安施意欲梁丘大夫復有虺害當用之乎衆坐黙然無辭弟子此言何如夫子曰汝􅀃非也夫三折肱爲良醫梁丘子遇虺毒而􅀗瘳諸有與之同疾者必問所以巳之之方焉衆人爲此故各言其方欲售之以巳人之疾也凢言其方者稱其良也且以叅據所以己之之方優劣耳夫子􅃴齊晏子就其舘旣宴而􅀻焉曰齊其危矣譬若載無轄之車以臨干仞之谷其不顛覆亦難冀也子吾心也子以齊爲㳺息之館當或可救子幸不吾隠也夫子曰夫死病不可爲醫夫政令者人君之銜轡所以制下也今齊君失之巳乆矣子雖欲挾其輈而扶其輪良弗及也抑猶可以終齊君及子之身過此以徃齊其田氏矣齊東郭亥欲攻田氏執贄見夫子而訪焉夫子曰子爲義也丘不足與計事揖子貢使答之子貢謂之曰今子士也位卑而圖大卑則人不附也圖大則人憚之殆非子之任也盍姑巳乎夫以一縷之任繋千鈞之重上懸之於無極之髙下垂之於不測之􅀷旁人皆哀其絶而造之者不知其危子之謂乎馬方駭鼓而驚之繋方絶重而填之馬奔車覆六轡不禁繋絶於髙墜入於􅀷其危必矣東郭亥色戰而跪曰吾巳矣願子無言旣而夫子告子貢曰東郭亥欲爲義者也子亦告之以難易則可矣奚至懼之哉宰我問君子尚辭乎孔子曰君子以理爲尚愽而不要非所察也䌓辭富􅀃非所聴也唯知者不失理孔子曰吾於予取其言之近􅀋也於賜取其言之切事也近􅀋則足以諭之切事則足以懼之論書第二子張問曰聖人受命必受諸天而書云受終于文祖何也孔子曰受命於天者湯武是也受命於人者舜禹是也夫不讀詩書易春秋則不知聖人之心又無以别堯舜之禪湯武之伐也子張問曰禮丈夫三十而室昔舜三十徴庸而書云有鰥在下曰虞舜何謂也􅇮者師聞諸夫子曰聖人在上君子在位則内無怨女外無曠夫堯爲天子而有鰥在下何也孔子曰夫男子二十而冠冠而後娶古今通義也舜父頑母嚚莫能圖室家之端焉故逮三十而謂之鰥也詩云娶妻如之何必告父母父母在則宜圖婚􅀂巳殁則己之娶必告其廟今舜之鰥乃父母之頑嚚也雖堯爲天子其如舜何子夏問書大義子曰吾於帝典見堯舜之聖焉於大禹臯陶謨益稷見禹稷皐陶之忠勤功勲焉於洛誥見周公之徳焉故帝典可以觀羙大禹謨禹貢可以觀事臯陶謨益稷可以觀政洪範可以觀度秦誓可以觀議五誥可以觀仁甫刑可以觀誡通斯亡者則書之大義舉矣孔子曰書之於事也逺而不闊近而不迫志盡而不怨辭順而不謟吾於髙宗肜日見徳有報之疾也苟由其道致其仁則逺方歸志而致其敬焉吾於洪範見君子之不忍言人之惡而質人之羙也發乎中而見乎外以成文者其唯洪範乎子張問曰堯舜之世一人不刑而天下治何則以教誠而愛􅀷也龍子以爲教一而􅀍以五刑敢問何謂孔子曰不然五刑所以佐教也龍子未可謂能爲書也子夏讀書旣畢而見於夫子夫子謂曰子何爲於書子夏對曰書之論事也昭昭然􅀂日月之代明離離然􅀂星辰之錯行上有堯舜之徳下有三王之義凡商之所受書於夫子者志之於心弗敢忘也雖退而窮居河濟之間深山之中作壌室編􅅾戸常於此彈琴瑟以歌先王之道則可以發憤慷喟忘己貧賤故有人亦樂之無人亦樂之上見堯舜之徳下見三王之義忽不知憂患與死也夫子愀然變容曰嘻子殆可與言書矣雖然其亦表之而巳未覩其裏也夫闚其門而不入其室惡覩其宗廟之奥百官之羙乎宰我問書云納于大麓烈風雷雨弗迷何謂也孔子曰此言人事之􅀿乎天也堯既得舜歷試諸難巳而納之於尊顯之官使大錄萬機之政是故隂陽清和五星來備烈風雷雨各以其􅀿不有迷錯愆伏明舜之行合於天也宰我曰敢問禋于六宗何謂也孔子曰所宗者六皆㓗祀之也埋少牢於太昭所以􅀕時也祖迎於坎壇所以􅀕寒暑也主於郊宮所以􅀕日也夜明所以􅀕月也幽禜所以􅀕星也雩禜所以􅀕水旱也禋于六宗此之謂也書曰茲予大享于先王爾祖其從與享之季桓子問曰此何謂也孔子曰古之王者臣有大功死則必祀之於廟所以殊有績勸忠勤也盤庚舉其事以厲其世臣故稱焉桓子曰天子之臣有大功者則旣然矣諸侯之臣有大功者可以如之乎孔子曰勞能定國功加於民大臣死難雖食之公廟可也桓子曰其位次如何孔子曰天子諸侯之臣生則有列於朝死則有位於廟其序一也書曰維髙宗報上甲㣲定公問曰此何謂也孔子對曰此謂親盡廟毁有功而不及祖有徳而不及宗故於毎􅀊之大嘗而報􅀕焉所以昭其功徳也公曰先君僖公功徳前行可以與於報乎孔子曰丘聞昔虞夏商周以帝王行此禮者則有矣自此以下未之知也定公問曰周書所謂庸庸祗祗威威顯民何謂也孔子對曰不失其道明之於民之謂也夫能用可用則正治矣敬可敬則尚賢矣畏可畏則服刑恤矣君審此三者以示民而國不興未之有也子張問書云奠髙山何謂也孔子曰髙山五嶽定其差秩祀所視焉子張曰其禮如何孔子曰牲幣之物五嶽視三公而名山視子男子張曰仁者何樂於山孔子曰夫山者巋然髙子張曰髙則何樂爾孔子曰夫山草木植焉鳥獸蕃焉財用出焉直而無􅀻焉四方皆伐焉直而無􅀻興吐風雲以通乎天地之間隂陽和合雨露之澤萬物以成百姓咸饗此仁者之所以樂乎山也孟懿子問書曰欽四鄰何謂也孔子曰王者前有疑後有丞左有輔右有弼謂之四近言前後左右近臣當畏敬之不可以非其人也周文王胥附奔輳先後禦侮謂之四鄰以免乎牖里之害懿子曰夫子亦有四鄰乎孔子曰吾有四友焉自吾得囬也門人加親是非胥附乎自吾得賜也逺方之士日至是非奔輳乎自吾得師也前有光後有輝是非先後乎自吾得由也惡言不至於門是非禦侮乎孔子見齊景公梁丘據自外而至公曰何遅對曰陳氏戮其小臣臣有辭焉是故遅公􅀏而目孔子曰周書所謂明徳慎罰陳子明徳也罰人而有辭非不慎矣孔子答曰昔康叔封衞綂三監之地命爲孟侯周公以成王之命作康誥焉稱述文王之徳以成􅃙誡之文其書曰惟乃丕顯考文王克明徳慎罰克明徳者能顯用有徳舉而任之也慎罰者并心而慮之衆平然後行之致刑錯也此言其所任不失徳所罰不失罪不謂巳徳之明也公曰寡人不有過言則安得聞君子之教也書曰其在祖甲不義惟王公西赤曰聞諸晏子湯及太甲祖乙武丁天下之大君夫太甲爲王居䘮行不義同稱大君何也孔子曰君子之於人計功以除過太甲即位不明居䘮之禮而干􅃁宰之政伊尹放之于桐憂思三年追悔前愆起而復位謂之明王以此觀之雖四於三王不亦可乎魯哀公問書稱䕫曰於予擊石拊石百獸率舞庶尹􅁢諧何謂也孔子對曰此言善政之化乎物也古之帝王功成作樂其功善者其樂和樂和則天地且猶􅀿之况百獸乎䕫爲帝舜樂正實能以樂盡治理之情公曰然則政之大本莫尚䕫乎孔子曰夫樂所以歌其成功非政之本也衆官之長旣成熈熈然後樂乃和焉公曰吾聞䕫一足有異於人信乎孔子曰昔重􅀺舉䕫爲進又欲求人而佐焉舜曰夫樂天地之精也唯聖人爲能和六律均五聲和樂之本以通八風䕫能􅀂此一而足矣故曰一足非一足也公曰善記義第三季桓子以粟千鍾餼夫子夫子受之而不辭旣而以頒門人之無者子貢進曰季孫以夫子貧故致粟夫子受之而以施人無乃非季孫之意乎子曰何對曰季孫以爲惠也子曰然吾得千鍾所以受而不辭者爲季孫之惠且以爲寵也夫受人財不以成富與季孫之惠於一人豈􅀂惠數百人哉秦莊子死孟武伯問於孔子曰古者同寮有服乎荅曰然同寮有相友之義貴賤殊等不爲同官聞諸老聃昔者􅉑叔閎夭太顛散宜生南宫括五臣同寮比徳以賛文武及􅉑叔死四人者爲之服朋友之服古之逹禮者行之也公父文伯死室人有從死者其母怒而不哭相室諌之其毋曰孔子天下之賢人也不用於魯退而去是子素宗之而不能随今死而内人從死者二人焉􅀂此於長者薄於婦人厚也旣而夫子聞之曰季氏之婦尚賢哉子路愀然對曰夫子亦好人之譽巳乎夫子死而不哭是不􅄌也何善爾子曰怒其子之不能随賢所以爲尚賢者吾何有焉其亦善此而巳矣衞岀公使人問孔子曰寡人之任臣無大小一一自言問觀察之猶復失人何故答曰如君之言此乃所以失之也人旣難知非言問所及觀察所盡且人君之慮者多多慮則意不精以不精之意察難知之人宜其有失也君未之聞乎昔者舜臣堯官才任士堯一從之左右曰人君用士當自任耳目而取信於人無乃不可乎堯曰吾之舉舜巳耳目之矣今舜所舉人吾又耳目之是則耳目人終無巳也君苟付可付則己不勞而賢才不失矣子貢問曰昔孫文子以衞侯哭之不哀知其􅀅爲亂不敢捨其重器而行盡寘諸戚而善晋大夫二十人或稱其知何如孔子曰吾知其爲罪人未知其爲知也子貢曰敢問何謂也子曰食其禄者必死其事孫子知衞君之􅀅不君不念伏死以争而素規去就尸利擕貳非人臣也臣而有不臣之心明君所不赦幸哉孫子之以此免戮也孔子使宰予使于楚楚昭王以安車象餙因宰予以遺孔子焉宰予曰夫子無以此爲也王曰何故對曰臣以其用思其所在觀之有以知其然王曰言之宰予對曰自臣侍從夫子以來竊見其言不離道動不違仁貴義尚徳清素好儉仕而有祿不以爲積不合則去退無吝心妻不服綵妾不衣帛車噐不彤馬不食粟道行則樂其治不行則樂其身此所以爲夫子也􅀂夫觀目之靡麗窈窕之􅁋音夫子過之弗之視遇之弗之聴也故臣知夫子之無用此車也王曰然則夫子何欲而可對曰方今天下道徳􅆍息其志欲興而行之天下誠有欲治之君能行其道則夫子雖徒歩以朝固猶爲之何必逺辱君之重貺乎王曰乃今而後知孔子之徳也大矣宰予歸以告孔子孔子曰二三子以予之言何如子貢對曰未盡夫子之羙也夫子徳髙則配天􅀷則配海􅀂予之言行事之實也子曰夫言貴實使人信之舎實何稱乎是賜之華不􅀂予之實也孔子􅃴齊齊景公讓登夫子降一等景公三辭然後登旣坐曰夫子降徳辱臨寡人寡人以爲榮也而降階以逺自絶於寡人未知所以爲罪孔子答曰君惠顧外臣君之賜也然以匹夫敵國君非所敢行也雖君􅀻之其􅀂義何顔讎善事親子路義之後讎以非罪執於衞􅀅死子路請以金贖焉衞人􅀅許之旣而二三子納金於子路以入衞或謂孔子曰受人之金以贖其􅀻昵義乎子曰義而贖之貧取於友非義而何愛金而令不辜䧟辟凢人且猶不忍况二三子於由之所親乎詩云如可贖􅀆人百其身苟出金可以生人雖百倍古人不以爲多故二三子行其􅁒由也成其義非汝之所知也孔子讀詩及小雅喟然而嘆曰吾於周􅀯召􅀯見周道之所以盛也於栢舟見匹夫執志之不可易也於淇奥見學之可以爲君子也於考槃見遁世之士而不悶也於木􅀲見苞苴之禮行也於緇衣見好賢之心至也於鷄鳴見古之君子不忘其敬也於伐檀見賢者之先事後食也於蟋蟀見陶唐儉徳之大也於下泉見亂世之思明君也於七月見􅃎公之所以造周也於東山見周公之先公而後􅀻也於狼䟦見周公之逺志所以爲聖也於鹿鳴見君臣之有禮也於彤􅃓見有功之必報也於羔羊見善政之有應也於節􅀯山見忠臣之憂世也於蓼莪見孝子之思養也於楚茨見孝子之思􅀕也於裳裳者華見古之賢者世保其禄也於采菽見古之明王所以敬諸侯也孔子晝息於室而皷琴焉閔子自外聞之以告曽子曰嚮也夫子之音清澈以和淪入至道今也更爲幽沈之聲幽則利􅁒之所爲發沈則貪得之所爲施夫子何所感之若是乎吾􅀙子入而問焉曽子曰諾二子入問孔子孔子曰然汝言是也吾有之向見猫方取䑕􅁒其得之故爲之音也汝二人者孰識諸曽子對曰是閔子夫子曰可與聴音矣孔叢子卷第一

body:
  text: 公儀第九魯人有公儀僣者數本皆作潜砥節礪行樂道好古恬于榮利不事諸侯子思與之友穆公因子思欲以為相謂子思曰公儀子必輔寡人叄分魯國而與之一子其言之子思對曰如君之言則公儀子愈所以不至也君若饑渴待賢納用其謀雖蔬食水飲伋亦願在下風今徒以髙官厚禄釣餌君子無信用之意公儀子之智若魚鳥可也不然則彼將終身不躡乎君之庭矣且臣不佞又不任為君操竿下釣以蕩守節之士也閭丘温見田氏將必危齊欲以其邑叛而適魯穆公聞之謂子思曰子能懷之則寡人割邑如其邑以常宗子思曰伋雖能之義所不為也公曰何子思對曰彼為人臣君將敗弗能扶而叛之逆臣制國弗能以其身死而逃之此罪誅之人也伋縱不能討而又要利以召姦非忍行也穆公問子思曰吾觀龍攔氏子不孝其行何如對曰臣聞明君之為政尊賢以崇德舉善以勸民則四方之内孰敢不化若夫過行是細人所識不治其本而問其過臣不知所以也公曰善穆公謂子思曰子之書所記夫子之言或者以謂子之辭子思曰臣所記臣祖之言或親聞之者有聞之于人者雖非正其辭然猶不失其意焉且君之所疑者何公曰于事無非子思曰無非所以得臣祖之意也就如君言以為臣之辭臣之辭無非則亦所宜貴矣事既不然又何疑焉穆公謂子思曰縣子言子之為善不欲人譽已信乎子思對曰非臣之情也臣之修善欲人知之知之而譽臣是臣之為善有勸也此所願而不可得者也若臣之修善而人莫知莫知則必毁臣是臣之為善而受毁也此臣所不願而不可避者也若夫雞鳴為善滋滋以至夜半而曰不欲人之知恐人之譽已臣以謂斯人也者非虚則愚也胡母豹魯人謂子思曰子好大世莫能容子也盍亦随時乎子思曰大非所病所病不大也凡所以求容于世為行道也毁道以求容容何行焉大不見容命也毁大而求容罪也吾弗改矣子思居貧其友有饋之粟者受二車焉或獻樽酒束脩子思弗為當也或曰子取人粟而辭吾酒脯是辭少而取多也于義則無名于分則不全而子行之何也子思曰然伋不幸而貧于財至乃困乏將恐絶先人之祀夫以受粟為周之也酒脯則所以飲宴也方乏于食而乃飲宴非義也吾豈以為分哉度義而行也或者擔其酒脯以歸穆公問子思曰吾國可興乎子思曰可公曰為之奈何對曰苟君與大夫慕周公伯禽之治行其政化開公家之恵杜私門之利結恩百姓修禮鄰國其興也勃矣子思曰吾之富貴甚易而由不能夫不取于人謂之富不辱于人謂之貴不取不辱其于富貴庶矣哉抗志第十曾申參之子謂子思曰屈己以伸道乎抗志以貧賤乎子思曰道伸吾所願也今天下王侯其孰能哉與屈己以富貴不若抗志以貧賤屈己則制于人抗志則不愧于道子思居衛衛人釣于河得鰥魚焉其大盈車子思曰鰥魚魚之難得者也子果何得之對曰吾始下釣垂一魴之餌鰥過而弗視也更以豚之半體則吞之矣子思喟然曰鰥雖難得貪以死餌士雖懷道貪以死禄矣子思居衛魯穆公卒縣子使乎衛聞喪而服謂子思曰子雖未臣魯父母之國也先君宗廟在焉奈何不服子思曰吾豈愛乎禮不得也縣子曰請聞之荅曰臣而去國君不掃其宗廟則為之服寄公寓乎是國而為國服吾既無列于魯而祭在衛吾何服哉是寄臣而服所寄之君則舊君無服明不二君之義也縣子曰善哉我未之思也衛君言計是非而羣臣和者如出一口子思曰以吾觀所為君不君臣不臣者也公丘懿子曰何乃若是子思曰人主自臧則衆謀不進事是而臧之猶却衆謀况和非以長乎夫不察事之是非而悦人之讃已闇莫甚焉不度理之所在而阿諛求容謟莫甚焉君闇臣謟以居百姓之上民弗與也若此不已國無類矣子思謂衛君曰君之國事將日非矣君曰何故對曰有由然焉君出言皆自以為是而卿大夫莫敢矯其非卿大夫出言亦皆自以為是而士庶莫敢矯其非君臣既自賢矣而羣下同聲賢之賢之則順而有福矯之則逆而有禍故使如此如此則善安從生詩曰具曰予聖誰知烏之雌雄抑亦似衛之君臣乎衛君問子思曰寡人之政何如荅曰無非君曰寡人不知其不肖亦望其如此也子思曰希㫖容媚則君親之中正弼非則君疏之夫能使人富貴貧賤者君也在朝之士孰肯舍所以見親而取其所以見疏者乎是故競求射君之心而莫敢有非君之非者此臣所謂無非也公曰然乎寡人之過也今知改矣荅曰君弗能焉口順而心不懌者臨其事必疣君雖有命臣未敢受也司徒文子改塟其叔父問服于子思子思曰禮父母改塟緦既塟而除不忍無服送至親也非父母無服無服則弔而加麻文子曰喪服既除然後乃塟則其服何服荅曰三年之喪未塟服不變除何有焉期大功之喪服其所除之服以塟既塟而除之其虞也吉服以行事也公叔木謂申詳曰衛公叔文子之子定公十四年奔魯木或作朱春秋作成吾于子思親而敬之子思未吾察也申詳以告曰人求親敬于子子何辱焉子思荅曰義也申詳曰請聞之荅曰公叔氏之子愛人之同已慢而不知賢夫其親敬非心見吾所可親敬也以人口而親敬吾則亦以人口而疏慢吾矣申詳曰其不知賢奈何荅曰有龍穆者徒好飾弄辭説觀于坐席相人眉睫以為之意天下之淺人也而公叔子交之橋子良修實而不修名為善不為人之知己不撞不發如大鐘然天下之深人也而公叔子與之同邑而弗能知此其所以為愛同已而不知賢也子思自齊反衛衛君館而問曰衛敬公先生魯國之士然不以衛之偏小猶歩玉趾而慰存之願有賜于寡人也子思曰臣覉旅于此而辱君之威尊亟臨蓽門其榮多矣欲報君以財幣則君之府藏已盈而伋又貧欲報君以善言恐未合君志而徒言不聽也顧未有可以報君者唯進賢爾衛君曰賢固寡人之所願也子思曰未審君之願將何以為君曰必用以治政子思曰君弗能也君曰何故荅曰衛國非無賢才之士而君未有善政是賢才不見用故也君曰雖然願聞先生所以為賢者荅曰君將以名取士耶以實取士耶君曰必以實子思曰衛之東境有李音者賢而有實者也君曰其父祖何也荅曰世農夫也衛君乃胡盧大笑曰寡人不好農農夫之子無所用之且世臣之子未悉官之子思曰臣稱李音稱其賢才也周公大聖康叔大賢今魯衛之君未必皆同其祖考李音父祖雖善農則音亦未必與之同也君言世臣之子未悉官之則臣所謂有賢才而不見用果信矣臣之問君固疑君之取士不以實也今君不問李音之所以為賢才而聞其世農夫因笑而不愛則君取士果信名而不由實者也衛君屈而無辭衛君曰夫道大而難明非吾所能也今欲學術何如子思曰君無然也體道者逸而不窮任術者勞而無功古之篤道君子生不足以喜之利何足以動之死不足以禁之害何足以怨之禁或作懼怨或作忌故明于死生之分通于利害之變雖以天下易其脛毛無所槩于志矣是以與聖人居使窮士忘其貧賤使王公簡其富貴君無然也衛君曰善齊王謂子思曰今天下擾擾諸侯無伯吾國大人衆圖帝何如子思曰不可也君不能去君貪利之心王曰何害子思曰夫水之性清而土壤汩之人之性安而嗜欲亂之故能有天下者必無以天下為者也能有名譽者必無以名譽為者也達此則其利心外矣衛將軍文子之内子死復者曰臯媚女復子思聞之曰此女氏之字非夫氏之名也婦人于夫氏以姓氏稱禮也費子陽魯大夫家臣謂子思曰吾念宗周將滅泣涕不可禁也子思曰然此亦子之善意也夫能以智知可知而不能以智知未可知危之道也今以一人之身憂世之不治而泣涕不禁是憂河水之濁而以泣清之也其為無益莫大焉故㣲子去殷紀季入齊良知時也唯能不憂世之亂而患身之不治者可與言道矣齊王戮其臣不辜謂子思曰吾知其不辜而適觸吾忿故戮之以為不足傷義也子思曰文王葬枯骨而天下知仁商紂斬朝渉而天下稱暴夫義者不必徧利天下也暴者不必盡虐海内也以其所施而觀其意民乃去就焉今君因心之忿遷戮不辜以為無傷于義此非臣之所敢知也王曰寡人實過乃今聞命請改之衛公子交見于子思曰先生聖人之後執清髙之操天下之君子莫不服先生之大名也交雖不敏竊慕下風願師先生之行幸顧恤之子思曰公子不宜也夫清髙之節不以私自累不以利煩意擇天下之至道行天下之正路今公子紹康叔之緒處戰伐之世當務收英雄保其疆土非所以明臧否立規檢修匹夫之行之時也衛公子交饋馬四乗于子思曰交不敢以此求先生之歡而辱先生之潔也先生久降于鄙土蓋為賔主之餼焉子思曰伋寄命以來度身以服衛之衣量腹以食衛之粟矣又且朝夕受酒脯及祭燔之賜衣食已優意氣已定以無行志未敢當車馬之貺禮雖有爵賜人不踰父兄今重違公子之盛㫖則有失禮之僣焉若何公子曰交已言于君矣荅曰不可為人子者三賜不及車馬公子曰我未之聞也謹受教穆公欲相子思子思不願將去魯魯君曰天下之王亦猶寡人也去將安之子思荅曰蓋聞君子猶鳥也疑之則舉今君既疑矣又以已限天下之君臣竊為言之過也齊王謂子思曰先生名髙于海内吐言則天下之士莫不屬耳目今寡人欲相梁起起也名少願先談説之也子思曰天下之士所以屬耳目者欲伋之言是非當也今君使伋虚談于起則天下之士必改耳目矣耳目既改又無益于起是兩有喪也故不敢承命齊君曰起之不賢何也子思曰君豈未之知乎厚于財物必薄于徳自然之道也今起以貪成富聞于諸侯而無救施之惠焉以好色聞于齊國而無男女之别焉有一于此猶受其咎而起二之能無累乎王曰寡人之言實過願先生赦焉子思見老萊子老萊子聞穆公將相子思老萊子曰若子事君將何以為乎子思曰順吾性情以道輔之無死亡焉老萊子曰不可順子之性也子性剛而傲不肖又且無所死亡非人臣也子思曰不肖故人之所傲也夫事君道行言聽則何所死亡道不行言不聽則亦不能事君所謂無死亡也老萊子曰子不見夫齒乎齒堅剛卒盡相磨舌柔順終以不弊子思曰吾不能為舌故不能事君小爾雅第十一廣詁一淵懿邃頥深也封巨莫莽艾祁大也頒賦鋪敷布也盖戴燾蒙冒覆也鐘崇府最積灌聚檏叢也閲捜履庀具也攻為話相旬宰營匠治也蠲祓禋屑潔也勿蔑㣲曼末沒無也隆巢岸峻髙也逼尼附切局鄰傅戚近也邵媚㫖伐美也賢裒繁優饒夥多也幾蔡模臬法也蔡取蓍龜義亦法也爰換變貿交更易也生造奏詣進也索寒探裒鉤掠採略也開徹接通達也固歴彌宿舊尚久也彌愈滋強益也赫斁爽曉昕著讃曙明也皆附襲就因也封畛際限疆略界也承苐班列次也户悛格扈止也户取其闔礙悛取其改皆止之義幽曀闇昩𡨕也最冗自質要也疆窮充竟也而乃爾若汝也控彎挽引也承賛凉助佐也尋由以用也要㨗集載成也肆赴㨗疾也造之如適也掇督撫拾也肆子燼餘也拓斥啟闢開也杜實充牣塞也實牣滿也奬率勵勸也勤勉事力也經屑省過也闕缺間隙也迭遞交更也􅑒剗沒滅也𤣥黔驪黝黒也縞皓素白也彤􅀈緼朱也􅁋溢沉滅沒也載功物事也廣言二晏明陽也旰晏晩也筭麗數也艾老也僉皆同也交校報也舒布展也揚翥舉也索略求也奚害何也里度居也周浹匝也充該備也列厥陳也轓輈輿也廢措置也駕乗凌也收戢斂也禁録也掌司主也偏贅屬也麗著思也載略行也沓襲合也抵享當也庚徹通也修舒長也校戰交也謁復白也勑質正也商蔑末也延衍散也末沒終也仳辨别也菲凉薄也復旋還也祖翼送也走叩我也姓命孥子也諧籲和也悛寤覺也憾猜恨也艾盡止也􅏌忿也奸犯也汩猾亂也縮續抽也暨㨗及也苞跋本也肆臬極也睇題視也犯肆突也束縻縛也肆從逐也放投棄也莽蕪草也暴映晒也焮也晞烯乾也廸跡蹈也衍演廣也袤從長也荷揚擔也仍再也徇歸也工官也稽考也顛殞也躋陞也戕殘也𠞰截也辟除也慁患也譴責也間非也順退也抗禦也靳取也􅃖戯也褊狹也惎忌也沮疑也虧損也毁壞也判散也蔽斷也交俱也俘罰也夷傷也枳害也締閉也靡細也辨使也牧臨也甞試也頼羸也若乃也嗟發聲也奏為也振救也庸償也賈價也贍足也曹偶也麗兩也驟數也逞快也越逺也姑且也哿可也釋觧也庸善也荐重也登升也勵勉也赫顯也韙是也丕莊也佞才也暨息也話言也愿謹也丰豐也都盛也腆厚也肆緩也競逐也紀基也惎忌教也整願也愸强也薄廹也燀炊也資取也質信也餼饋也慿依也藉借也際接也閡限也廬寄也萃集也簉倅也尤恠也瞢慚也索空也素故也視此也偟徃也矜惜也狃忲也覬望也何任也御侍也殿慎也選擇也宣示也廣訓三諸之乎也旃焉也惡乎于何也烏乎吁嗟也吁嗟嗚呼也有所嘆美有所傷痛隨事有義也無念念也無寧寧也無顯顯也不承承也不肖不似也繩之譽之也詰朝明旦也遐不黄耉言夀考也公孫碩膚徳音不瑕道成王大美聲稱逺也鄂不韡韡言韡韡也我從事獨賢勞事獨多也魴鱮甫甫語其大也麀鹿麌麌語其衆也海物維錯錯雜也雜毛曰氂雜綵曰繪雜言曰哤廣義四凡無夫無妻通謂之寡寡夫曰焭寡婦曰􅊔妾婦之賤者謂之屬婦屬逮也逮婦之名言其㣲也非分而得謂之幸詰責以辭謂之讓男女不以禮交謂之􅁋上􅁋曰烝下􅁋曰報勞􅁋曰通不直失節謂之慙慙愧也面慙曰戁心慙曰恧體慙曰逡廣名五諱死謂之大行死而復生謂之大蘇疾甚謂之阽請天子命曰未可以戚先王請諸侯命曰未可以近先君請大夫命曰未可以從先子空棺謂之櫬有屍謂之柩饋死者謂之賵衣服謂之襚埋柩謂之殔羊至切殔坎謂之池壙謂之竁下棺謂之窆填竁謂之封宰冢也壟塋也無主之鬼謂之殤廣服六治絲曰織織繒也麻紵葛曰布布通名也纊綿也絮之細者曰纊繒之精者曰縞縞之麄者曰素葛之精者曰絺麄者曰綌在首謂之元服弁髦太古布冠冠而敝之者也題頭也顛顔顙額也璽謂之印紱謂之綬襜褕謂之童容亦云蔽膝布褐而紩之謂之藍縷紩縫也袴謂之褰蔽膝謂之袡帶之垂者謂之厲大巾謂之冪覆帳謂之幄幄幕也簀床第也大扇謂之翣杖謂之梃鍵謂之籥亦作鑰棊局謂之奕在足謂之履履尊者曰達履謂之金舄而金絇也廣器七射有張布謂之侯侯中者謂之鵠鵠中者謂之正正方二尺正中者謂之􅈏􅈏方六寸棘㦸也鏚鉞斧也干瞂盾也戈句子㦸也􅈏倪結切瞂房越切刅之削謂之室室謂之鞞􅀈珌鞞之飾也矢服謂之弢小船謂之艇艇之小者曰䒀船頭謂之舳尾謂之艫楫謂之橈車轅上者謂之􅀈轅謂之輈軫謂之枕較謂之幹衡扼也扼上者謂之鳥啄累綆繘也縚索也大者謂之索小者謂之繩詘而戾之為䋫樛而紾之為絏垌地也墉墻謂之陴髙平謂之太原汪池也水之北謂之汭澤之廣謂之衍廣物八藁謂之稈稈謂之芻生曰糓謂之粒菜謂之蔬禾穗謂之穎截穎謂之銍拔心曰揠拔根曰擢把謂之秉秉四曰筥筥十曰􅀈棘實謂之棗桑之實謂之葚柞之實謂之橡廣烏九去隂就陽者謂之陽烏鳩鴈是也純黒而反哺者謂之烏小而腹下白不反哺者謂之鴉烏白項而羣飛者謂之燕烏白脰烏也鴉烏鸒也鸒斯也亦曰鷝鶋廣獸十豕彘也彘猪也其子曰豚豕之大者謂之豜小者謂之豵鳥之所乳謂之巢鷄雉所乳謂之窠鹿之所息謂之潛潛槮也積柴水中而魚舍焉度跬一舉足也倍跬謂之歩司馬法六尺為歩倍跬乃其大畧四尺謂之仞倍仞謂之尋尋舒兩肱也倍尋謂之常五尺謂之墨倍墨謂之丈倍丈謂之端倍端謂之兩倍兩謂之疋疋有謂之束禮𤣥纁五兩以兩為束毎束兩兩卷之二丈䨇合則成疋凡十卷為五束以應天九地十之數與此制異焉量一手之盛謂之溢兩手謂之掬掬四謂之豆豆四謂之之區區四謂之釡釡二有半謂之藪藪二有半謂之缶缶二謂之鍾鍾二謂之秉秉十六斛衡二十四銖曰兩兩有半曰㨗倍㨗曰舉倍舉曰鋝鋝謂之鍰鍰四兩謂之斤斤十謂之衡衡有半謂之秤秤二謂之鈞鈞四謂之石石四謂之鼓孔叢子卷上欽定四庫全書孔叢子卷中漢孔鮒撰

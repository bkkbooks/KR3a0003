front:
  text: 齊陳莊伯與登泰山而觀見古天子廵狩之銘焉陳子曰我生獨不及帝王封禪之世子思曰子不欲爾今周室卑㣲諸侯無霸假以齊之衆連鄰國以輔文武子孫之有徳者則齊桓晉文之事不足言也陳子曰非不悦斯道力不堪也子聖人之後吾願有聞焉敢問昔聖帝明王廵狩之禮可得聞乎子思曰凡求聞者為求行之也今子自計必不能行欲聞何為陳子曰吾雖不敏亦樂先王之道于子何病而不我告也子思乃告之曰古者天子將廵狩必先告于祖禰命史告羣廟及社稷圻内名山大川告者七日而徧親告用牲史告用幣申命冢宰而後清道而出或以遷廟之主行載于齊車毎舍奠焉及所經五嶽四瀆皆有牲幣歳二月東廵狩至于岱宗柴于上帝望秩于山川所過諸侯各待于境天子先問百年者所在而親問之然後覲方岳之諸侯有功徳者則發爵賜服以順陽義無功者則削黜貶退以順隂義命史采民詩謡以觀其風命市納價察民之所好惡以知其志命典禮正制度均量衡考衣服之等協時月日辰入其疆遺老失賢掊克在位則君免山川社稷有不親舉土荒民遊為無教無教者則君退民􅁋僭上為無法無法者則君罪入其疆土地墾闢養老尊賢俊傑在位則君有慶遂南廵五月至于南嶽又西廵八月至于西嶽又北廵十有一月至于北嶽其禮皆如岱宗歸反舍于外次三日齋親告于祖禰用特命有司告羣廟社稷及圻内名山大川而後入聽朝此古者明王廵狩之禮也陳子曰諸侯朝于天子盟㑹霸主則亦告宗廟山川乎子思曰告哉陳子曰王者廵狩不及四岳諸侯盟㑹不越鄰國則其禮同乎異乎子思曰天子封圻千里公侯百里伯七十里子男五十里虞夏殷周之常制也其或出此封者則其禮與廵狩朝㑹無變其不越封境雖行如國陳子曰古之義也吾今而後知不學者淺之為人也

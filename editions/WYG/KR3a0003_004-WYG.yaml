seq: 4
front:
  text: 公孫龍第十二公孫龍者平原君之客也好刑名以白馬為非白馬或謂子髙曰子髙孔穿之字孔箕之子伋之𤣥孫此人小辨而毁太道子盍往正諸子髙曰大道之悖天下之交往也吾何病焉或曰雖然子為天下故往也子髙適趙與龍㑹平原君家謂之曰僕居魯遂聞下風而髙先生之行也願受業之日乆矣然所不取於先生者獨不取先生以白馬為非白馬爾誠去非白馬之學則穿請為弟子公孫龍曰先生之言悖也龍之學正以白馬非白馬者也今使龍去之則龍無以教矣令龍為無以教而乃學於龍不亦悖乎且夫學於龍者以智與學不逮也今教龍去白馬非白馬是先教也而後師之不可也先生之所教龍者似齊王之問尹文也齊王曰寡人甚好士而齊國無士尹文曰今有人於此事君則忠事親則孝交友則信處鄉則順有此四行者可謂士乎王曰善是真吾所謂士者也尹文曰王得此人肯以為臣乎王曰所願不可得也尹文曰使此人於廣庭大衆之中見侮而不敢闘王將以為臣乎王曰夫士也見侮而不闘是辱則寡人不以為臣矣尹文曰雖見侮而不闘是未失所以為士也然而王不以為臣則鄉所謂士者乃非士乎夫王之令殺人者死傷人者刑民有畏王令故見侮終不敢闘是全王之法也而王不以為臣是罰之也且王以不敢闘為辱必以敢闘為榮是王之所賞吏之所罰也上之所是法之所非也賞罰是非相與曲謬雖古黄帝固所不能治也齊王無以應且白馬非白馬者乃子先君仲尼之所取也龍聞楚王張繁弱之弓載忘歸之矢以射蛟兕於雲夢之囿反而䘮其弓左右請求之王曰止也楚人遺弓楚人得之又何求乎仲尼聞之曰楚王仁義而未遂亦曰人得之而已矣何必楚乎若是者仲尼異楚人於所謂人也夫是仲尼之異楚人於所謂人而非龍之異白馬於謂馬悖也先生好儒術而非仲尼之所取也欲學而使龍去所以教雖百龍之智固不能當前也子髙莫之應退而告人曰言非而博巧而不理此固吾所不答也異日平原君㑹衆賔而延子髙平原君曰先生聖人之後也不逺千里來顧臨之欲去夫公孫子白馬之學今是非未分而先生飜然欲髙逝可乎子髙曰理之至精者則自明之豈任穿之退哉平原君曰至精之説可得聞乎答曰其説皆取之經傳不敢以意春秋記六鶂退飛覩之則六察之則鶂鶂猶馬也六猶白也覩之得見其白察之則知其馬色以名别内由外顯謂之白馬名實當矣若以絲麻加之女工為緇素青黄色名雖殊其質則一是以詩有素絲不曰絲素禮有緇布不曰布緇􅀈牛𤣥武此類甚衆先舉其色後名其質萬物之所同聖賢之所常也君子之謂貴當物理不貴繁辭若尹文之折齊王之所言與其法錯故也穿之所説於公孫子髙其智悦其行也去白馬之説智行固存是則穿未失其所師者也稱此云云沒其理矣是楚王之言楚人亡弓楚人得之先君夫子探其本意欲以示廣其實狹之故曰不如亦曰人得之而已也是則異楚王之所謂楚非異楚王之所謂人也以此為喻乃相擊切矣凡言人者總謂人也亦猶言馬者總謂馬也楚自國也白自色也欲廣其人宜在去楚欲正名色不宜去白忱察此理則公孫之辨破矣平原君曰先生言於理善矣因顧謂衆賔曰公孫子能答此乎燕客史由對曰辭則有焉理則否矣公孫龍又與子髙記論於平原君所辨理至於臧三耳公孫龍言臧之三耳甚辨析子髙弗應俄而辭出明日復見平原君曰疇昔公孫之言信辨也先生實以為何如答曰然幾能臧三耳矣雖然實難僕願得又問於君今為臧三耳甚難而實非也謂臧兩耳甚易而實是也不知君將從易而是者乎亦從難而非者乎平原君弗能應明日謂公孫龍曰公無復與孔子髙辨事也其人理勝於辭公辭勝於理辭勝於理終必受詘李寅言曹良於平原君欲仕之平原君以問子髙子髙曰不識也平原君曰良嘗得見於先生矣故敢問子髙曰世人多自稱上用我則國無患夫用智莫若觀其身其身且猶不免於患國用之亦烏得無患乎平原君曰良之有患時不明也居家理治可移於官良能殖貨故欲仕之子髙曰未可知也今有人於此身脩計明而貧者志不存也身不脩㑹計闇而富者非盜無所得之也

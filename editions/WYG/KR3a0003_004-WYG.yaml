body:
  text: 儒服第十三子髙衣長裾振褒袖方􅄚麄翣翣扇也見平原君君曰吾子亦儒服乎子髙曰此布衣之服非儒服也儒服非一也平原君曰請吾子言之答曰夫儒者居位行道則有衮冕之服統御師旅則有介胄之服從容徒步則有若穿之服故曰非一也平原君曰儒之為名何取爾子髙曰取包衆美兼六藝動静不失中道子髙遊趙平原君客有鄒文季節者與子髙相善及將還魯諸故人訣既畢文節送行三宿臨别文節流涕交頥子髙徒抗手而已分背就路其徒問曰先生與彼二子善彼有戀戀之心未知後㑹何期悽愴流涕而先生屬聲髙揖此無乃非親親之謂乎子髙曰始焉謂此二子丈夫爾乃今知其婦人也人生則有四方之志豈鹿豕也哉而常聚乎其徒曰若此二子之泣非邪答曰斯二子良人也有不忍之心若於取斷必不足矣其徒曰凡泣者一無取乎子髙曰有二焉大姦之人以泣自信婦人懦夫以泣著愛平原君與子髙飲強子髙酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲十榼古之聖賢無不能飲也吾子何辭焉子髙曰以穿所聞賢聖以道徳兼人未聞以飲食也平原君曰即如先生所言則此言何生子髙曰生於嗜酒者葢其勸厲奬􅃧之辭非實然也平原君欣然曰吾不戱子無所聞此雅言也平原君問子髙曰吾聞子之先君親見衛夫人南子又云南遊遇乎阿谷而交辭於漂女信有之乎答曰士之相信聞流言而不信者何哉以其所已行之事占之也昔先君在衞衞君問軍旅焉拒而不告問不已攝駕而去攝取也衞君請見猶不能終何夫人之能覿乎古者大饗夫人與焉於時禮儀雖廢猶有行之者意衞君夫人饗夫子則夫子亦弗獲已矣若夫阿谷之言起於近世殆是假其類以行其心者之為也子髙適魏㑹秦兵將至信陵君懼造子髙之舘而問祈勝之禮焉子髙曰命勇謀之將以禦敵先使之迎於敵所從來之方為壇祈克于五帝衣服隨其方色執事人數從其方之數牲則用其方之牲祝史告于社稷宗廟邦域之内名山大川君親素服誓衆于太廟曰某人不道侵犯大國二三子尚皆同心比力死守將帥稽首再拜受命既誓將帥勒士卒陳於廟之右君立太廟之庭祝史立于社百官各警其事御於君以待命乃大鼓于廟門詔將帥命卒習射三發擊刺三行告廟用兵于敵也五兵備効乃鼔而出以即敵此諸侯應敵之禮也信陵君曰敬受教信陵君問子髙曰古者軍旅賞人必於祖戮人必於社其義何也答曰賞功於祖告分之均示不敢専也戮罪於社告中於土示聽之當也陳尫魏人性多穢訾每得酒食必先撥捐之然後乃食子髙告之曰子無然也似有態者昔君子之於酒食有率甞之義無捐放之道假其可食其上下如擇假令不潔其下滋甚陳尫曰吾知其無益意欲如此子髙曰意不可恣也夫木之性以櫽括自直可以人而不如木乎子不見夫雞耶聚糓如陵跪而啄之若縱子之意則與雞豈有異乎陳尫跪曰吾今而後知過矣請終改之子髙任司馬乂為將於齊與燕戰而敗齊君曰以子賢明故信子也答曰君知穿孰若周公齊君曰周公聖人而子賢者弗如也子髙曰然臣固弗如周公也以臣之知乂孰若周公之知其弟齊君曰兄弟審於他人子髙曰君之言是也夫以周公之聖兄弟相知之審而近失於管蔡明人難知也臣與乂相見觀其材志察其所履齊國之士弗能過也書曰知人則哲惟帝難之穿何慚焉且曹子為魯三與齊戰三敗失地然後以勇敢之節奮三尺之劒要桓公管仲於盟壇卒收其所䘮夫君子之敗如日月之蝕人各有能乂庸可棄乎今燕以詐破乂是乂不能於詐也臣之稱乂稱其武勇才藝不稱其詐也乂雖敗臣固不失其所稱焉齊君屈辭而不黜司馬乂對魏王第十四魏王問人主所以為患魏安釐王子髙對曰建大臣而不與謀嬖倖者言用則知士以疎自疑自疑上之疎已也嬖臣以遇徼幸者内則射合主心外則挺主之非此最人主之大患也子髙謂魏王曰臣入魏國見君之二計臣焉張叔謀有餘范威智不逮然其功一也王曰叔也有餘威也不逮何同乎答曰駑驥同轅伯樂為之咨嗟玉石相揉和氏為之嘆息故賢愚共貫則能士匿謀真偽相錯則正士結舌叔雖有餘猶威不逮也魏王問何如可謂大臣子髙答曰大臣則必取衆人之選能犯顔諫争公正無私者計陳事成主裁其賞事敗臣執其咎主任之而無疑臣當之而弗避君總其美臣行其義然則君不猜於臣臣不隠於君故動無過計舉無敗事是以臣主並各有得也信陵君問曰古之善為國至於無訟其道何由答曰由乎政善也上下勤徳而無私徳無不化俗無不移衆之所譽政之所是也衆之所毁政之所非也毁譽是非與政相應所以無訟也齊王行車裂之刑群臣諍之弗聽子髙見於齊王曰聞君行車裂之刑無道之刑也而君行之臣竊以為下吏之過也王曰寡人爾民多犯法為法之輕也子髙曰然此誠君之盛意也夫人含五常之性有喜怒哀樂喜怒哀樂無過其節節過則毁於義民多犯法以法重無所措手足也今天下悠悠士無定處有徳則住無徳則去欲規覇王之業與衆大國為難而行酷刑以懼逺近國内之民將叛四方之士不至此乃亡國之道君之下吏不具以聞徒恐逆主意以為憂不慮不諫之危亡其所矜者小所䘮者大故曰下吏之過也臣觀之又非徒不諍而已也心知此事之為不可將有非議在後則因曰君忿意實然我諫諍必有龍逢比干之禍是為虚自居於忠正之地而闇推君主使同於桀紂也且夫為人臣見主非而不諍以陷主於危亡罪之大者也人主疾臣之弼已而惡之資臣以箕子比干之忠惑之大者也齊王曰謹聞命遂除車裂之法焉子髙見齊王齊王問誰可臨淄宰稱管穆焉王曰穆容貌陋民不敬答曰夫見敬在徳且臣所稱稱其材也君王聞晏子趙文子乎晏子長不過三尺面貌惡齊國上下莫不宗焉趙文子其身如不勝衣其言如不出口非但體陋辭氣又呐呐然其相晉國晉國以寧諸侯敬服皆有徳故也以穆軀形方之二子猶悉賢之昔臣嘗行臨淄市見屠商焉身脩八尺鬚髯如㦸面正紅白市之男女未有敬之者無徳故也王曰是所謂祖龍始者也祖龍始乃屠商姓名忱如先生之言於是乃以管穆為臨淄宰

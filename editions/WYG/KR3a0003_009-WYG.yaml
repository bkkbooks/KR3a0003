body:
  text: 左氏傳義詁序先生名竒字子異其先魯人即褒成君次孺第二子之後也孔覇字次孺家于茂陵以世學之門未嘗就逺方師也唯兄君魚少從劉子駿受春秋左氏傳具於講業最明精究其義子駿自以才學不若也其或訪經傳於子駿輙曰幸問孔君魚吾已還從之諮道矣由是大以春秋見稱當世孔奮字君魚覇之曽孫王莽之末君魚避地至大河之西依大將竇融為家常為上賔從容以論道為事是時先生年二十一矣每與其兄議學其兄謝服焉及世祖即阼君魚乃仕官至武都太守闗内侯以清儉聞海内先生雅好儒術淡忽榮禄不願從政遂刪撮左氏傳之難者集為義詁發伏闡幽讚明聖祖之道以袪後學者書未畢而早世不永宗人子通痛其不遂惜兹大訓不行于世乃校其篇目各如本第并序答問凡三十一卷將來君子倘肯遊意幸詳録之焉連叢子下第二十三元和二年三月孝章皇帝東巡過魯幸闕里以太牢祠聖師作六代之樂天子升廟西面群臣在庭北面皆再拜天子進爵而後坐乃召諸孔丈夫年二十以上者六十三人臨賜酒飯子和自陳曰臣草莽所蔽才非幹時行非絶倫託備先聖嗣世名學家陛下謬加拔擢微臣蘭臺令史㑹值車駕東巡先禮聖師猥以餘福惠及臣宗誠非碎首所能報謝詔曰治何經對曰為詩書頗涉禮傳詔曰今日之㑹寧於卿宗有光榮乎對曰非所敢當也臣聞明王聖主莫不尊師而貴道今陛下尊臣祖之靈貴臣祖之道親屈萬乗辱臨敝里此乃陛下所以崇聖也若夫顧其遺嗣得與群臣同受釐福此乃陛下愛屋及烏惠下之道所以崇徳作聖臣宗弗與於光榮非所敢承天子嘆曰非聖者子孫惡有斯言遂拜子和郎中詔隨車駕賜孔氏男女錢帛子和從還京師遂校書東觀其年十二月為臨晉令其友崔駰以其家卦林占之謂為不吉語子和曰盍辭乎漢崔篆嘗著易林篆乃駰之祖故曰家答曰學不為人仕不擇官所以為吉也且卜以决疑不疑何卜吉㓙由人而由卦林乎徑往之官三年秋八月天子巡后土登龍門子和自請從行在所天子識其狀貌燕見移時賜帛十端還而九月既望寢疾不瘳乃命其二子留塟焉二子長曰長彦年十有二次曰季彦年十嵗父之友西洛人姚進先有道徵不就養志于家長彦季彦常受教焉既除䘮則苦身勞力以自衣食家有先人遺書兄弟相勉諷誦不倦于時蒲阪令汝南許君然造其宅勸使歸魯奉車二乗辭曰載柩而返則違父遺命舍父而去則心所不忍君然曰以孫就祖於禮為得子無疑答曰若以死有知也祖猶有鄰宗族父獨留此不亦劇乎吾以定矣遂還其車於是甘貧味道研精墳典十餘年間㑹徒數百故時人為之語曰魯國孔氏好讀經兄弟講誦皆可聽學士來者有聲名不過孔氏那得成長彦頗隨時為今學其時多為章句學季彦壹其家業兼修史漢不好諸家之書華隂張太常問何如斯可謂備徳君子季彦答曰性能沉邃則不可測志不在小則不可度砥礪廉隅則不可越行髙體卑則不可階興事教業與言俱立捨己從善不耻服人交友以義不慕勢利並立相下不倡游言若此可謂備徳矣張生曰不有孝弟忠信乎答曰别而論之則應此條總而目之則曰孝弟忠信張生聞是言喜而書之魯人有同嵗上計而死者欲為之服問於季彦季彦曰有恩好其緦乎昔諸侯大夫同㑹事于王及以君命同盟覇主其死則有哭臨之禮今之上計並覲天子有交燕之歡同盟綈素上紀先君下録子弟相敦以好相厲以義又數相往來特有私親雖比之朋友不亦可乎崔駰學於太學而糧乏鄧衞尉欲餼焉而未果季彦年九嵗以其父命往見衞尉曰夫言不在多在于當理施不在豐期於救乏崔生臣父之執也不幸而貧公許賑之言既當理矣從來有日嘉貺未至或欲豐之然後乃至乎答曰家物少湏租入當猥送季彦曰公顧盻崔生欲分禄以周其無君之惠也必欲待君租入然後猥致則於崔生為贏非義崔生所不為也且今已乏矣而方湏租入是猶古人欲决江河以救牛蹄之魚之類也鄧公曰諾梁人取後妻後妻殺夫其子又殺之季彦返魯過梁梁相曰此子後以大逆論禮繼母如母是殺母也季彦曰言如母則與親母不等欲以義督之也昔文姜與弑魯桓春秋去其姜氏傳曰不稱姜氏絶不為親禮也絶不為親即凡人爾且夫手殺重於知情知情猶不得為親則此下手之時母名絶矣方之古義是子宜以非司寇而擅殺當之不得為殺母而論以逆也梁相從之𢎞農太守皇甫威明問仲淵曰即皇甫規仲淵乃季彦族吾聞孔氏自三父之後能傳祖之業者常在於叔祖今觀連叢所記信如所聞然則伯季之後弗克負荷矣答曰不然也先君所以為業者非惟經傳而已可以學則學可以進則進可以止則止故曰無可無不可也葢惟執行中庸其於得道非末嗣子孫所能及也是以先父各取所能能仕則仕能學則學自伯祖之子孫世仕有位季祖之子孫或學或仕或文或武所綂不一故學不稽古仕無髙官文非俎豆武非戢兵不専故也皇甫曰如髙明之言是故弗克負荷矣答曰伯之子孫今其可仕季之子孫何所能任所以世得聞焉且人之才聖受天有分若如君之論則成王伯禽雖致太平皆當以不聖蒙弗克負荷之罪乎皇甫笑曰善既而或謂仲淵曰以古人推之自可如皇甫之言爾而子矜之何也皇甫雖口與子心實不與也答曰吾其然然此君來言頗欲相侵故激至于此豈曰得道由不獲已也長孫尚書問季彦曰處士聖人之後也豈知聖人之徳惡乎齊答曰徳行邈於世智達秀於人幾於如此矣曰聖人者必能聞于無聲見于無形然後稱聖爾如處士所言大賢則能為之季彦曰君之論宜若未之近也夫有聲故可得而聽有形故可得而見若乃無聲雖師曠側耳將何聞乎無形雖離婁並照將何覩乎書曰惟狂克念作聖狂人念思道徳猶為聖人聖人大賢之清者也賢人中人之清者也孔大夫謂季彦曰大夫乃孔昱字元世今朝廷以下四海之内皆為章句内學西漢士論以經術為内學諸子雜説為外學季彦之時方尚辭文乃以章句為内學經術為外學而君獨治古義治古義則不能不非章句非章句内學則危身之道也獨善固不容于世今古義雖善時世所廢也而獨為之必將有患盍姑已乎答曰君之此言殆非所望也君以為學學知乎學愚乎大夫曰學所以求知也季彦曰君頻日聞吾説古義一言輙再稱善善其使人知也以為章句内學迂誕不通即使人愚也今欲使吾釋善善之知業習迂誕不通之愚學為人謀如此於義何居且吾子立論必析是非以是易非何傷之如主上聰明庸知不欲兩聞其義博覽古今擇善從之以廣其聖乎吾學不要禄貴得其義爾復以此受患猶甘心焉先聖垂訓壁出古文臨淮傳義可謂妙矣而不在科策之例世人固莫識其竒矣斯業之所以不泯賴吾家世世獨修之也今君猥為禄利之故欲廢先君之道此殆非所望也若從君言是為先君之義㓕于今日將使來世達人見今文俗説因嗤笑前聖吾之力此葢為先人也物極則變此百年之外必當有明慎君子恨不與吾同世者於是大夫悵然曰吾意實不及此也敢謝不敏楊太尉楊震問季彦曰吾聞臨晉君異才博聞周合群籍如世不歸大儒何答曰不為禄學故也惡直醜正實繁有徒辨經説義輙見憎疾但以所據者正故衆人不能用爾免害為幸何大儒之能歸乎季彦見劉公客適有獻魚者公熟視魚歎曰厚哉天之于人也生五穀以為食育鳥獸以為肴衆座僉曰誠如明公之教季彦曰賤子愚意竊與衆君子不同以為不如明公之教也何者萬物之生各禀天地未必為人人徒以知得而食焉故孝經曰天地之性人為貴貴有知也伏羲始甞草木一日而遇七十二毒然後五穀乃形非天本為人而生也蚊蚋食人蚓蟲食土非天故為蚊蚋生人為蚓蟲生地也知此不然則五穀鳥獸之生本不為人可以無疑矣公良乆曰辨哉衆座黙然永初二年季彦如京師省宗人仲淵是年夏河南四縣雨雹如棬杯大者如斗殺禽畜雉兎折樹木秋苗盡天子責躬省過並令幽隱有道術之士各得假變事亟陳厥故季彦與仲淵説道其意狀曰此陰乗陽也貴臣擅權母后黨盛多致此異然乃漢家大忌時下邳長孫子逸止仲淵第聞是言也心善之因見上説焉上召季彦季彦見於德陽殿陳其事如與仲淵言也曰陛下増修聖德慮此二者而已夫物之相感必以類推其甚者必有山崩地震乖氣相因其事不可盡論往者延平中鄧后稱制而東垣巨屋山大崩聲動安邑即前事之驗者帝黙然左右皆不善其言季彦聞之曰吾豈容媚勢臣而欺天子乎後子逸相魯舉季彦孝㢘固辭不就㑹遭兄長彦憂遂止乎家季彦為人謙退愛厚簡而不華終不以榮利變其恬然之志見不義而富貴者視之如僕𨽻舉筆則典誥成章吐言必正名務理故每所交游莫不推先以為楷則也年四十有九延光三年十一月丁丑卒史稱年四十七孔叢子卷下

body:
  text: 論書第二子張問曰聖人受命必受諸天而書云受終于文祖何也孔子曰受命于天者湯武是也受命于人者舜禹是也夫不讀詩書易春秋則不知聖人之心又無以别堯舜之禪湯武之伐也子張問曰禮丈夫三十而室昔者舜三十徵庸而書云有鰥在下曰虞舜何謂也曩師聞諸夫子曰聖人在上君子在位則内無怨女外無曠夫堯為天子而有鰥在下何也孔子曰夫男子二十而冠冠而後娶古今通義也舜父頑母嚚莫克圖家室之端焉故逮三十而謂之鰥也詩云娶妻如之何必告父母父母在則宜圖婚若已殁則已之娶必告其廟今舜之鰥乃父母之頑嚚也雖堯為天子其如舜何子夏問書大義子曰吾于帝典見堯舜之聖焉于大禹臯陶謨益稷見禹稷臯陶之忠勤功勲焉于洛誥見周公之德焉故帝典可以觀美大禹謨禹貢可以觀事臯陶謨益稷可以觀政洪範可以觀度謂皇極彛倫之度泰誓可以觀義五誥可以觀仁甫刑可以觀誡通斯七者則書之大義舉矣孔子曰書之于事也逺而不濶近而不廹志盡而不怨辭順而不諂吾于髙宗肜日見德有報之疾也苟由其道致其仁則逺方歸志而致其敬焉吾于洪範見君子之不忍言人之惡而質人之美也發乎中而見乎外以成文者其唯洪範乎子張問曰堯舜之世一人不刑而天下治何則以教誠而愛深也龍子以為一夫而被以五刑敢問何謂孔子曰不然五刑所以佐教也龍子未可謂能為書也子夏讀書既畢而見于夫子夫子謂曰子何為于書子夏對曰書之論事也昭昭然若日月之代明離離然若星辰之錯行上有堯舜之道下有三王之義凡商之所受書于夫子者志之于心弗敢忘雖退而窮居河濟之間深山之中作壤室編蓬户常于此彈琴以歌先王之道則可以發憤慷喟忘已貧賤故有人亦樂之無人亦樂之上見堯舜之德下見三王之義忽不知憂患與死也夫子愀然變容曰嘻子殆可與言書矣雖然其亦表之而已未覩其裏也夫闚其門而不入其室惡覩其宗廟之奥百官之美乎宰我問書云納于大麓烈風雷雨弗迷何謂也孔子曰此言人事之應乎天也堯既得舜歴試諸難已而納之于尊顯之官使大録萬機之政是故隂陽清和五星不悖烈風雨各以其應不有迷錯愆伏明舜之行合于天也宰我曰敢問禋于六宗何謂也孔子曰所宗者六皆潔祀之也埋少牢于太昭所以祭時也祖迎于坎壇所以祭寒暑也主于郊宫所以祭日也夜明所以祭月也幽禜所以祭星也雩禜所以祭水旱也禋于六宗此之謂也書曰兹予大享于先王爾祖其從與享之季桓子問曰此何謂也孔子曰古之王者臣有大功死則必祀之于廟所以殊有績勸忠勤也盤庚舉其事以厲其世臣故稱焉桓子曰天子之臣有大功者則既然矣諸侯之臣有大功者可以如之乎孔子曰勞能定國功加于民大臣死難雖食之公廟可也桓子曰其位次如何孔子曰天子諸侯之臣生則有列于朝死則有位于廟其序一也書曰維髙宗報上甲微上甲㣲契後八世湯之先也定公問曰此何謂也孔子對曰此謂親盡廟毁有功而不及祖有徳而不及宗故于每嵗之大嘗而報祭焉所以昭其功徳也公曰先君僖公功德前行或作前列可以與于報乎孔子曰丘聞昔虞夏商周以帝王行此禮者則有矣自此以下未之知也定公問曰周書所謂庸庸祗祗威威顯民何謂也孔子對曰不失其道明之于民之謂也夫能用可用則正治矣敬可敬則尚賢矣畏可畏則服刑恤矣君審此三者以示民而國不興未之有也子張問書云奠髙山何謂也孔子曰髙山五嶽定其差秩祀所視焉子張曰其禮如何孔子曰牲幣之物五嶽視三公小名山視子男子張曰仁者何樂于山孔子曰夫山者巋然髙子張曰髙則何樂爾孔子曰夫山草木植焉鳥獸蕃焉財用出焉直而無私焉四方皆伐焉直而無私興吐風雲以通乎天地之間隂陽和合雨露之澤萬物以成百姓咸饗此仁者之所以樂乎山也孟懿子問書曰欽四鄰何謂也孔子曰王者前有疑後有丞左有輔右有弼謂之四近言前後左右近臣當畏敬之不可以非其人也周文王胥附奔輳先後禦侮謂之四鄰以免乎羑里之害懿子曰夫子亦有四鄰矣孔子曰吾有四友焉自吾得回也門人加親是非胥附乎自吾得賜也逺方之士日至是非奔輳乎自吾得師也前有光後有輝是非先後乎自吾得仲由也惡言不至于門是非禦侮乎孔子見齊景公梁丘據自外而至公曰何遲對曰陳氏戮其小臣臣有辭為是故遲公笑而目孔子曰周書所謂明德慎罰陳子明德也罰人而有辭非不慎矣孔子荅曰昔康叔封衛綂三監之地命為孟侯周公以成王之命作康誥焉稱述文王之徳以成勑誡之文其書曰惟乃丕顯考文王克明徳慎罰克明徳者能顯用有徳舉而任之也慎罰者并心而慮之衆平然後行之致刑錯也此言其所任不失徳所罰不失罪不謂已徳之明也公曰寡人不有過言則安得聞吾子之教也書曰其在祖甲不義惟王公西赤曰聞諸晏子湯及太甲武丁祖乙天下之大君夫太甲為王居喪行不義同稱君何也孔子曰君子之于人計功而除過太甲即位不明居喪之禮而干冢宰之政伊尹放之于桐憂思三年追悔前愆起而復位謂之明王以此觀之雖四于三王不亦可乎魯哀公問書稱夔曰於予擊石拊石百獸率舞庶尹允諧何謂也孔子對曰此言善政之化乎物也古之帝王功成作樂其功善者其樂和樂和則天地猶且應之况百獸乎夔為帝舜樂正實能以樂盡治理之情公曰然則政之大本莫尚夔乎孔子曰夫樂所以歌其成功非政之本也衆官之長既咸熙熙然後樂乃和焉公曰吾聞夔一足有異于人信乎孔子曰昔重黎舉䕫而進又欲求人而佐焉舜曰夫樂天地之精也唯聖人為能和五律均五音知樂之本以通八風夔若能此一而足矣故曰一足非一足也公曰善記義第三季桓子以粟千鍾餼夫子夫子受之而不辭既而以頒門人之無者子貢進曰季孫以夫子貧故致粟夫子受之而以施人無乃非季孫之意乎子曰何對曰季孫以為恵也子曰然吾得千鍾所以受而不辭者為季孫之恵且以為寵也夫受人財不以成富與季孫之恵于一人豈若恵數百人哉秦莊子死孟武伯問于孔子曰古者同寮有服乎荅曰然同寮有相友之義貴賤殊等不為同官聞諸老耼昔者虢叔閎夭太顛散冝生南宫括五臣同寮比德以贊文武及虢叔死四人者為之服朋友之服古之達理者行之也公父文伯死室人有從死者其母怒而不哭相室諌之其母曰孔子天下之賢人也不用于魯退而去是子素宗之而不能隨今死而内人從死者二人焉若此于長者薄于婦人厚也既而夫子聞之曰季氏之婦尚賢哉子路愀然對曰夫子亦好人之譽已乎夫子死而不哭是不慈也何善爾子曰怒其子之不能隨賢所以為尚賢者吾何有焉其亦善此而已矣衛出公使人問孔子曰寡人之任臣無大小一一自覩察之猶復失人何故荅曰如君之言此即所以失之也人既難知非言問所及觀察所盡且人君之慮者多多慮則意不精以不精之意察難知之人宜其有失也君未之聞乎昔者舜臣堯官不任士堯一從之左右曰人君用士當自任耳目而取信于人無乃不可乎堯曰吾之舉舜已耳目之矣今舜所舉人吾又耳目之是則耳目人終無已時也君苟付可付則已不勞而賢才不失矣子貢問曰昔孫文子以衛侯哭之不哀知其將為亂不敢舍其重器而行盡寘諸戚而善晉大夫二十人或稱其知何如孔子曰人知其為知也吾未知其為知也子貢曰敢問何謂也子曰食其禄者必死其事孫子知衛君之將不君不念伏死以争而素規去就尸利携貳非人臣也臣而有不臣之心明君所不赦幸哉孫子之以此免戮也孔子使宰予使于楚楚昭王以安車象飾因宰予以遺孔子焉宰予曰夫子無以此為也王曰何故對曰臣以其用思其所在觀之有以知其然王曰言之宰予對曰自臣侍從夫子以來竊見其言不離道動不違仁貴義尚徳清素好儉仕而有禄不以為積不合則去退無吝心妻不服綵妾不衣帛車器不雕馬不食粟道行則樂其治不行則樂其身此所以為夫子也若夫觀目之麗靡窈窕之􅁋音夫子過之弗之視遇之弗之聽也故臣知夫子之無用此車也王曰然則夫子何欲而可對曰方今天下道德寢息其志欲興而行之天下誠有欲治之君能行其道則夫子雖使歩以朝固猶為之何必逺辱君之重貺乎王曰乃今而後知孔子之徳也大矣宰予歸以告孔子孔子曰二三子以予之言何如子貢對曰未盡夫子之美也夫子徳髙則配天深則配海若予之言行事之實也夫子曰夫言貴實使人信之舍實何稱乎是賜之華不若予之實也孔子適齊齊景公讓登夫子降一等景公三辭然後登既坐曰夫子降徳辱臨寡人寡人以為榮也而降階以逺自絶于寡人寡人未知所以為罪孔子荅曰君惠顧外臣君之賜也然以匹夫敵國君非所敢行也雖君私之其若義何顔讎善事親子路義之後讎以非罪執于義將厄子路請以金贖焉人將許之既而二三子納金于子路以入衛或謂孔子曰受人之金以贖其私昵義乎子曰義而贖之貧取于友非義而何愛金而令不辜䧟辟凡人且猶不忍况二三子于由之所親乎詩云如可贖兮人百其身苟出金可以生人雖百倍古人不以為多故二三子其欲由也成其義非汝之所知也孔子讀詩及小雅喟然而嘆曰吾于周南召南見周道之所以盛也于栢舟見匹夫執志之不可易也于淇澳見學之可以為君子也于考槃見遁世之士而不悶也于木𤓰見包且之禮行也于緇衣見好賢之心至也于雞鳴見古之君子不忘其敬也于伐檀見賢者之先事後食也于蟋蟀見陶唐儉德之大也于下泉見亂世之思明君也于七月見豳公之所造周也于東山見周公之先公而後私也于狼跋見周公之逺志所以為聖也于鹿鳴見君臣之有禮也于􅊮弓見有功之必報也于羔羊見善政之有應也于節南山見忠臣之憂世也于蓼莪見孝子之思養也于四月見孝子之思祭也于裳裳者華見古之賢者世保其禄也于采菽見古之明王所以敬諸侯也孔子晝息于室而鼓琴焉閔子自外聞之以告曾子曰嚮也夫子之音清徹以和淪入至道今也更為幽沉之聲幽則利欲之所為發沉則貪得之所為施夫子何所之感若是乎吾從子入而問焉曾子曰諾二子入問夫子夫子曰然女言是也吾有之向見猫方取鼠欲其得之故為之音也女二人者孰識諸曽子對曰閔子夫子曰可與聽音矣

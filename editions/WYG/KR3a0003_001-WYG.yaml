front:
  text: 夫子適周見萇𢎞言終退萇𢎞語劉文公曰吾觀孔仲尼有聖人之表河目而隆顙黄帝之形貌也修肱而龜背長九尺有六寸成湯之容體也然言稱先王躬履謙讓洽聞强記博物不窮抑亦聖人之興者乎劉子曰方今周室衰㣲而諸侯力争孔丘布衣聖將安施萇𢎞曰堯舜文武之道或弛而墜禮樂崩喪亦正其統紀而已矣既而夫子聞之曰吾豈敢哉亦好禮樂者也陳恵公大城因起凌陽之臺未終而坐法死者數十人又執三監吏夫子適陳聞之見陳侯與俱登臺而觀焉夫子曰美哉斯臺自古聖王之為城臺未有不戮一人而能致功若此者也陳侯黙而退遂竊赦所執吏既而見夫子問曰昔周作靈臺亦戮人乎荅曰文王之興附者六州六州之衆各以子道來故區區之臺未及期日而已成矣何戮之有乎夫以少少之衆能立大大之功惟君爾子張曰女子必漸乎二十而後嫁何也孔子曰十五許嫁而後從夫是陽動而隂應男唱而女隨之義也以為繢組紃織絍者女子之所有事也黼黻文章之義婦人之所有大功也必十五以往漸乎二十然後可以通乎此事然後乃能上以孝于舅姑下以事夫養子也宰我使于齊而反見夫子曰梁丘據遇虺毒三旬而後瘳朝齊君齊君㑹大夫衆賔而慶焉弟子與在賔列大夫衆賔並復獻攻療之方弟子謂之曰夫所以獻方將為病也今梁丘已療矣而諸夫子乃復獻方方將安施意欲梁丘大夫復有虺害當用之乎衆坐黙然無辭弟子此言何如夫子曰汝説非也夫三折肱為良醫梁丘子遇虺毒而獲療猶有與之同疾者必問所以已之之方焉衆人為此故各言其方欲售之以已人之疾也凡言其方者稱其良也且以叅據所以已之之方優劣耳夫子適齊晏子就其館既宴且私焉曰齊其危矣譬若載無轄之車以臨千仭之谷其不顛覆亦難兾也子吾心也子以齊為遊息之館當或可救子幸不吾隱也夫子曰夫死病無可為毉夫政令者人君之銜轡所以制下也今齊君失之已久矣子雖欲挾其輈而扶其輪良弗及也抑猶可以終齊君及子之身過此以徃齊其田氏矣齊東郭亥欲攻田氏執贄見夫子而訪焉夫子曰子為義也丘不足與計事揖子貢使荅之子貢謂之曰今子士也位卑而圖大位卑則人不附也圖大則人憚之殆非子之任也盍姑已乎夫以一縷之任繫千鈞之重上縣之于無極之髙下垂之于不測之深旁人皆哀其絶而造之者不知其危子之謂乎馬方駭鼓而驚之繫方絶重而填之馬奔車覆六轡不禁繫絶于髙墜入于深其危必矣東郭亥色戰而跪曰吾已矣願子無言既而夫子告子貢曰東郭亥欲為義者也子亦告之以難易則可矣奚至懼之哉宰我問君子尚辭乎孔子曰君子以理為尚博而不要非所察也繁辭富説非所聽也惟知者不失理孔子曰吾于予取其言之近類也于賜取其言之切事也近類則足以喻之切事則足以懼之

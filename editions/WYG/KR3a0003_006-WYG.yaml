front:
  text: 詰墨第十八墨翟著書誣稱孔晏之事故孔鮒詰辨之
  hash: sha256:2cbb18a0e8a91058f8de39aecc41783b8d711bab18c52a163ec3750d349e609e
body:
  text: 墨子稱景公問晏子以孔子而不對又問三皆不對公曰以孔子語寡人者衆矣俱以為賢人今問子而不對何也晏子曰嬰聞孔子之荆知白公謀而奉之以石乞勸下亂上教臣弑君非聖賢之行也詰之曰楚昭王之世夫子應聘如荆不用而反周旋乎陳宋齊衞楚昭王卒惠王立十年令尹子西乃召王孫勝以為白公史云二年是時魯哀公十五年也夫子自衞反魯居五年矣白公立一年然後乃謀作亂亂作在哀公十六年秋也夫子已卒十旬矣墨子雖欲謗毁聖人虚造妄言奈此年世不相值何墨子曰孔子之齊見景公公悦之封之以尼谿晏子曰不可夫儒浩居而自順立命而怠事崇䘮遂哀盛用繁禮其道不可以治國其學不可以導家公曰善詰之曰即如此言晏子為非儒惡禮不欲崇䘮遂哀也察傳記晏子之所行未有以異於儒焉又景公問所以為政晏子答以禮云景公曰禮其可以治乎晏子曰禮於政與天地並此則未有以惡於禮也晏桓子卒晏嬰斬衰枕草苴絰帶杖菅菲食粥居於倚廬遂哀三年此又未有以異於儒也若能以口非之而躬行之晏子所弗為墨子曰孔子怒景公之不封已乃樹䲭夷子皮於田常之門詰之曰夫樹人為信己也記曰孔子適齊惡陳常而終不見即田常常病之亦惡孔子交相惡而又任事其然矣記又曰陳常弑其君孔子齋戒沐浴而朝請討之觀其終不樹子皮審矣墨子曰孔子為魯司寇舍公家而奉季孫詰之曰若以季孫為相司宼統焉奉之自法也若附意季孫季孫既受女樂則孔子去之季孫欲殺囚則孔子赦之非苟順之謂也墨子曰孔子厄於陳蔡之間子路烹豚孔子不問肉之所由來而食之剥人之衣以沽酒孔子不問酒之所由來而飲之詰之曰所謂厄者沽酒無處藜藿不粒乏食七日若烹豚飲酒則何言乎厄斯不然矣且子路為人勇於見義縱有豚酒不以義不取之可知也又何問焉墨子曰孔子諸弟子子貢季路輔孔悝以亂衞陽貨亂魯佛肸以中牟畔漆雕開形殘詰之曰如此言衞之亂子貢季路為之耶斯不待言而了矣陽貨欲見孔子孔子不見何弟子之有佛肸以中牟叛召孔子則有之矣為孔子弟子未之聞也且漆雕開形殘非行己之致何傷於徳哉墨子曰孔子相魯齊景公患之謂晏子曰鄰有聖人國之憂也今孔子相魯為之若何晏子對曰君其勿憂彼魯君弱主也孔子聖相也不如陰重孔子欲以相齊則必强諫魯君魯君不聽將適齊君勿受則孔子困矣詰之曰按如此辭則景公晏子畏孔子之聖也上乃云非聖賢之行上下相反若晏子悖可也否則不然矣墨子曰孔子見景公公曰先生素不見晏子乎對曰晏子事三君而得順焉是有三心所以不見也公告晏子晏子曰三君皆欲其國安是以嬰得順也聞君子獨立不慙於影今孔子伐樹削迹不自以為辱身窮陳蔡不自以為約始吾望儒貴之今則疑之詰之曰若是乎孔子晏子交相毁也小人有之君子則否孔子曰靈公汙而晏子事之以潔莊公怯而晏子事之以勇景公侈而晏子事之以儉晏子君子也梁丘據問晏子曰事三君而不同心而俱順焉仁人固多心乎晏子曰一心可以事百君百心不可以事一君故三君之心非一也而嬰之心非三也孔子聞之曰小子記之晏子以一心事三君君子也如此則孔子譽晏子非所謂毁而不見也景公問晏子曰若人之衆則有孔子乎對曰孔子者君子行有節者也晏子又曰盈成匡父之孝子兄之弟弟也其父尚為孔子門人門人且以為貴則其師亦不賤矣是則晏子亦譽孔子可知也夫徳之不修己之罪也不幸而屈於人己之命也伐樹削迹絶糧七日何約乎哉若晏子以此而疑儒則晏子亦不足賢矣墨子曰景公祭路寢聞哭聲問梁丘據對曰魯孔子之徒也其母死服䘮三年哭泣甚哀公曰豈不可哉晏子曰古者聖人非不能也而不為者知其無補於死者而深害生事故也詰之曰墨子欲以親死不服三日哭而已於意安者卒自行之空用晏子為引而同乎己適證其非耳且晏子服父禮則無緣非行禮者也曹明問子魚曰子魚孔鮒觀子詰墨者之辭事義相反墨者妄矣假使墨者復起對之乎答曰苟得其理雖百墨吾益明白焉失其正雖一人猶不能當前也墨子之所引者矯晏子晏子之善吾先君先君之善晏子其事庸盡乎曹明曰可得聞諸子魚曰昔齊景公問晏子曰吾欲善治可以覇諸侯乎對曰官未具也臣亟以聞而君未肯然也臣聞孔子聖人然猶居處勌惰廉隅不修則原憲季羔侍氣鬱而疾志意不通則仲由卜商侍徳不盛行不勤則顔閔冉雍侍今君之朝臣萬人立車千乗不善之政加於下民者衆矣未能以聞者臣故曰官未備也此又晏子之善孔子者也子曰晏平仲善與人交乆而敬之此又孔子之貴晏子者也曹明曰吾始謂墨子可疑今則决妄不疑矣獨治第十九子魚生於戰國之世長於兵戎之間然獨樂先王之道講習不倦季則謂子魚曰丈夫不生則已生則有云為於世者也今先生澹泊世務脩無用之業當身不䝉其榮百姓不獲其利竊為先生不取也子魚曰不如子之言也武者可以進取文者可與守成今天下將擾擾焉終必有所定子修武以助之取吾修文以助之守不亦可乎且吾不才無軍旅之任徒能保其祖業優游以卒嵗者也秦始皇東并子魚謂其徒叔孫通曰子之學可矣盍仕乎對曰臣所學於先生者不用於今不可仕也子魚曰子之材能見時變今為不用之學殆非子情也叔孫通遂辭去以法仕秦尹曽謂子魚曰子之讀先王之書將奚以為答曰為治也世治則助之行道世亂則獨治其身治之至也陳餘謂子魚曰秦將㓕先王之籍而子為書籍之主其危矣子魚曰顧有可懼者必或求天下之書焚之書不出則有禍吾將先藏之以待其求求至無患矣子魚居魏與張耳陳餘相善耳餘魏之名士也秦㓕魏求耳餘懼走㑹陳勝呉廣起兵於陳欲以誅秦餘謂陳王曰今必欲定天下取王侯者其道莫若師賢而友智孔子之孫今在魏居亂世能正其行修其祖業不為時變其父相魏以聖道輔戰國見利不易操名諸侯世有家法其人通材足以幹天下博知足以慮未形必宗此人天下無敵矣陳王大悦遣使者齎千金加束帛以車三乗聘焉耳又使謂子魚曰天下之事已可見矣今陳王興義兵討不義子宜速來以集其事王又聞子賢欲諮良謀虚意相望也子魚遂往陳王郊迎而執其手議世務子魚以覇王之業勸之王悦其言遂尊以博士為太師諮度焉子魚名鮒甲陳人或謂之子鮒或稱孔甲陳勝既立為王其妻之父兄往焉勝以衆賔待之長揖不拜無加其禮其妻之父怒曰估亂僭號而傲長者不能乆矣不辭而去陳王跪謝遂不為顧王心慙焉遂適博士太師之舘而言曰予雖丈夫哉然塞於禮義以啓於姻婭唯先生幸訓誨之使免於戾可乎子魚曰王所問者善也敢固無辭以對乎今以禮言耶則禮無不拜且宗族婚媾又與衆賔異敬者也敬而加親自古以然也王曰雖已失之於前庶欲收之於後也願先生修明其事必遵奉焉對曰昔唐堯内親九族外協萬邦禮以婚為昆弟妻之父母為外舅姑由是明之則拜之可知夫婚親之義非宗賢之類也雖自已臣莫敢不敬昔魏信陵君嘗以此質臣之父臣之父曰於諸母之昆弟妻之諸父則以親配徳年以上雖拜之可也㓜於己者揖之可也此出於人情而可常者也王曰善哉請問同姓而服不及者其制何耶對曰先王制禮雖國君有合族之道宗人掌其列繼之以姓而無别醊之以食而無殊各隨本屬之隆殺屬近則死為之免屬逺則弔之而已禮之正也是故臣之家哭孔氏之别姓於弗父之廟哭孔氏則於夫子之廟此有據而然也周之道雖百世婚姻不通重先君之同體也王跪曰先生之言厥義博哉寡人雖固敢不盡心問軍禮第二十陳王問太師曰行軍之禮可得備聞乎答曰天下有道禮樂征伐自天子出自天子出必以嵗之孟秋賞軍師武人於朝簡練傑俊任用有功命將選士以誅不義於是孟冬以級授軍司徒執扑北面而誓之誓于社以習其事先期五日太史筮於祖廟擇吉日齋戒告于郊社稷宗廟既筮則獻兆於天子天子使有司以牲特告社告以所征之事而受命焉舍奠于帝學以受成然後乃類于上帝柴于郊以出以齊車遷廟之主及社主行大司馬職奉之無遷廟主則以幣帛皮圭告于祖禰謂之主命亦載齊車凡行主皮圭幣帛皆每舍奠焉而後就舘主車止于中門之外外門之内廟主居于道左社主居于道右其所經名山大川皆祭告焉及至敵所將戰太史卜戰日卜右御先期三日有司明以敵人罪狀告之史史定誓命戰日將帥陳列車甲卒伍于軍門之前有司讀誥誓使周定三令五申既畢遂禱戰祈克于上帝然後即敵將士戰全已克敵史擇吉日復禡于所征之地柴于上帝祭社奠祖以告克者不頓兵傷士也戰不克則不告也凡類禡皆用甲丙戊庚壬之剛日有司簡功行賞不稽于時其用命者則加爵受賜于祖奠之前其奔北犯令者則加刑罰戮于社主之前然後鳴金振旅有司徧告捷于時所有事之山川既至舍于國外三日齋以特牛親格于祖禰然後入設奠以反主若主命則卒奠歛主埋之于廟兩階間反社主如初迎之禮舍奠于帝學以訊馘告大享于群吏用備樂饗有功於祖廟舍爵策勲焉謂之飲至天子親征之禮也陳王曰其命將出征則如之何太師曰古者大將受命而出則忘其國即戎師陣則忘其家故天子命將出征親潔齋盛服設奠于祖以詔之大將先入軍吏畢從皆北面再拜稽首而受天子當階南面命授之節鉞大將受天子乃東向西面而揖之亦弗御也然後告大社冢宰執蜃宜於社之右南面授大將大將北面稽首再拜而受之承所頒賜于軍吏其出不類其克不禡戰之所在有大山川則祈焉禱克于五帝捷則報之振旅復命簡異功勤親告廟告社而後適朝禮也王曰將居軍中之禮勝敗之變則如之何太師曰將帥尚左士卒尚右出國先鋒入國後刃介胄在身執鋭在列雖君父不拜若不幸軍敗則驛騎赴告于載櫜韔天子素服哭于庫門之外三日大夫素服哭于社亦如之亡將失城則皆哭七日天子使使迎于軍命將帥無請罪然後將帥結草自縛袒右肩而入葢䘮禮也王曰行古禮如何太師曰古之禮固為於今也有其人行其禮則可無其人行其禮則民弗與也答問第二十一陳人有武臣謂子鮒曰夫聖人者誠髙材美稱也吾謂聖人之知必見未形之前功垂於身後立教而戾夫弗犯吐言而辯士不破也子之先君可謂當之矣然韓子立法其所以異夫子之謂者紛如也予每探其意而校其事持乆歴逺遏姦勸善韓氏未必非孔子未必得也吾今而後乃知聖人無世不有前聖後聖法制固不一也若韓非者亦當世之聖人也子鮒曰子信之為然是固未免凡俗也今世人有言髙者必以極天為稱言下者必以深淵為名是資勢之談而無其實者也好事而未必鑿也必言經以自輔援聖以自賢欲以取信於群愚而度其説也若諸子之書其義皆然吾先君之所自志也請畧説一隅而君子審其信否焉武臣曰諾子鮒曰乃者趙韓共并知氏趙㐮子之行賞先加具臣而後有功韓非書云夫子善之引以張本然後難之豈有不似哉然實詐也何以明其然昔我先君以春秋哀公十六年四月己丑卒至二十七年荀瑶與韓趙魏伐鄭遇東垣而還是時夫子卒已十一年矣而晉四卿皆在也後悼公十四年知氏乃亡此先後甚逺而韓非公穪之曽無怍意是則世多好事之徒皆非之罪也故吾以是黙口於小道塞耳於諸子乆矣而子立尺表以度天植寸指以測淵矇大道而不悟信誣説以疑聖殆非所望也武臣义手跪謝施施而退遂告人曰吾自以為學之博矣而可否於孔氏方知學不在多要在精之也陳王問太師曰寡人不得為賢所推而得南面稱孤其幸多矣今既賴二三君子且又欲規乆長之圖何施而可答曰信王之言萬世之福也敢稱古以對昔周代殷乃興㓕繼絶以為政首今誠法之則六國定不擕抑乆長之本王曰周存二代别有三恪其事云何答曰封夏殷之後以為二代紹虞帝𦙍備為三恪恪敬也禮之如賔客也非謂特有二代别有三恪也凡所以立二代者備王道通三綂也王曰三綂者何答曰各自用其正朔二代與周是謂三綂王曰六國之後君吾不能封也逺世之王於我何有吾自舉不及於周又安能純法之乎陳王涉讀國語言申生事顧博士曰始予信聖賢之道乃今知其不誠也先生以為何如答曰王何謂哉王曰晉獻惑聽讒而書又載驪姬夜泣公而以信入其言人之夫婦夜處幽室之中莫能知其私焉雖黔首猶然况國君乎予以是知其不信乃好事者為之辭將欲成其説以誣愚俗也故使予并疑于聖人也博士曰不然也古者人君外朝有國史内朝則有女史舉則左史書之言則右史書之以無諱示後世善以為式惡以為戒廢而不記史失其官故凡若晉侯驪姬牀第之私房中之事不得捨焉若夫設教之言驅群俗使人入道而不知其所以者也今此皆書實事累累若貫珠可無疑矣王曰先生真聖人之後風也今幸得聞命寡人無過焉陳王涉使周章為將西入闗以誅秦秦使將章邯拒之陳王以秦國之亂也有輕之之意勢若有餘而不設敵備博士太師諫曰章邯秦之名將周章非其敵也今王使章霈然自得而不設備臣竊惑焉夫雖天之所舍其禍福吉㓙大者在天小者由人今王不修人利以應天祥若跌而不振悔之無及也王曰寡人之軍先生無累也請先生息慮也又諫曰臣聞兵法無恃敵之不我攻恃我之不可攻也今恃敵而不自恃非良計也王曰先生所言計策深妙予不識也先生休矣已而告人曰儒者可與守成難與進取信哉博士他日復諫曰臣聞國大兵衆無備難恃一人善射百夫决拾章邯梟將卒皆死士也周章若懦使彼席捲來前莫有當其鋒者王曰先生所稱寡人昧昧焉願以人間近事喻之答曰流俗之事臣所不忍也今王命之敢不盡情願王察之也臣昔在梁梁人有陽由者其力扛鼎伎巧過人骨騰肉飛手搏􅵕獸國人懼之然無治室之訓禮教不立妻不畏憚浸相泄瀆方乃積怒妻坐於牀答焉左手建杖右手制其頭妻亦奮恚因授以背使杖擊之而自撮其隂由乃仆地氣絶而不能興鄰人聞其㓙㓙也窺而見之趨而救之妻愈戇忿莫肯舍旃或發其裳然後乃放夫以無敵之伎力而劣於女子之手者何也輕之無備故也今王與秦角强弱非若由之夫妻也而輕秦過甚臣是以懼故區區之心欲王備患之也王曰譬類忱佳然實不同也弗聽周章果敗而無後救邯遂進兵擊陳王師大敗博士凡仕六旬老于陳將没戒其弟子曰魯天下有仁義之國也戰國之世講頌不衰且先君之廟在焉吾謂叔孫通處濁世而清其身學儒術而知權變是今師也宗於有道必有令圖歸必事焉孔叢子卷中欽定四庫全書孔叢子卷下漢孔臧撰連叢子上第二十二叙書家之族𦙍一世相承以至九世相魏居大梁孔子生鯉字伯魚鯉生伋字子思伋生白字子上白生求字子家求生箕字子京箕生穿字子髙穿生子順相魏自叔梁紇至子順凡九世始有三子焉長子之後承殷綂為宋公中子之後奉夫子祀為褒成侯少子之後彦以將事髙祖有功封蓼侯其子臧嗣焉歴位九卿遷御史大夫辭曰臣世以經學為家轉相承作訓法然今俗儒繁説逺本雜以妖妄難可以教侍中安國安國孔忠之子受詔綴集古義臣乞為太常典臣家業與安國紀綱古訓使永垂來嗣孝武皇帝重違其意遂拜太常其禮賜如三公在官數年著書十篇而卒先時嘗為賦二十四篇四篇别不在集似其㓜時之作也又為書與從弟及戒子皆有義故列之于左諫格虎賦帝使亡諸大夫問乎下國下國之君方帥將士於中原車騎駢闐被行岡巒手格猛虎生縛􅓔犴昧爽而出見星而還國政不恤惟此為歡乃夸于大夫曰下國鄙固不知帝者之事敢問天子之格虎豈有異術哉大夫未之應因又言曰下國褊陋莫以娯心故乃闢四封以為藪圍境内以為林禽鳥育之驛驛淫淫晝則鳴嚾夜則嘷吟飛禽起而翳日走獸動而審音犯之者其罪死驚之者其刑深虞侯苑令是掌厥禁於是分幕將士營遮榛叢戴星入野列火求蹤見虎自來乃往尋從張罝網羅刃鋒驅檻車聽鼓鐘猛虎顛遽奔走西東怖駭内懷迷冒怔忪耳目䘮精值網而衝局然自縛或隻或雙車徒抃讚咸稱曰工乃縛以絲組斬其爪牙支輪登較支與榰同言獲獸多可榰其輈輪登滿較式髙載歸家孟賁被髮瞋目躁猾紛華故都邑百姓莫不于邁陳列路隅咸稱萬嵗斯亦畋獵之至樂也大夫曰順君之心樂矣然則樂之至也者與百姓同之謂夫兕虎之生與天地偕山林澤藪又其宅也被有徳之君則不為害今君荒于遊獵莫恤國政驅民入山林格虎於其廷妨害農業殘夭民命國政其必亂民命其必散國亂民散君誰與處以此為至樂所未聞也於是下國之君乃頓首曰臣實不敏習之日乆矣幸今承誨請遂改之楊柳賦嗟兹楊柳先生後傷蔚茂炎夏多陰可凉伐之原野樹之中塘溉浸以時日引月長巨本洪枝條修逺揚夭繞連枝猗那其房或拳局以逮下或擢跡而接穹蒼緑葉累疊鬱茂翳沈䝉籠交錯應風悲吟鳴鵠集聚百變其音爾乃觀其四布運其所臨南垂大陽北被𤣥隂西奄梓園東覆果林規方冒乎半頃清室莫與比深於是朋友同好几筵列行論道飲燕流川浮觴殽核紛雜賦詩斷章合陳厥志考以先王賞恭罰慢事有紀綱洗觶酌樽兕觥並揚飲不至醉樂不及荒威儀抑抑動合典常退坐分别其樂難忘惟萬物之自然固神妙之不如意此楊樹依我以生未寧一紀我賴以寧暑不御䈉凄而凉清内蔭我宇外及有生物有可貴云何不銘乃作斯賦以叙斯情鴞賦季夏庚子思道静居爰有飛鴞集我屋隅異物之來吉㓙之符觀之歡然覽考經書在徳為常棄常為妖尋氣而應天道不踰昔在賈生有志之士忌茲鵩鳥卒用䘮己咨我令考信道秉真變恠生家謂之天神修徳㓕邪化及其鄰禍福無門惟人所求聽天任命慎厥所修栖遲養志老氏之疇爵禄之求秪増我憂時去不索時來不逆庶幾中庸仁義之宅何思何慮自今勤劇蓼蟲賦季夏既望暑往凉還逍遙諷誦遂歴東園周旋覽觀憇于南藩覩兹茂蓼結葩吐榮猗那隨風緑葉紫莖爰有蠕蟲厥狀似螟群聚其間食之以生於是悟物託事推况乎人幼長斯蓼莫或知辛膏梁之子豈曰不云惟非徳非義不以為家安逸無心如禽獸何逸必致驕驕必致亡匪惟辛苦乃丁大殃與侍中從弟安國書臧報侍中相知忿俗儒淫辭冒義有意欲校亂反正由來乆矣然雅達博通不世而出流學守株比肩皆是衆口非非正將焉立每獨念至此夙夜反側誠懼仁弟道非信於世而以獨知為愆也人之所欲天必從舊章潛於壁室正於紛擾之際欻爾而見俗儒結舌古訓復申豈非聖祖之靈欲令仁弟讚明其道以闡其業者哉且曩雖為今學亦多所不信唯聞尚書二十八篇取象二十八宿謂為至然也何圖古文乃有百篇邪如堯典説者以為堯舜同道弟素常以為雜有舜典今果如所論及成王道雷風周公信自在俗儒群驅狗吠雷同不得其髣髴惡能明聖道之真乎知以今讐古之𨽻篆推科斗已定五十餘篇並為之傳云其餘錯亂文字摩㓕不可分了欲垂待後賢誠合先君闕疑之義顧惟世移名制改變文體義類轉益難知以弟博洽温敏既善推理又習其書而猶尚絶意莫肯垂留三思縱使來世亦有篤古碩儒其若斯何嗚呼惜哉先王遺典缺而不補聖祖之業分半而泯後之君子將焉取法假令顔閔不殁游夏更生其豈然乎不得已已貴復申之與子琳書告琳頃來聞汝與諸友書講肄學傳滋滋晝夜衎衎不怠善矣人之進道惟問其志取必以漸勤則得多山霤至柔石為之穿蝎蟲至弱木為之弊夫霤非石之鑿蝎非木之鑽然而能以微脆之形陷堅剛之體豈非積漸之致乎訓曰徒學知之未可多履而行之乃足佳故學者所以飾百行也侍中子國明達淵博雅學絶倫言不及利行不欺名動遵禮法少小長操故雖與群臣並叅侍見待崇禮不供䙝事獨得掌御唾壺朝廷之士莫不榮之此汝親所見詩不云乎毋念爾祖聿修厥徳又曰操斧伐柯其則不逺逺則尼父近則子國於以立身其庶矣乎叙世臧子琳位至諸吏亦博學問琳子黄厥徳不修失侯爵大司徒光以其祖有功德而邑土廢絶分所食邑三百戸封黄弟茂為闗内侯茂子子國生子卯為諸生特善詩禮而傳之子卯生仲驩為博士𢎞農守善春秋三傳公羊榖梁訓諸生仲驩生子立善詩書少游京師與劉歆友善嘗以清論譏貶史丹史丹諸子並用事為是不仕以詩書教於闕里數百人子立生子元以郎校書時歆大用事而子元校書七年官不益故或譏以為不恤於進取唯揚子雲善之子元生子建與崔義㓜相善長相親也義仕王莽為建新大尹數以世利勸子建仕子建答曰吾有布衣之心子有衮冕之志各從所好不亦善乎且昔與子㓜同志故相友也今子以富貴為榮而吾以貧賤為樂志已乖矣乖而相友非中情也請與子辭遂歸鄉里崔義當作毅字光武中興天下未悉從化董憲彭豐等部衆於鄒魯之間郡守上黨鮑府君君長患之是時闕里無故荆棘叢生一旦自闢廣千數百步從舊講堂坦然至里門府君大驚謂子建曰豈卿先君欲令太守行饗禮助太守誅惡耶子建對曰其然府君曰為之奈何對曰庠序之儀廢來乆矣今誠修之民必觀焉且憲豐為盜或聚或散非有堅固部曲也若行饗射之禮内為禽之之備外示以簡易憲等無何依衆觀化可因而縛也府君從之用格憲等子建生仁以文學為議郎博士南海太守生子豐子豐以學行聞三府交命委質司空拜髙第御史建初元嵗大旱天子憂之問群臣政教得失子豐乃上疏曰臣聞為不善而災報得其應也為善而災至遭時運也陛下即位日新視民如傷而不幸耗旱時運之㑹爾非政教之所致也昔成湯遭旱因自責省故散積减御損膳而大有年意者陛下未為成湯之事焉天子納其言而從之三日雨即降轉拜黄門侍郎典東觀事子豐生子和史作孔僖字仲和此書葢孔氏子孫所作故不書名大中大夫鮑彦曰人之性分氣度不同有體貌亢疏色厲矜莊儀容氷栗似若能斷而當事少决不遂其為者或性𤣥靜不與俗競氣不勝辭似若無能而涉事不顧臨危不撓者是為似若彊焉而不能勝似若弱焉而不可奪也君子觀之以表推内察容而度心所以得之也若是似類相亂如何取實乎子豐曰夫人者患在不察也人之所綜物才志也慮協於理固以守之此之謂彊知足以通變明足以破偽情足以審疑果足以必志固可以先事而成功矣即所謂寛柔内思不報無道之彊豈待形氣之助乎若乃貌厲内荏髙氣亢戾多意倨跡理不充分業不一定執志不果此謂剛愎非彊者也是故君子欲必其行由是論之彊弱之分不取於氣色明矣必也察志在觀其履事乎非定計於内而敏發於外孰能稱此彊名乎哉子豐曰夫物有定名而論有一至是故有可以一言而得其極雖十言不能奪者惟析理即實為得不以濫麗費辭為賢也然而世俗之人聰達者寡隨聲者衆持論無主俯仰為資因貴勢而附從託浮説以為定不求之於本不考之於理故冗長溷殽之言而衆莫能折其中所以為口實而無得也夫論辨者貴其能别是非之理非巧説之謂也當要者訥言得理此乃辨也聽者由弗之察辭氣支離取喻多端幸較以類理不應實而聽者因形飾偽徒讚然之是所謂以巧辭多喻為辨而莫識一言之别實者也人皆欲剖析分理揆度真偽固不知所以精之如自為得其謬惑莫之甚焉是故舉多敗事而寡特之知困於群醜也夫聰者不可亂以淫聲明者不可眩以邪色而世人不必聰明故有氣勢者益得之半無此二者損得之半也子豐善於經學不好諸家書鮑彦與子豐名齊而業殊故謂子豐曰家書多才辭莫過淮南也讀之令人斷氣方自知為陋爾子豐曰試説其最工不可及者彦曰君子有酒小人鼔缶雖不可好亦不可醜此語何如子豐曰不急爾彦曰且效作此語子豐曰君子樂醼小人擊抃雖不足貴亦不可賤君子舞象小人擊壌上化使然又何足賞吾能作數十曲但無益於世故不為爾鮑子於是屈而無辭

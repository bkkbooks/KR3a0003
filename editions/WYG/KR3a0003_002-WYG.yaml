front:
  text: 刑論第四仲弓問古之刑教與今之刑教孔子曰古之刑省今之刑繁其為教古有禮然後有刑是以刑省今無禮以教而齊之以刑刑是以繁書曰伯夷降典折民維刑謂下禮以教之然後維以刑折之也夫無禮則民無耻而正之以刑故民苟免孔子適衛衛將軍文子問曰吾聞魯公父氏不能聽獄信乎孔子荅曰不知其不能也夫公父氏之聽獄有罪者懼無罪者恥文子曰有罪者懼是聴之察刑之當也無罪者恥何乎孔子曰齊之以禮則民恥矣刑以止刑則民懼矣文子曰今齊之以刑刑猶弗勝何禮之齊孔子曰以禮齊民譬之于御則轡也以刑齊民譬之于御則鞭也執轡于此而動于彼御之良也無轡而用䇿則馬失道矣文子曰以御言之左手執轡右手運䇿不亦速乎若徒轡無䇿馬何懼哉孔子曰吾聞古之善御者執轡如組兩驂如舞非䇿之助也是以先王盛于禮而薄于刑故民從命今也廢禮而尚刑故民彌暴文子曰呉越之俗無禮而亦治何也孔子曰夫呉越之俗男女無别同厠而浴民輕相犯故其刑重而不勝由無禮也中國之教為外内以别男女異器服以殊等類故其民篤而法其刑輕而勝由有禮也孔子曰民之所以生者衣服也上不教民民匱其生饑寒切于身而不為非者寡矣故古之于盜惡之而不殺也今不先其教而一殺之是以罰行而善不反刑張而罪不省夫赤子知慕其父母由審故也况為政興其賢者而廢其不賢以化民乎知審此二者則上盗息上盗猶大盗也書曰茲殷罰有倫子張問曰何謂也孔子曰不失其理之謂也今諸侯不同徳國君異法折獄無倫以意為限是故知法之難也子張曰古之知法者與今之知法者異乎孔子曰古之知法者能逺能逺者止其源而以禮義先之今之知法者不失有罪不失有罪其于怨寡矣能逺則于獄其防深矣寡怨近乎濫防深治乎本書曰惟敬五刑以成三徳言敬刑所以為德也書曰非從惟從孔子曰君子之于人也有不語也無不聽也况聽訟乎必盡其辭矣夫聽訟者或從其情或從其辭辭不可從心斷以情書曰人有小罪非𤯝乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟𤯝災適爾既道極厥辜時乃不可殺曾子問聽獄之術孔子曰其大法有三焉治必以寛寛之之術歸于察察之之術歸于義是故聽而不寛是亂也寛而不察是慢也察而不中義是私也私則民怨故善聽者雖不越辭辭不越情情不越義書曰上下比罪無僭亂辭書曰哀矜折獄仲弓問曰何謂也孔子曰古之聽訟者察貧窮哀孤獨及鰥寡老弱不肖而無告者雖得其情必哀矜之死者不可生斷者不可屬若老而刑之謂之悖弱而刑之謂之尅不赦過謂之逆率過以小罪謂之枳一作疻猶傷也夫過則冝宥若率以為小罪亦傷乎義故宥過赦小罪老弱不受刑先王之道也書曰大辟疑赦又曰與其殺不辜寧失不經書曰若保赤子子張問曰聽訟可以若此乎孔子曰可哉古之聽訟者惡其意不惡其人求所以生之不得其所以生乃刑之君必與衆共焉今之聽訟者不惡其意而惡其人求所以殺是反古之道也孟氏之臣叛武伯問孔子曰如之何荅曰臣人而叛天下所不容也其狀自反子姑待之三旬果自歸孟氏武伯將執之訪于夫子夫子曰無也子之于臣禮意不至是以去子今其自反罪以反除又何執焉子修禮以待之則臣去子將安徃武伯乃止

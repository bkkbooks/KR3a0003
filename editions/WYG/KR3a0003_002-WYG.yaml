body:
  text: 記問第五夫子閒居喟然而嘆子思再拜請曰意子孫不修將忝祖乎羡堯舜之道恨不及乎夫子曰爾孺子安知吾志子思對曰伋于進瞻亟聞夫子之教其父析薪其子弗克負荷是謂不肖伋毎思之所以大恐而不觧也夫子忻然笑曰然乎吾無憂矣世不廢業其克昌乎子思問于夫子曰為人君者莫不知任賢之逸也而不能用賢何故子曰非不欲也所以官人任能者由于不明也其君以譽為賞以毁為罰賢者不居焉子思問于夫子曰伋聞夫子之詔正俗化民之政莫善于禮樂也管子任法以治齊而天下稱仁焉是法與禮樂異用而同功也何必但禮樂哉子曰堯舜之化百世不輟仁義之風逺也管仲任法身死則法息嚴而寡恩也若管仲之知足以定法材非管仲而專任法終必亂成矣子思問于夫子曰物有形類事有真偽必審之奚由子曰由乎心心之精神是謂聖推數究理不以疑心誠神通則數不能遁周其所察聖人難諸趙簡子使聘夫子夫子將至焉及河聞鳴犢與竇犨之見殺也廻輿而旋之衛息鄹遂為操曰周道衰微禮樂陵遲文武既墜吾將焉歸周遊天下靡邦可依鳳鳥不識珎寶梟鴟眷然顧之􅃤然心悲巾車命駕將適唐都黄河洋洋攸攸之魚臨津不濟還轅息鄹傷予道窮哀彼無辜翺翔于衛復我舊廬從吾所好其樂只且哀公使以幣如衛迎夫子而卒不能賞用也故夫子作丘陵之歌曰登彼丘陵峛崺其阪丘陵謂王室也阪指諸侯仁道在邇求之若逺遂迷不復自嬰屯蹇喟然廻慮題彼泰山題顧也泰山謂魯也欝確其髙梁甫廻連枳棘充路陟之無縁將伐無柯患兹蔓延惟以永嘆涕霣潺湲梁甫泰山之下小山指三桓也楚王使使奉金幣聘夫子宰予冉有曰夫子之道至是行矣遂請見問夫子曰太公勤身苦志八十而遇文王孰與許由之賢夫子曰許由獨善其身者也太公兼利天下者也然今世無文王之君也雖有太公孰能識之乃歌曰大道隠兮禮為基賢人竄兮將待時天下如一欲何之叔孫氏之車子曰鉏商樵于野而獲獸焉衆莫之識以為不祥棄之五父之衢冉有告夫子曰麕身而肉角豈天之妖乎夫子曰今何在吾將觀焉遂徃謂其御髙柴曰若求之言其必麟乎到視之果信言偃問曰飛者宗鳳走者宗麟為其難致也敢問今見其誰應之子曰天子布徳將致太平則麟鳳龜龍先為之祥今宗周將滅天下無主孰為來哉遂泣曰予之于人猶麟之于獸也麟出而死吾道窮矣乃歌曰唐虞世兮麟鳳遊今非其時吾何求麟兮麟兮我心憂雜訓第六子上雜所習請于子思孔白字子上子思之子也雜者諸子百家子思曰先人有訓焉學必由聖所以致其材也厲必由砥所以致其刄也故夫子之教必始于詩書而終于禮樂雜説不與焉又何請子思謂子上曰白乎吾嘗深有思而莫之得也于學則寤焉吾嘗企有望而莫之見也登髙則覩焉是故雖有本性而加之以學則無惑矣縣子問子思曰縣子名𤨏魯人吾聞同聲者相好子之先君見子産時則兄事之而世謂子産仁愛稱夫子聖人是謂聖道事仁愛乎吾未諭其人之孰先後也故質于子子思曰然子之問也昔季孫問子游亦若子之言也子游荅曰以子産之仁愛譬夫子其猶浸水之與膏雨乎康子曰子産死鄭人丈夫舍玦珮婦女舍珠瑱巷災三月竽瑟不作夫子之死也吾未聞魯人之若是也奚故哉子游曰夫浸水之所及也則生其所不及則死故民皆知焉膏雨之所生也廣莫大焉民之受賜也普矣莫識其由來者上徳不徳是以無徳季孫曰善縣子曰其然孟子車尚幼請見子思子思見之甚悦其志命子上侍坐焉禮敬子車甚崇子上不願也客退子上請曰白聞士無介不見女無媒不嫁孟孺子無介而見大人悦而敬之白也未諭敢問子思曰然吾昔從夫子于郯遇程子于塗傾盖而語終日而别命子路將束帛贈焉以其道同于君子也今孟子車孺子也言稱堯舜性樂仁義世所希有也事之猶可况加敬乎非爾所及也子思在魯使以書如衛問子上子上北面再拜受書伏讀然後與使者晏遂為復書返中庭北面再拜以授使者既受書然後退使者還魯問子思曰吾子堂上南面立授臣書事畢送臣子上中庭拜授臣書而不送何也子思曰拜而不送敬也使而送之賔也魯人有同姓死而弗弔者人曰在禮當免不免當弔不弔有司罰之如之何子之無弔也荅曰吾以其疎逺也子思聞之曰無恩之甚也昔者季孫康子問于夫子曰百世之宗有絶道乎子曰繼之以姓義無絶也故同姓為宗合族為屬雖國子之尊不廢其親所以崇愛也是以綴之以食序列昭穆萬世婚姻不通忠篤之道然也魯穆公訪于子思曰寡人不得嗣先君之業三年矣未知所以為令名者且欲掩先君之惡以揚先君之善使談者有述焉為之若何願先生教之也子思荅曰以伋所聞舜禹之于其父非勿欲也以為私情之細不如公義之大故弗敢私之云耳責以虚飾之教又非伋所得言公曰思之可以利民者子思曰頋有恵百姓之心則莫如一切除非法之事也毁不居之室以賜窮民奪嬖寵之禄以賑困匱無令人有悲怨而後世有聞見抑亦可公曰諾縣子問子思曰顔回問為邦夫子曰行夏之時若是殷周異正為非乎子思曰夏數得天堯舜之所同也殷周之王征伐革命以應乎天因改正朔若云天時之改耳故不相因也夫受禪于人者則襲其統受命于天者則革之所以神其事如天道之變然也三統之義夏得其正是以夫子云穆公問于子思曰立太子有常乎荅曰有之在周公之典公曰昔文王舎適而立其次㣲子舎孫而立其弟是何法也子思曰殷人質而尊其尊故立弟周人文而親其親故立子亦各其禮也文質不同其禮則異文王舍適立次權也公曰苟得行權豈唯聖人唯賢與愛立也子思曰聖人不以權教故立制垂法順之為貴若必欲犯何有于異公曰舍賢立聖舍愚立賢何如子思曰唯聖立聖其文王乎不及文王者則各賢其所愛不殊于適何以限之必不能審賢愚之分請父兄羣臣卜于祖廟亦權之可也孟軻問牧民何先子思曰先利之曰君子之所以教民亦仁義固所以利之乎子思曰上不仁則下不得其所上不義則樂為亂也此為不利大矣故易曰利者義之和也又曰利用安身以崇徳也此皆利之大者也居衛第七子思居衛言苟變于衛君曰其材可將五百乗君任軍旅率得此人則無敵于天下矣衛君曰吾知其材可將然變也嘗為吏賦于民而食人二雞子以故弗用也子思曰夫聖人之官人猶大匠之用木也取其所長棄其所短故杞梓連抱而有數尺之朽良工不棄何也知其所妨者細也卒成不訾之器今君處戰國之世選爪牙之士而以二卵棄干城之將此不可使聞于鄰國者也衛君再拜曰謹受教矣子思適齊齊君之嬖臣美鬚眉立乎側齊君指之而笑且言曰假貌可相易寡人不惜此之鬚眉于先生也子思曰非所願也所願者惟君修禮義富百姓而伋得寄帑于君之境内從襁負之列其榮多矣若無此鬚鬣非伋所病也昔堯身修十尺眉乃八彩實聖舜身修八尺有竒面頷無毛亦聖禹湯文武及周公勤思勞體或折臂望視或秃骭背僂亦聖不以鬚眉美鬣為稱也人之賢聖在徳豈在貌乎且吾性無鬚眉而天下王侯不以此損其敬由是言之伋徒患徳之不邵美也不病毛鬂之不茂也子思謂子上曰有可以為公之尊而冨貴人衆不與焉者非唯志乎成其志者非唯無欲乎夫錦繢紛華所服不過溫體三牲太牢所食不過充腹知以身取節者則知足矣苟知足則不累其志矣曾子謂子思曰昔者吾從夫子廵守于諸侯夫子未嘗失人臣之禮而猶聖道不行今吾觀子有傲世主之心無乃不容乎子思曰時移世異人有冝也當吾先君周制雖毁君臣固位上下相持若一體然夫欲行其道不執禮以求之則不能入也今天下諸侯方欲力争競招英雄以自輔翼此乃得士則昌失士則亡之秋也伋于此時不自髙人將下吾不自貴人將賤吾舜禹揖讓湯武用師非故相詭乃各時也子思在齊尹文子生子不類怒而杖之告子思曰此非吾子也吾妻殆不婦吾將黜之子思曰若子之言則堯舜之妃復可疑也此二帝聖者之英而丹朱商均不及匹夫以是推之豈可類乎然舉其多者有此父斯有此子道之常也若夫賢父之有愚子此由天道自然非子之妻之罪也尹文子曰先生止之願無言文留妻矣孟軻問子思曰堯舜文武之道可力而致乎子思曰彼人也我人也稱其言履其行夜思之晝行之滋滋焉汲汲焉如農之赴時商之趨利惡有不至者乎子思謂孟軻曰自大而不修其所以大不大矣自異而不修其所以異不異矣故君子髙其行則人莫能階也逺其志則人莫能及也禮接于人人不敢慢辭交于人人不敢侮其唯髙逺乎申詳問曰子張之子殷人自契至湯而王周人自棄至武王而王同嚳之後也周人追王太王王季文王而殷人獨否何也子思曰文質之異也周人之所追太王王迹起焉又曰文王受命斷虞芮之訟伐崇邦退犬戎追王太王王季何也子思曰狄人攻太王太王召耆老而問焉曰狄人何來耆老曰欲得菽粟財貨太王曰與之與之至無而狄人不止太王又問耆老曰狄人何欲耆老曰欲土地太王曰與之耆老曰君不為社稷乎太王曰社稷所以為民也不可以所為民者亡民也耆老曰君縱不為社稷不為宗廟乎太王曰宗廟者私也不可以吾私害民遂杖䇿而去過梁山止乎岐下豳民之束脩奔而從之者三千乘一止而成三千乘之邑此王道之端也成王于是追而王之王季其子也承其業廣其基焉雖同追王不亦可乎羊客問子思曰古之帝王中分天下使二公治之謂之二伯周自后稷封為王者後子孫據國至太王王季文王此固世為諸侯矣焉得為西伯乎子思曰吾聞諸子夏殷王帝乙之時王季以功九命作伯受珪瓉鬯之賜故文王因之得專征伐此以諸侯為伯猶周召之君為伯也子思年十六適宋宋大夫樂朔與之言學焉朔曰尚書虞夏數四篇善也下此以訖于秦費効堯舜之言耳殊不如也子思荅曰事變有極正自當耳假令周公堯舜不更時異䖏其書同矣樂朔曰凡書之作欲以喻民也簡易為上而乃故作難知之辭不亦繁乎子思曰書之意兼復深奥訓誥成義古人所以為典雅也曰昔魯委巷亦有似君之言者伋荅之曰道為知者傳苟非其人道不傳矣今君何似之甚也樂朔不悦而退曰孺子辱吾其徒曰魯雖以宋為舊然世有讐焉請攻之遂圍子思宋君聞之不待駕而救子思子思既免曰文王困于羑里作周易祖君屈于陳蔡作春秋吾困于宋可無作乎于是撰中庸之書四十九篇廵狩第八子思遊

front:
  text: 陳士義第十五魏王遣使者奉黄金束帛聘子順為相孔武後名斌字子順子髙之子子順謂使者曰若玉信能用吾道吾道固為治世也雖疏食飲水吾猶為之若徒欲制服吾身委以重禄吾猶一夫爾則魏王不少於一夫子度魏王之心以告我使者曰魏國狹小乏於聖賢寡君乆聞下風願委國先生親受教訓如肯降節豈惟魏國君臣是賴其亦社稷之神祇實永受慶於是乃之魏魏王郊迎謂子順曰寡人不肖嗣先君之業先生聖人之後道徳懿邵幸見顧臨願圖國政對曰臣覊旅之臣慕君髙義是以戾此君辱貺而問以政事敢不敬受君之明命魏王朝群臣問理國之所先季文對曰唯在知人王未之應子順進曰知人則哲帝堯所病故四㓙在朝鯀任無功夫豈樂然哉人難知故也今文之對不稱吾君之所能行而乃欲強吾君以聖人所難此不可行之説也王曰先生言之對曰當今所急在修仁尚義崇徳敦禮以接鄰國而已昔舜命衆官群臣競譲徳禮之致也苟使朝臣皆有推賢之心主雖不知人則臣位必當若皆以知人為治則人主宜未過堯且其目所不見者亦必漏矣王曰善矣秦王得西戎利刀以之割玉如割木焉以示東方諸侯魏王問子順曰古亦有之乎對曰周穆王大征西戎西戎獻錕鋘之劒火浣之布其劒長尺有咫鍊鋼赤劒用之切玉如泥焉是則古亦有也王曰火浣之布若何對曰周書火浣布垢必投諸火布則火色垢乃灰色出火振之皜然疑乎雪焉王曰今何以獨無對曰秦貪而多求求欲無厭是故西戎閉而不致此以素防絶之也然則人主貪欲乃異物所以不至不可不慎也魏王曰吾聞道士登華山則長生不死意亦願之對曰古無是道非所􅂅也王曰吾聞信之對曰未審君之所聞親聞之於不死者耶聞之於傳聞者耶君聞之於傳聞者􅄭也若聞之於不死者今安在在者君學之勿疑不在者君勿學無疑李由之母少寡與李音竊相好而生由由有才藝仕於魏王甚愛之或曰李由母姦不知其父不足貴也王以告由且曰吾不以此賤子也雖然古之聖賢亦有似子者乎吾將舉以折毁子者李由對曰今人不通於逺在臣欲言誰爾且孔子少孤則亦不知其父者也孔子母死殯於五父之衢人見之皆以為孤葬問鄹曼父之母得合塟於防此則聖人與臣同者也王笑曰善子順聞之問魏王曰李由安得斯言王曰假以自顯無傷也對曰虛造謗言以誣聖人非無傷也且夫明主之於臣唯徳所在不以小疵妨大行也昔鬭子文生於淫而不害其為令尹今李由可則寵之何患於人之言而使横生不然之説若欺有知則有知不受若欺凡人則凡人無知必以問臣則臣亦不為君之故誣祖以顯由也如此群臣更知由惡此必聚矣所謂求白潔而益其垢猶抱石以救溺愈不濟矣魏王使相國修好鄰國遂連和於趙趙王既賔之而燕問子順曰今寡人欲來北狄不知其所以然答曰誘之以其所利而與之通市則自至矣王曰寡人欲因而弱之若與交市分我國貨散於夷狄是彊之也可乎答曰夫與之市者將以我無用之貨取其有用之物是故所以弱之之術也王曰何謂我之無用彼之有用答曰衣服之物則有珠玉五綵飲食之物則有酒醪五熟五味也此即我之所有而彼之所利者也夷狄之貨唯牛馬旃裘弓矢之噐是其所饒而輕以與人者也以吾所有易彼所饒如斯不已則夷狄之用將麋於衣食矣殆可舉棰而驅之豈徒弱之而已乎趙王曰敬受教枚産魏人問子順曰臣匱於財聞猗頓善殖貨欲學之然先生同國也當知其術願以告我答曰然知之猗頓魯之窮士也耕則常饑桑則常寒聞陶朱公富往而問術焉朱公告之曰子欲速富當畜五牸於是乃適西河大畜牛羊於猗氏之南十年之間其滋息不可計貲擬王公馳名天下以興富於猗氏故曰猗頓且夫為富者非唯一術今子徒問猗頓何也枚産曰亦將問之於先生也答曰吾貧而子問以富術縱有其術是不可用之術也昔人有言能得長生者道士聞而欲學之比往言者死矣道士髙蹈而恨夫所欲學學不死也其人已死而猶恨之是不知所以為學也今子欲求殖貨而問術於我我且自貧安能教子以富乎子之此問有似道士之學不死者也東里閭魏人空腹而好自賢欲自親於子順子順不下或曰夫君子之交於世士亦取其一節而已東閭子疏達亮直大丈夫也求為先生役而先生無意接之斯者無乃非周公之交人乎子順曰此吾所以行周公之行也夫東閭子外質頑拙有似疏直然内懐容媚諂魅非大丈夫之節也若其度骸稱膚面目鬢眉實美於人聖人論士不以為貴者無益於徳故也然東閭子中不應外侮慢世士即所謂愚人而謂人為愚者也持其虚狀以不徳於人此乃周公之所罪何交之有宫他魏人見子順曰他困貧賤將欲自託富貴之門庶克免乎子順曰夫富而可以託貧貴而可以寄賤者天下寡矣非信義君子明識窮逹則不可今子所欲託者誰也宫他曰將適趙公子子順曰非其人矣雖好養士自奉而已終弗能稱也宫他曰將適燕相國子順曰彼徒兄弟甥舅各濟其私無求賢之志不足歸也宫他曰將適齊田氏子順曰齊大國也其士大夫皆有自多之心不能容子也他曰然則何向而可子順曰吾勿識也宫他曰唯先生知人願告所擇將往庇焉子順曰濟子之欲則宜若郈成子者也昔郈成子自魯聘晉過乎衞右宰穀臣止而觴之陳樂而不作送以寶璧反過而不辭其僕曰日者右宰之觴吾子甚歡也今過而不辭何也成子曰夫止而觴我與我歡也陳樂而不作告我哀也送我以璧寄之我也若由此觀之衞其有亂乎背衞三十里聞寗喜作難右宰死之還車而臨三舉而歸反命于君乃使人迎其妻子隔宅而居之分祿而食之其子長而反其璧夫子聞之曰智可與徵謀仁可以託孤廉可以寄財者其郈成子之謂乎今子求若人之比庇焉可也宫他曰循先生之言舍先生將安之請從執事子順辭不得已乃言之魏王而升諸朝子順相魏改嬖寵之官以事賢才奪無任之祿以賜有功諸䘮職秩者不悦乃造謗言文咨魏人以告且曰夫不害前政而有成孰與變之而起謗哉子順曰民不可與慮始乆矣古之善為政者其初不能無謗子産相鄭三年而後謗止吾先君之相魯三月而後謗止今吾為政日新雖不能及聖賢庸知謗止獨無時乎文咨曰子産之謗嘗亦聞之未識先君之謗何也子順曰先君初相魯魯人謗誦曰麛裘而芾投之無戾芾之麛裘投之無郵及三年政成化既行民又作誦曰衮衣章甫實獲我所章甫衮衣惠我無私文咨喜曰乃知先生亦不異乎聖賢矣魏王謂子順曰吾欲致天下之士奈何子順對曰昔周穆王問祭公謀父曰吾欲得天下賢才對曰去其帝王之色則幾乎得賢才矣今臣亦請君去其尊貴之色而已王曰吾欲得無欲之士為臣何如子順曰人之可使以有欲也故欲多者其所得用亦多欲少者其所得用亦少夫夷齊無欲雖文武不能制君安得而臣之

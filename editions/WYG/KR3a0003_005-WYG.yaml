body:
  text: 論勢第十六魏王問相國曰今秦負强以無道陵天下天下莫不患寡人欲割國之半以親諸侯求從事於秦可乎子順對曰以臣觀之殆無益也今天下諸侯畏秦之日乆矣數被其毒無欲復之之志心無所計委國於游説之士游説之士挾强秦以為資賣其國以收利义手服從曽不能制如君之謀未獲其利而祗為名適足以速秦之首誅則無以得之不如守常以須其變也王曰秦其遂有天下乎對曰必然焉雖然取不以道得不以道自古以來未有能終之者五國西誅秦子順㑹之秦未入境而還諸侯留兵於成臯子順謂市丘子曰此師楚為之主今兵罷而不散殆有異意君其備之市丘子曰先生幸而教之願以國寄先生子順許諾遂見楚王曰王約五國而西伐秦事既不集又乆師於市丘謗君者或以君欲攻市丘以償兵費天下之士且以是輕君而重秦又且不義君之為矣王可不卜交乎楚王曰奈何子順曰王出令使五國勿攻市丘五國重王則聽王之令矣不重王則且反王之令而攻市丘以此卜五國交王之輕重必明矣楚王敬諾而五國散趙閒魏將以求親於秦子順謂趙王曰趙悼㐮王此君之下吏計過也比目之魚所以不見得於人者以偶視而俱走也今秦有兼吞天下之志日夜伺間不忘於側息也趙魏與之隣接而强弱不敵秦所以不敢圖并趙魏者徒以二國併目周旋者也今無故自離以資强秦天下拙謀無過此者故臣曰君之下吏計過也夫連雞不能上捷亦猶二國搆難不能自免於秦也願王熟慮之趙王曰敬受教韓與魏有隙子順謂韓王曰昭釐侯一世之明君也韓宣恵王乃昭釐侯之子申不害一世之賢相也韓與魏敵侔之國而釐侯執圭見梁君者非好卑而惡尊慮過而計失也與嚴敵為隣而動有㓕亡之變獨勁不能支二難故降心以相從屈己以求存也申不害慮事而言忠臣也昭釐侯聽而行之明君也今韓弱於始之韓魏弱於始之魏秦強於始之秦而背先人之舊好以區區之衆居二敵之間非良策也齊楚逺而難恃秦魏呼吸而至舍近而求逺是以虛名自累而不免近敵之困者也為王計者莫如除小忿全大好也呉越之人同舟濟江中流遇風波其相救如左右手者所患同也今不恤所同之患是不如呉越之舟人也韓王曰善秦兵攻趙魏大夫以為於魏便子順曰何謂曰勝趙則吾因而服焉不勝趙則可乗弊而擊之子順曰不然秦自孝公以來戰未嘗屈今皆良將何弊之乗大夫曰縱其勝趙於我何損鄰之不修國之福也子順曰秦貪暴之國也勝趙必復他求吾恐於時受其師也先人有言燕雀處屋子母相哺喣喣然其相樂也自以為安矣竈突炎上棟宇將焚燕雀顔不變不知禍之及己也今子不悟趙破患將及己可以人而同於燕雀乎齊攻趙圍廩丘趙使孔青帥五萬擊之尅齊軍獲尸三萬趙王詔勿歸其尸將以困之子順聘趙問王曰不歸尸其困何也曰其父兄子弟悲苦無已廢其産也子順曰非所以困之也死一也歸尸與不悲苦胡異焉以臣愚計貧齊之術乃宜歸尸王曰何謂對曰使其家逺來迎尸不得事農一費也歸所塟使其送死終事二費也二年之中䘮卒三萬三費也欲無困貧不能得已王曰善既而齊大夫聞其子順之謀曰君子之謀其利溥哉子順相魏凡九月陳大計輙不用乃喟然嘆曰不見用是吾言之不當也言不當於主而居人之官食人之祿是尸利也尸利素飱吾罪深矣退而以病致事魏王遣使入其館謝曰寡人昧於政事不顯明是非以啓罪於先生今知改矣願先生為百姓故幸起而教之辭曰臣有犬馬之疾不任國事苟得從四民之列子弟供魏國之征乃君惠也敢辱君命以速刑書人謂子順曰王不用子子其行乎答曰吾將行如之山東則山東之國將并於秦秦為不義義所不入遂窮于家秦急攻魏王恐或謂子順曰如之何答曰吾私有計然豈能賢於執政故無言焉魏王聞之駕如孔氏親問焉曰國亡矣如之何對曰夫棄之不如用之之易也死之不如棄之之易也人能棄之弗能用也能死之不能棄也今王亡地數百里亡城數十而患不解是王棄之非用之也秦之强天下無敵魏之弱甚矣而王是以質秦景閔王為太子時嘗質於秦此王能死不能棄之也是重過也若能用臣之訃則虧地不足傷國卑體不足苦身患除怨報矣今秦四境之内執政以下固曰與嫪氏乎與吕氏乎門閭之下廊廟之上猶皆如是今王誠能割地賂秦以為嫪毒功卑身尊秦以固嫪毒王是以國贊嫪毒也則嫪毒勝矣於是太后之徳王也深如骨肉王之交最為天下之上矣孰不棄吕氏而從嫪毒天下皆然則王怨必報矣按此策甚疎必非子順語執節第十七趙孝成王問曰昔伊尹為臣而放其君其君不怨何行而得乎此也子順答曰伊尹執人臣之節而弼其君以禮亦行此道而已矣王曰方以放君為名而先生稱禮何也子順曰以禮括其君使入於善也曰其説可得聞乎答曰其在商書太甲嗣立而干冢宰之政伊尹曰惟王舊行不義習與性成予不狎于不順王始即桐邇于先王其訓罔以後人迷王往居憂允思厥祖之明徳是言太甲在䘮不明乎人子之道而欲知政於是伊尹使之居桐近湯之墓處憂哀之地放之不俾知政三年服竟然後反之即所以奉禮執節事太甲者也率其君以義強其君以孝道未有行此見怨也王曰善哉我未之聞也魏安釐王問子順曰馬回之為人雖少才文梗梗亮直一作緶有大丈夫之節吾欲以為相可乎答曰知臣莫若君何有不可至於亮直之節臣未明也王曰何故答曰聞諸孫卿云其為人也長目而豕視者必體方而心圓每以其法相人千百不失臣見回非不偉其體幹也然甚疑其目王卒用之三月果以諂得罪新垣固謂子順曰賢者所在必興化致治今子相魏未聞異政而即自退其有志不得白何去之速也答曰以無異政所以自退也且死病無良毉今秦有吞食天下之心以義事之固不獲安救亡不暇何化之興昔伊摯在夏吕望在商而二國不理豈伊吕之不欲哉勢不可也當如今日山東之國弊而不振三晉割地以求安二周折節而入秦燕齊宋楚已屈服矣以此觀之不出二十年天下盡為秦乎季節見於子順子順賜之酒辭問其故對曰今日家之忌日也故不敢飲子順曰飲也禮忌日不樂而己未有無飲者禮雖服衰麻見於君及先生與之粱肉無辭所以敬尊長而不敢遂其私也忌日方於有服則輕矣魏安釐王問天下之髙士子順曰世無其人也抑可以為次其魯仲連乎王曰魯仲連强作之者非體自然也答曰人皆作之作之不止乃成君子文武欲作堯舜而至焉昔我先君夫子欲作文武而至焉作之不變習與體成習與體成則自然矣虞卿著書名曰春秋魏齊曰子無然也春秋孔聖所以名經也今子之書大抵談説而已亦以為名何答曰經者取其事常也可常則為經矣且不為孔子其無經乎齊問子順子順曰無傷也魯之史記曰春秋經因以為名焉又晏子之書亦曰春秋吾聞泰山之上封禪者七十有二君其見稱述數不盈十所謂貴賤不嫌同名也邯鄲之民以正月之旦獻雀於趙王而綴之以五絲趙王大悦申叔以告子順曰王何以為也對曰正旦放之示有生也子順曰此委巷之鄙事爾非先王之法也且又不令申叔曰敢問何謂不令答曰夫雀者取其名焉則宜受之於上不宜取之於下下人非所得制爵也而王悦此殆非吉祥矣昔虢公祈神神賜之土田是失國而更受田之祥也今以一國之王受民之雀將何悦哉申叔問曰犬馬之名皆因其形色而名焉唯韓盧宋鵲獨否何也子順答曰盧黑色鵲白黑色非色而何魏公子無忌死韓君將親弔焉其子榮之以告子順子順曰必辭之禮鄰國君弔君主之今君不命子則子無所受其君也其子辭韓韓君乃止子髙以為趙平原君覇世之士惜其不遇時也其子子順以為衰世之好事公子無伯相之才也申叔問子順曰子之家公有道先生既論之矣今子易之是非焉在答曰言貴盡心亦各有所見也若是非則明智者裁之申叔問子順曰禮為人臣三諫不從可以稱其君之非乎答曰禮所不得也曰叔也昔者逮事有道先生問此義焉而告叔曰得稱其非者所以使天下人君不敢遂其非也子順曰然吾亦聞之是亡考起時之言非禮意也禮受放之臣不説人以無罪先君夫子曰事君欲諫不欲陳言不欲顯君之非也申叔曰然則晏子叔向皆非禮也答曰此二大夫相與私燕言及國事未以為非禮也晏子既陳屨賤而踊貴於其君其君為之省刑然以及叔向叔向聽晏子之私又承其問所宜亦答以其事也魏王問子順曰寡人聞昔者上天神異后稷而為之下嘉穀周以遂興往中山之地無故有穀非人所為云天雨之反亡國何故也答曰天雖至神自古及今未聞下榖與人也詩美后稷能大教民種嘉穀以利天下故詩曰誕降嘉種猶書所謂稷降播種農殖嘉穀皆説種之其義一也若中山之穀妖恠之事非所謂天祥也趙王問相於平原君平原君曰鄒文可趙人王曰其行如何對曰夫孔子髙天下之髙士也取友以行交游以道文與之遊稱曰好義王其用之王卒不用後以平原君言問子順且曰先生知之乎答曰先父之所交也何敢不知王曰寡人雖失之在前猶願聞其行於先生也答曰行不苟合雖賤不渝君子人也王遂禮之固以老辭趙王問子順曰寡人聞孔氏之世自正考父以來儒林相繼仲尼重之以大聖自兹以降世業不替天下諸侯咸資禮焉先生承其緒作二國師從古及今載徳流聲未有若先生之嗣率由前訓將與天地相敝矣答曰若先祖父並禀聖人之性如君王之言也至如臣者學行不敏寄食於趙祿仕於魏幸遇二國之君寛以容之若乃師也未敢承命假令賴君之願後世克祚不忝前人不泯祖業豈徒一家之賜哉亦天下之慶也王曰必然必然
